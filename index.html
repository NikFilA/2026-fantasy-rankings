<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Draft Board</title>
    <script src="data.js"></script>
    <script src="sync-config.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111416;
            --panel: #171b1f;
            --panel-strong: #1d2329;
            --line: #29313a;
            --line-soft: #20272e;
            --text: #eef2f6;
            --muted: #96a1ad;
            --subtle: #687481;
            --accent: #38bdf8;
            --accent-strong: #facc15;
            --green: #4ade80;
            --red: #f87171;
            --shadow: rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-width: 320px;
            background: var(--bg);
        }

        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(56, 189, 248, 0.08), transparent 260px),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 15px;
            letter-spacing: 0;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .app {
            width: min(1380px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 42px;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin-bottom: 22px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            max-width: 780px;
            font-size: clamp(30px, 5vw, 58px);
            line-height: 0.96;
            letter-spacing: 0;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(94px, 1fr));
            gap: 10px;
            min-width: min(420px, 100%);
        }

        .metric {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
            box-shadow: 0 16px 36px var(--shadow);
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            font-size: 24px;
            line-height: 1;
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 320px) minmax(150px, 210px) auto;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-btn,
        .player-search,
        .team-select,
        .reset-btn {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .player-search,
        .team-select {
            width: 100%;
            padding: 0 12px;
            color: var(--text);
            outline: none;
        }

        .player-search {
            cursor: text;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: none;
        }

        .player-search::placeholder {
            color: var(--subtle);
        }

        .filter-btn {
            width: 58px;
        }

        .filter-btn[aria-pressed="true"] {
            border-color: rgba(56, 189, 248, 0.8);
            background: rgba(56, 189, 248, 0.13);
            color: var(--text);
        }

        .reset-btn {
            padding: 0 14px;
            color: var(--text);
        }

        .filter-btn:hover,
        .reset-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .table-shell {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 22px 58px var(--shadow);
        }

        .table-scroll {
            overflow: auto;
            max-height: calc(100vh - 245px);
        }

        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--panel-strong);
        }

        th {
            height: 46px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-align: left;
            text-transform: uppercase;
            white-space: nowrap;
        }

        td {
            height: 52px;
            border-bottom: 1px solid var(--line-soft);
            color: var(--text);
            vertical-align: middle;
        }

        th,
        td {
            padding: 0 14px;
        }

        tbody tr {
            background: rgba(17, 20, 22, 0.54);
            transition: background 120ms ease, opacity 120ms ease;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        tbody tr.dragging {
            opacity: 0.42;
        }

        tbody tr.drop-target {
            background: rgba(250, 204, 21, 0.1);
            outline: 1px solid rgba(250, 204, 21, 0.42);
            outline-offset: -1px;
        }

        .drag-cell {
            width: 50px;
            color: var(--subtle);
            text-align: center;
        }

        .handle {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            color: var(--muted);
            cursor: grab;
            line-height: 1;
        }

        .rank {
            width: 72px;
            color: var(--accent-strong);
            font-weight: 900;
        }

        .player {
            min-width: 260px;
        }

        .tier-row td {
            height: 42px;
            border-bottom-color: rgba(0, 0, 0, 0.24);
            background: transparent;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .tier-row:hover {
            background: transparent;
        }

        .tier-label {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 30px;
            border-radius: 8px;
            background: linear-gradient(90deg, #ef4444, #f97316);
            color: #fff7ed;
            font-size: 16px;
            font-weight: 950;
            letter-spacing: 0.06em;
            padding: 0 14px;
            text-transform: uppercase;
        }

        .player-name {
            display: block;
            font-weight: 800;
        }

        .player-meta {
            display: none;
            margin-top: 3px;
            color: var(--subtle);
            font-size: 12px;
        }

        .pill {
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            height: 26px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            font-size: 12px;
            font-weight: 900;
        }

        .pos-rank {
            color: var(--accent);
            font-weight: 900;
        }

        .num {
            font-variant-numeric: tabular-nums;
        }

        .variance {
            font-weight: 900;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--muted);
        }

        .empty {
            padding: 38px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 860px) {
            .app {
                width: min(100% - 20px, 1380px);
                padding-top: 20px;
            }

            .topbar,
            .controls {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: repeat(3, 1fr);
                min-width: 0;
            }

            .reset-btn {
                width: 100%;
            }

            .table-scroll {
                max-height: none;
            }

            .player-meta {
                display: block;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="topbar" aria-label="Draft board overview">
            <div>
                <p class="eyebrow">2026 Best Ball Utility</p>
                <h1>Interactive Fantasy Football Draft Board</h1>
            </div>
            <div class="summary" aria-label="Ranking summary">
                <div class="metric">
                    <span>Players</span>
                    <strong id="playerCount">0</strong>
                </div>
                <div class="metric">
                    <span>Filter</span>
                    <strong id="filterLabel">ALL</strong>
                </div>
                <div class="metric">
                    <span>Saved</span>
                    <strong id="saveState">Local</strong>
                </div>
            </div>
        </section>

        <section class="controls" aria-label="Draft board controls">
            <nav class="filters" aria-label="Position filters">
                <button class="filter-btn" type="button" data-filter="ALL" aria-pressed="true">ALL</button>
                <button class="filter-btn" type="button" data-filter="QB" aria-pressed="false">QB</button>
                <button class="filter-btn" type="button" data-filter="RB" aria-pressed="false">RB</button>
                <button class="filter-btn" type="button" data-filter="WR" aria-pressed="false">WR</button>
                <button class="filter-btn" type="button" data-filter="TE" aria-pressed="false">TE</button>
            </nav>
            <input class="player-search" id="playerSearch" type="search" placeholder="Search player..." aria-label="Search players" autocomplete="off">
            <select class="team-select" id="teamFilter" aria-label="Team filter">
                <option value="ALL">All Teams</option>
            </select>
            <button class="reset-btn" type="button" id="resetButton">Reset to ADP Base</button>
        </section>

        <section class="table-shell" aria-label="Custom rankings table">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="drag-cell" scope="col">Move</th>
                            <th scope="col">My Rank</th>
                            <th scope="col">Player</th>
                            <th scope="col">Pos</th>
                            <th scope="col">Team</th>
                            <th scope="col">My Pos Rank</th>
                            <th scope="col">Underdog ADP</th>
                            <th scope="col">UD Var</th>
                            <th scope="col">Sleeper ADP</th>
                            <th scope="col">Sleeper Var</th>
                            <th scope="col">Flock Rank</th>
                            <th scope="col">Flock Var</th>
                        </tr>
                    </thead>
                    <tbody id="rankingsBody"></tbody>
                </table>
                <div class="empty" id="emptyState" hidden>No players match this filter.</div>
            </div>
        </section>
    </main>

    <script>
        (() => {
            "use strict";

            const STORAGE_KEY = "myCustomRankings";
            const POSITIONS = ["QB", "RB", "WR", "TE"];
            const SUPABASE_CDN = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            const FLOCK_PROXY_URL = "/api/flock-rankings";
            const FLOCK_DIRECT_URL = "https://api.flockfantasy.com/rankings?format=BEST_BALL&pickType=general";
            const DEFAULT_SYNC_CONFIG = {
                provider: "local",
                supabaseUrl: "",
                supabaseAnonKey: "",
                boardId: "main",
                tableName: "draft_board_states",
            };
            const syncConfig = { ...DEFAULT_SYNC_CONFIG, ...(window.SYNC_CONFIG || {}) };
            const state = {
                items: [],
                flockRanks: {},
                activeFilter: "ALL",
                activeTeam: "ALL",
                searchQuery: "",
                draggedItemId: null,
            };
            let supabaseClientPromise = null;

            const elements = {
                body: document.getElementById("rankingsBody"),
                empty: document.getElementById("emptyState"),
                filters: Array.from(document.querySelectorAll(".filter-btn")),
                playerSearch: document.getElementById("playerSearch"),
                teamFilter: document.getElementById("teamFilter"),
                reset: document.getElementById("resetButton"),
                playerCount: document.getElementById("playerCount"),
                filterLabel: document.getElementById("filterLabel"),
                saveState: document.getElementById("saveState"),
            };

            const basePlayers = () => clonePlayers(window.defaultPlayers || defaultPlayers || []);

            const clonePlayers = (players) => players.map((player, index) => ({
                id: String(player.id || index + 1),
                name: String(player.name || "Unknown Player"),
                pos: POSITIONS.includes(player.pos) ? player.pos : "WR",
                team: String(player.team || "FA"),
                udAdp: Number.isFinite(Number(player.udAdp)) ? Number(player.udAdp) : 999,
                udPick: String(player.udPick || ""),
                sleeperAdp: Number.isFinite(Number(player.sleeperAdp)) ? Number(player.sleeperAdp) : 999,
                sleeperPick: String(player.sleeperPick || ""),
            }));

            const tierLabel = (index) => `Tier ${index + 1}`;

            const tierLabelFromItem = (item, index) => {
                const match = String(item.id || "").match(/^tier-(\d+)$/);
                if (match) {
                    return tierLabel(Number(match[1]) - 1);
                }
                return tierLabel(index);
            };

            const buildDefaultItems = (players) => {
                const items = [];
                players.forEach((player, index) => {
                    if (index % 6 === 0) {
                        const tierIndex = index / 6;
                        items.push({
                            id: `tier-${tierIndex + 1}`,
                            label: tierLabel(tierIndex),
                            type: "tier",
                        });
                    }
                    items.push({
                        id: `player-${player.id}`,
                        playerId: player.id,
                        type: "player",
                    });
                });
                return items;
            };

            const playerItems = () => state.items.filter((item) => item.type === "player");

            const parseSavedState = (saved) => {
                if (saved && Array.isArray(saved.items) && saved.items.length > 0) {
                    return {
                        items: saved.items,
                        order: null,
                    };
                }
                if (saved && Array.isArray(saved.order) && saved.order.length > 0) {
                    return {
                        items: null,
                        order: saved.order.map(String),
                    };
                }
                if (Array.isArray(saved) && saved.length > 0) {
                    return {
                        items: null,
                        order: saved.map((player) => String(player.id)),
                    };
                }
                return { items: null, order: null };
            };

            const localSavedState = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                    return parseSavedState(saved);
                } catch (error) {
                    console.warn("Saved rankings were ignored because they are not valid JSON.", error);
                    return { items: null, order: null };
                }
            };

            const cloudSyncEnabled = () => syncConfig.provider === "supabase"
                && syncConfig.supabaseUrl
                && syncConfig.supabaseAnonKey
                && syncConfig.boardId;

            const loadScript = (src) => new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[src="${src}"]`);
                if (existing) {
                    existing.addEventListener("load", resolve, { once: true });
                    existing.addEventListener("error", reject, { once: true });
                    if (window.supabase) {
                        resolve();
                    }
                    return;
                }
                const script = document.createElement("script");
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            const supabaseClient = async () => {
                if (!cloudSyncEnabled()) {
                    return null;
                }
                if (!supabaseClientPromise) {
                    supabaseClientPromise = (async () => {
                        await loadScript(SUPABASE_CDN);
                        return window.supabase.createClient(syncConfig.supabaseUrl, syncConfig.supabaseAnonKey);
                    })();
                }
                return supabaseClientPromise;
            };

            const remoteSavedState = async () => {
                const client = await supabaseClient();
                if (!client) {
                    return null;
                }
                const { data, error } = await client
                    .from(syncConfig.tableName)
                    .select("state")
                    .eq("board_id", syncConfig.boardId)
                    .maybeSingle();
                if (error) {
                    throw error;
                }
                return data ? parseSavedState(data.state) : null;
            };

            const currentPayload = () => ({
                version: 4,
                items: state.items,
                updatedAt: new Date().toISOString(),
            });

            const persistRemoteState = async (payload) => {
                const client = await supabaseClient();
                if (!client) {
                    return;
                }
                const { error } = await client
                    .from(syncConfig.tableName)
                    .upsert({
                        board_id: syncConfig.boardId,
                        state: payload,
                        updated_at: new Date().toISOString(),
                    });
                if (error) {
                    throw error;
                }
            };

            const loadSavedState = async () => {
                const localState = localSavedState();
                if (!cloudSyncEnabled()) {
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
                try {
                    const remoteState = await remoteSavedState();
                    if (remoteState && (remoteState.items || remoteState.order)) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify({
                            version: 4,
                            items: remoteState.items,
                            updatedAt: new Date().toISOString(),
                        }));
                        return { ...remoteState, source: "Cloud" };
                    }
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                } catch (error) {
                    console.warn("Cloud rankings could not be loaded; using local rankings.", error);
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
            };

            const applySavedOrder = (players, order) => {
                if (!order) {
                    return players;
                }
                const byId = new Map(players.map((player) => [player.id, player]));
                const ordered = order.map((id) => byId.get(id)).filter(Boolean);
                const used = new Set(ordered.map((player) => player.id));
                return ordered.concat(players.filter((player) => !used.has(player.id)));
            };

            const hydrateSavedItems = (players, savedItems) => {
                const byId = new Map(players.map((player) => [player.id, player]));
                const hydrated = [];
                const usedPlayers = new Set();

                savedItems.forEach((item, index) => {
                    if (item.type === "tier") {
                        hydrated.push({
                            id: String(item.id || `tier-saved-${index}`),
                            label: tierLabelFromItem(item, index),
                            type: "tier",
                        });
                    }

                    if (item.type === "player" && byId.has(String(item.playerId))) {
                        const playerId = String(item.playerId);
                        hydrated.push({
                            id: `player-${playerId}`,
                            playerId,
                            type: "player",
                        });
                        usedPlayers.add(playerId);
                    }
                });

                players.forEach((player) => {
                    if (!usedPlayers.has(player.id)) {
                        hydrated.push({
                            id: `player-${player.id}`,
                            playerId: player.id,
                            type: "player",
                        });
                    }
                });

                return hydrated.length > 0 ? hydrated : buildDefaultItems(players);
            };

            const savePlayers = () => {
                const payload = currentPayload();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                elements.saveState.textContent = "Local";
                if (cloudSyncEnabled()) {
                    persistRemoteState(payload)
                        .then(() => {
                            elements.saveState.textContent = "Cloud";
                        })
                        .catch((error) => {
                            console.warn("Cloud rankings could not be saved.", error);
                            elements.saveState.textContent = "Local";
                        });
                }
            };

            const resetPlayers = () => {
                localStorage.removeItem(STORAGE_KEY);
                state.items = buildDefaultItems(basePlayers());
                elements.saveState.textContent = "Base";
                populateTeamFilter();
                render();
            };

            const nameKey = (name) => String(name || "")
                .toLowerCase()
                .replace(/\b(jr|sr|ii|iii|iv|v)\b\.?/g, "")
                .replace(/[^a-z0-9]+/g, "");

            const TEAM_ALIASES = {
                JAX: "JAC",
                JAC: "JAC",
                WAS: "WSH",
                WSH: "WSH",
            };

            const marketTeam = (team) => {
                const normalized = String(team || "").toUpperCase();
                return TEAM_ALIASES[normalized] || normalized;
            };

            const playerMarketKey = (player) => `${nameKey(player.name)}|${marketTeam(player.team)}|${player.pos}`;

            const formatAdp = (adp, pickLabel) => {
                if (adp === 999) {
                    return "N/A";
                }
                const base = Number.isInteger(adp) ? String(adp) : adp.toFixed(1);
                return pickLabel ? `${base} (${pickLabel})` : base;
            };

            const varianceClass = (variance) => {
                if (variance > 0) {
                    return "positive";
                }
                if (variance < 0) {
                    return "negative";
                }
                return "neutral";
            };

            const formatMarketRank = (rank) => {
                if (!Number.isFinite(rank)) {
                    return "N/A";
                }
                return String(Math.round(rank));
            };

            const formatVariance = (marketAdp, myRank) => {
                if (marketAdp === 999) {
                    return { label: "N/A", className: "neutral" };
                }
                const variance = Math.round(marketAdp - myRank);
                const prefix = variance > 0 ? "+" : "";
                return { label: `${prefix}${variance}`, className: varianceClass(variance) };
            };

            const getPositionRanks = () => {
                const counters = { QB: 0, RB: 0, WR: 0, TE: 0 };
                return orderedPlayers().reduce((ranks, player) => {
                    counters[player.pos] += 1;
                    ranks[player.id] = `${player.pos}${counters[player.pos]}`;
                    return ranks;
                }, {});
            };

            const playersById = () => new Map(basePlayers().map((player) => [player.id, player]));

            const orderedPlayers = () => {
                const byId = playersById();
                return playerItems().map((item) => byId.get(item.playerId)).filter(Boolean);
            };

            const createCell = (className, content) => {
                const cell = document.createElement("td");
                if (className) {
                    cell.className = className;
                }
                if (content instanceof Node) {
                    cell.appendChild(content);
                } else {
                    cell.textContent = content;
                }
                return cell;
            };

            const attachDragEvents = (row, itemId) => {
                row.draggable = true;
                row.dataset.itemId = itemId;

                row.addEventListener("dragstart", (event) => {
                    state.draggedItemId = itemId;
                    row.classList.add("dragging");
                    event.dataTransfer.effectAllowed = "move";
                    event.dataTransfer.setData("text/plain", itemId);
                });

                row.addEventListener("dragend", () => {
                    state.draggedItemId = null;
                    row.classList.remove("dragging");
                    document.querySelectorAll(".drop-target").forEach((item) => item.classList.remove("drop-target"));
                });

                row.addEventListener("dragover", (event) => {
                    event.preventDefault();
                    event.dataTransfer.dropEffect = "move";
                    row.classList.add("drop-target");
                });

                row.addEventListener("dragleave", () => {
                    row.classList.remove("drop-target");
                });

                row.addEventListener("drop", (event) => {
                    event.preventDefault();
                    row.classList.remove("drop-target");
                    handleDrop(itemId);
                });
            };

            const handleDrop = (targetItemId) => {
                if (!state.draggedItemId || state.draggedItemId === targetItemId) {
                    return;
                }

                const fromIndex = state.items.findIndex((item) => item.id === state.draggedItemId);
                const toIndex = state.items.findIndex((item) => item.id === targetItemId);
                if (fromIndex < 0 || toIndex < 0) {
                    return;
                }

                const [movedItem] = state.items.splice(fromIndex, 1);
                state.items.splice(toIndex, 0, movedItem);
                savePlayers();
                render();
            };

            const createTierRow = (item) => {
                const row = document.createElement("tr");
                row.className = "tier-row";
                attachDragEvents(row, item.id);

                const handle = document.createElement("span");
                handle.className = "handle";
                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");

                const label = document.createElement("div");
                label.className = "tier-label";
                label.textContent = item.label;

                const labelCell = createCell("", label);
                labelCell.colSpan = 11;
                row.append(createCell("drag-cell", handle), labelCell);
                return row;
            };

            const createPlayerRow = (item, player, globalIndex, posRanks) => {
                const row = document.createElement("tr");
                row.dataset.id = player.id;
                attachDragEvents(row, item.id);
                const myRank = globalIndex + 1;
                const underdogVariance = formatVariance(player.udAdp, myRank);
                const sleeperVariance = formatVariance(player.sleeperAdp, myRank);
                const flockRank = state.flockRanks[playerMarketKey(player)];
                const flockVariance = formatVariance(Number.isFinite(flockRank) ? flockRank : 999, myRank);
                const handle = document.createElement("span");
                handle.className = "handle";
                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");

                const playerCell = document.createElement("div");
                const playerName = document.createElement("span");
                const playerMeta = document.createElement("span");
                playerName.className = "player-name";
                playerName.textContent = player.name;
                playerMeta.className = "player-meta";
                playerMeta.textContent = `${player.pos} / ${player.team}`;
                playerCell.append(playerName, playerMeta);

                row.append(
                    createCell("drag-cell", handle),
                    createCell("rank num", String(myRank)),
                    createCell("player", playerCell),
                    createCell("", makePill(player.pos)),
                    createCell("", player.team),
                    createCell("pos-rank", posRanks[player.id]),
                    createCell("num", formatAdp(player.udAdp, player.udPick)),
                    createCell(`variance num ${underdogVariance.className}`, underdogVariance.label),
                    createCell("num", formatAdp(player.sleeperAdp, player.sleeperPick)),
                    createCell(`variance num ${sleeperVariance.className}`, sleeperVariance.label),
                    createCell("num", formatMarketRank(flockRank)),
                    createCell(`variance num ${flockVariance.className}`, flockVariance.label),
                );

                return row;
            };

            const makePill = (text) => {
                const pill = document.createElement("span");
                pill.className = "pill";
                pill.textContent = text;
                return pill;
            };

            const normalizeSearch = (value) => String(value).toLowerCase().replace(/[^a-z0-9]/g, "");

            const getVisibleItems = () => {
                const byId = playersById();
                const searchQuery = normalizeSearch(state.searchQuery);
                const showTierRows = state.activeFilter === "ALL" && state.activeTeam === "ALL" && !searchQuery;
                let playerIndex = 0;

                return state.items.reduce((visible, item) => {
                    if (item.type === "tier") {
                        if (showTierRows) {
                            visible.push({ item });
                        }
                        return visible;
                    }

                    const player = byId.get(item.playerId);
                    if (!player) {
                        return visible;
                    }

                    const globalIndex = playerIndex;
                    playerIndex += 1;
                    const positionMatch = state.activeFilter === "ALL" || player.pos === state.activeFilter;
                    const teamMatch = state.activeTeam === "ALL" || player.team === state.activeTeam;
                    const searchMatch = !searchQuery || normalizeSearch(player.name).includes(searchQuery);
                    if (positionMatch && teamMatch && searchMatch) {
                        visible.push({ globalIndex, item, player });
                    }
                    return visible;
                }, []);
            };

            const filterLabel = () => {
                const parts = [state.activeFilter];
                if (state.activeTeam !== "ALL") {
                    parts.push(state.activeTeam);
                }
                if (state.searchQuery.trim()) {
                    parts.push("Search");
                }
                return parts.join(" / ");
            };

            const populateTeamFilter = () => {
                const currentTeam = state.activeTeam;
                const teams = Array.from(new Set(orderedPlayers().map((player) => player.team))).sort();
                elements.teamFilter.replaceChildren(new Option("All Teams", "ALL"));
                teams.forEach((team) => {
                    elements.teamFilter.appendChild(new Option(team, team));
                });
                state.activeTeam = teams.includes(currentTeam) ? currentTeam : "ALL";
                elements.teamFilter.value = state.activeTeam;
                elements.playerSearch.value = state.searchQuery;
            };

            const render = () => {
                const visibleItems = getVisibleItems();
                const posRanks = getPositionRanks();
                const fragment = document.createDocumentFragment();
                const visiblePlayerCount = visibleItems.filter(({ player }) => player).length;

                elements.body.replaceChildren();
                visibleItems.forEach(({ item, player, globalIndex }) => {
                    if (item.type === "tier") {
                        fragment.appendChild(createTierRow(item));
                    } else {
                        fragment.appendChild(createPlayerRow(item, player, globalIndex, posRanks));
                    }
                });
                elements.body.appendChild(fragment);

                elements.empty.hidden = visiblePlayerCount > 0;
                elements.playerCount.textContent = String(visiblePlayerCount);
                elements.filterLabel.textContent = filterLabel();
                elements.filters.forEach((button) => {
                    button.setAttribute("aria-pressed", String(button.dataset.filter === state.activeFilter));
                });
                elements.teamFilter.value = state.activeTeam;
            };

            const normalizeFlockRankings = (payload) => {
                const rows = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.data) ? payload.data : []);
                return rows.reduce((rankings, row, index) => {
                    const name = row.playerName || row.player_name || row.name;
                    const team = row.team || row.teamAbbr || row.team_abbr || "";
                    const pos = row.position || row.pos || "";
                    if (!name || !team || !pos) {
                        return rankings;
                    }
                    const rank = index + 1;
                    rankings[`${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}`] = rank;
                    return rankings;
                }, {});
            };

            const fetchJson = async (url) => {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Flock request failed: ${response.status}`);
                }
                return response.json();
            };

            const refreshFlockRanks = async () => {
                try {
                    let payload;
                    try {
                        payload = await fetchJson(FLOCK_PROXY_URL);
                    } catch (proxyError) {
                        payload = await fetchJson(FLOCK_DIRECT_URL);
                    }
                    state.flockRanks = normalizeFlockRankings(payload);
                    render();
                } catch (error) {
                    console.warn("Flock rankings could not be loaded.", error);
                }
            };

            const bindEvents = () => {
                elements.filters.forEach((button) => {
                    button.addEventListener("click", () => {
                        state.activeFilter = button.dataset.filter;
                        render();
                    });
                });

                elements.teamFilter.addEventListener("change", () => {
                    state.activeTeam = elements.teamFilter.value;
                    render();
                });

                elements.playerSearch.addEventListener("input", () => {
                    state.searchQuery = elements.playerSearch.value;
                    render();
                });

                elements.reset.addEventListener("click", resetPlayers);
            };

            const init = async () => {
                const players = basePlayers();
                const saved = await loadSavedState();
                if (saved.items) {
                    state.items = hydrateSavedItems(players, saved.items);
                } else if (saved.order) {
                    state.items = buildDefaultItems(applySavedOrder(players, saved.order));
                } else {
                    state.items = buildDefaultItems(players);
                }
                elements.saveState.textContent = saved.source;
                populateTeamFilter();
                bindEvents();
                render();
                refreshFlockRanks();
            };

            init();
        })();
    </script>
</body>
</html>
