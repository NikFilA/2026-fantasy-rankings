<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>Draft Assistant</h1>
    <button id="openAssistant" type="button">Open Board</button>
    <button id="copyDraftText" type="button">Copy Visible Draft Text</button>
    <textarea id="draftText" readonly placeholder="Copied draft text appears here. Paste it into the board draft input for Underdog/manual imports."></textarea>
    <p id="status">Use this on Sleeper, Underdog, Yahoo, or ESPN draft pages.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
