                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");
                attachDragEvents(row, handle, item.id);

                const label = document.createElement("div");
                label.className = "tier-label";
                label.textContent = item.label;
                applyTierColor(label, item.label);

                const labelCell = createCell("", label);
                labelCell.colSpan = 11 + state.lab.metrics.length;
                row.append(createCell("drag-cell", handle), labelCell);
                return row;
            };

            const createPlayerRow = (item, player, globalIndex, posRanks, tierLabel) => {
                const row = document.createElement("tr");
                row.dataset.id = player.id;
                row.tabIndex = 0;
                const myRank = globalIndex + 1;
                const underdogVariance = formatVariance(player.udAdp, myRank);
                const sleeperVariance = formatVariance(player.sleeperAdp, myRank);
                const playerKey = playerMarketKey(player);
                const flockRank = state.flockRanks[playerKey];
                const flockVariance = formatVariance(Number.isFinite(flockRank) ? flockRank : 999, myRank);
                const handle = document.createElement("span");
                handle.className = "handle";
                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");
                attachDragEvents(row, handle, item.id);

                const isDrafted = state.draft.draftedKeys.has(playerKey);
                const isBestAvailable = state.draft.bestAvailableKey === playerKey;
                row.classList.toggle("drafted", isDrafted);
                row.classList.toggle("best-available", isBestAvailable);

                const playerCell = document.createElement("div");
                const playerMedia = playerImage(player);
                const playerText = document.createElement("div");
                const playerName = document.createElement("span");
                const playerMeta = document.createElement("span");
                playerCell.className = "player-card";
                playerText.className = "player-text";
                playerName.className = "player-name";
                playerName.textContent = player.name;
                if (tierLabel) {
                    const tierBadge = document.createElement("span");
                    tierBadge.className = "tier-chip";
                    tierBadge.textContent = tierLabel;
                    applyTierColor(tierBadge, tierLabel, true);
                    playerName.appendChild(tierBadge);
                }
                if (isDrafted) {
                    const draftedBadge = document.createElement("span");
                    draftedBadge.className = "draft-badge";
                    draftedBadge.textContent = "Gone";
                    playerName.appendChild(draftedBadge);
                } else if (isBestAvailable) {
                    const bestBadge = document.createElement("span");
                    bestBadge.className = "best-badge";
                    bestBadge.textContent = "Best";
                    playerName.appendChild(bestBadge);
                }
                playerMeta.className = "player-meta";
                playerMeta.textContent = `${player.pos} / ${player.team}`;
                playerText.append(playerName, playerMeta);
                const compareButton = document.createElement("label");
                const compareActive = state.compareIds.includes(player.id);
                compareButton.className = `compare-btn${compareActive ? " active" : ""}`;
                compareButton.title = compareActive ? "Remove from comparison" : "Add to comparison";
                const compareCheckbox = document.createElement("input");
                compareCheckbox.type = "checkbox";
                compareCheckbox.checked = compareActive;
                compareCheckbox.dataset.compareId = player.id;
                compareCheckbox.setAttribute("aria-label", compareButton.title);
                compareCheckbox.addEventListener("pointerdown", () => {
                    state.compareScroll = {
                        tableLeft: elements.tableScroll.scrollLeft,
                        tableTop: elements.tableScroll.scrollTop,
                        windowX: window.scrollX,
                        windowY: window.scrollY,
                    };
                });
                compareButton.addEventListener("click", (event) => {
                    event.stopPropagation();
                });
                compareCheckbox.addEventListener("change", () => toggleComparePlayer(player.id));
                compareButton.appendChild(compareCheckbox);
                playerCell.append(playerMedia, playerText, compareButton);

                const rowCells = [
                    createCell("drag-cell", handle),
                    createCell("rank num", String(myRank)),
                    createCell("player", playerCell),
                    createCell("", makePill(player.pos)),
                    createCell("", player.team),
                    createCell("pos-rank", posRanks[player.id]),
                    ...state.lab.metrics.map((metricKey) => createCell("num", metricDisplayValue(player, globalIndex, metricKey))),

            const makePill = (text) => {

            const playerInitials = (player) => {

            const normalizeSearch = (value) => String(value).toLowerCase().replace(/[^a-z0-9]/g, "");

            const LAB_METRICS = {
                myRank: { label: "My Rank", direction: "asc", source: "base", highWins: false },
                age: { label: "Age", direction: "asc", source: "profile", highWins: null },
                finish: { label: "Finish", direction: "asc", source: "performance", highWins: false },
                ppg: { label: "PPG", direction: "desc", source: "performance", highWins: true },
                games: { label: "Games", direction: "desc", source: "yearly", highWins: true },
                targets: { label: "Targets", direction: "desc", source: "yearly", serialIds: ["ReceivingTargets", "Targets"], highWins: true },
                targetsPg: { label: "Targets/G", direction: "desc", source: "yearly", serialIds: ["ReceivingTargets", "Targets"], perGame: true, highWins: true },
                rec: { label: "Rec", direction: "desc", source: "yearly", serialIds: ["Receptions", "ReceivingReceptions"], highWins: true },
                recPg: { label: "Rec/G", direction: "desc", source: "yearly", serialIds: ["Receptions", "ReceivingReceptions"], perGame: true, highWins: true },
                recYds: { label: "Rec Yds", direction: "desc", source: "yearly", serialIds: ["ReceivingYards"], highWins: true },
                recYdsPg: { label: "Rec Yds/G", direction: "desc", source: "yearly", serialIds: ["ReceivingYards"], perGame: true, highWins: true },
                snap: { label: "Snap %", direction: "desc", source: "yearly", serialIds: ["SnapShare"], suffix: "%", highWins: true },
                yprr: { label: "YPRR", direction: "desc", source: "yearly", serialIds: ["YardsPerRouteRun"], highWins: true },
                recTd: { label: "Rec TD", direction: "desc", source: "yearly", serialIds: ["ReceivingTouchdowns"], highWins: true },
                recTdPg: { label: "Rec TD/G", direction: "desc", source: "yearly", serialIds: ["ReceivingTouchdowns"], perGame: true, highWins: true },
                rushAttPg: { label: "Rush Att/G", direction: "desc", source: "yearly", serialIds: ["RushingAttempts"], perGame: true, highWins: true },
                rushYds: { label: "Rush Yds", direction: "desc", source: "yearly", serialIds: ["RushingYards"], highWins: true },
                rushYdsPg: { label: "Rush Yds/G", direction: "desc", source: "yearly", serialIds: ["RushingYards"], perGame: true, highWins: true },
                rushTd: { label: "Rush TD", direction: "desc", source: "yearly", serialIds: ["RushingTouchdowns"], highWins: true },
                rushTdPg: { label: "Rush TD/G", direction: "desc", source: "yearly", serialIds: ["RushingTouchdowns"], perGame: true, highWins: true },
                teamWins: { label: "BP Wins", direction: "desc", source: "team", highWins: true },
                teamTargetShare: { label: "Team Tgt Share", direction: "desc", source: "team", suffix: "%", highWins: true },
                teamPassYds: { label: "Clay Pass Yds", direction: "desc", source: "team", format: "whole", highWins: true },
                teamRushYds: { label: "Clay Rush Yds", direction: "desc", source: "team", format: "whole", highWins: true },
                propRecYds: { label: "Prop Rec Yds", direction: "desc", source: "prop", propKey: "recYds", highWins: true },
                propRecTd: { label: "Prop Rec TD", direction: "desc", source: "prop", propKey: "recTd", highWins: true },
                propRushYds: { label: "Prop Rush Yds", direction: "desc", source: "prop", propKey: "rushYds", highWins: true },
                propRushTd: { label: "Prop Rush TD", direction: "desc", source: "prop", propKey: "rushTd", highWins: true },
            };

            const numericOrNull = (value) => Number.isFinite(Number(value)) ? Number(value) : null;

            const selectedYearStats = (yearly, year = state.profileYear) => {
                const seasons = yearly?.data?.allYearlyStats || [];
                return seasons.find((season) => Number(season.year) === Number(year)) || null;
            };

            const findSeasonStat = (season, serialIds, options = {}) => {
                const ids = Array.isArray(serialIds) ? serialIds : [serialIds];
                const stats = season?.stats || [];
                const context = options.perGame ? "regular_per_game" : "regular";
                return stats.find((item) => ids.includes(item.serial_id) && item.stat_context === context)
                    || stats.find((item) => ids.includes(item.original_serial_id) && item.stat_context === context)
                    || stats.find((item) => ids.includes(item.serial_id) && Boolean(item.stat_context?.includes("per_game")) === Boolean(options.perGame))
                    || stats.find((item) => ids.includes(item.original_serial_id) && Boolean(item.stat_context?.includes("per_game")) === Boolean(options.perGame));
            };

            const seasonStatValue = (yearly, serialIds, options = {}) => {
                const stat = findSeasonStat(selectedYearStats(yearly, options.year), serialIds, options);
                return numericOrNull(stat?.value);
            };

            const seasonGamesValue = (yearly, year = state.profileYear) => {
                const season = selectedYearStats(yearly, year);
                if (!season) {
                    return null;
                }
                const direct = numericOrNull(season.games ?? season.gamesPlayed ?? season.gp ?? season.games_played);
                if (direct !== null) {
                    return direct;
                }
                return seasonStatValue(yearly, ["Games", "GamesPlayed", "GP"], { year });
            };

            const seasonTotalPoints = (performance) => {
                const values = Object.values(performance?.data?.weeklyPointsPerGame || {}).map(Number).filter(Number.isFinite);
                if (values.length) {
                    return values.reduce((total, points) => total + points, 0);
                }
                return numericOrNull(performance?.data?.totalPoints ?? performance?.data?.points);
            };

            const playerAgeValue = (player, flockDetail, performance) => {
                const age = decimalAge(performance?.data?.dob || flockDetail?.dob, flockDetail?.age);
                return age === "N/A" ? null : Number(age);
            };

            const positionRankForValue = (player, valueForPlayer, highWins = true) => {
                const rows = orderedPlayers()
                    .filter((candidate) => candidate.pos === player.pos)
                    .map((candidate) => ({ player: candidate, value: valueForPlayer(candidate) }))
                    .filter((row) => Number.isFinite(row.value))
                    .sort((a, b) => highWins ? b.value - a.value : a.value - b.value);
                const index = rows.findIndex((row) => row.player.id === player.id);
                return index >= 0 ? index + 1 : null;
            };

            const finishValueForPlayer = (player, year = state.profileYear) => {
                const detail = state.flockDetails[playerMarketKey(player)];
                const yearly = yearlyForPlayer(player, detail);
                const officialFinish = seasonStatValue(yearly, `FantasyPointsRank${player.pos}`, { year });
                if (officialFinish !== null) {
                    return officialFinish;
                }
                if (!yearly?.data) {
                    return null;
                }
                return positionRankForValue(player, (candidate) => {
                    const candidateDetail = state.flockDetails[playerMarketKey(candidate)];
                    return seasonTotalPoints(performanceForPlayer(candidate, candidateDetail, year));
                }, true);
            };

            const metricValueForPlayer = (player, globalIndex, metricKey) => {
                const flockDetail = state.flockDetails[playerMarketKey(player)];
                const performance = performanceForPlayer(player, flockDetail);
                const yearly = yearlyForPlayer(player, flockDetail);
                const metric = LAB_METRICS[metricKey];
                if (!metric) {
                    return null;
                }
                if (metricKey === "myRank") {
                    return globalIndex + 1;
                }
                if (metricKey === "age") {
                    return playerAgeValue(player, flockDetail, performance);
                }
                if (metricKey === "finish") {
                    return finishValueForPlayer(player);
                }
                if (metricKey === "ppg") {
                    return numericOrNull(performance?.data?.pointsPerGame ?? flockDetail?.previousYearPprAverage);
                }
                if (metricKey === "games") {
                    return seasonGamesValue(yearly);
                }
                if (metric.source === "team") {
                    return teamMetricValue(player, metricKey);
                }
                if (metric.source === "prop") {
                    return propMetricValue(player, metric);
                }
                if (metric.perGame) {
                    const direct = seasonStatValue(yearly, metric.serialIds, { perGame: true });
                    if (direct !== null) {
                        return direct;
                    }
                    const total = seasonStatValue(yearly, metric.serialIds);
                    const games = seasonGamesValue(yearly);
                    return total !== null && games ? total / games : null;
                }
                return seasonStatValue(yearly, metric.serialIds);
            };

            const sortValue = (entry, posRanks) => {
                if (!entry.player) {
                    return { value: "", missing: true };
                }
                const player = entry.player;
                const myRank = entry.globalIndex + 1;
                const flockRank = state.flockRanks[playerMarketKey(player)];
                const values = {
                    myRank,
                    udAdp: player.udAdp,
                    udVar: player.udAdp === 999 ? Number.POSITIVE_INFINITY : player.udAdp - myRank,
                    sleeperAdp: player.sleeperAdp,
                    sleeperVar: player.sleeperAdp === 999 ? Number.POSITIVE_INFINITY : player.sleeperAdp - myRank,
                    flockRank: Number.isFinite(flockRank) ? flockRank : Number.POSITIVE_INFINITY,
                    flockVar: Number.isFinite(flockRank) ? flockRank - myRank : Number.POSITIVE_INFINITY,
                };
                const value = state.sort.key?.startsWith("metric:")
                    ? metricValueForPlayer(player, entry.globalIndex, state.sort.key.replace("metric:", ""))
                    : values[state.sort.key];
                const missing = value === null || value === Number.POSITIVE_INFINITY || value === undefined || Number.isNaN(value);
                return { value, missing };
            };

            const hasConsensusMarketCoverage = (player) => {
                const flockRank = state.flockRanks[playerMarketKey(player)];
                return player.udAdp !== 999 && player.sleeperAdp !== 999 && Number.isFinite(flockRank);
            };

            const sortedVisibleItems = (visibleItems, posRanks) => {
                if (!state.sort.key) {
                    return visibleItems;
                }
                const direction = state.sort.direction === "desc" ? -1 : 1;
                return visibleItems
                    .filter(({ player }) => player)
                    .filter(({ player }) => state.sort.key !== "udVar" || hasConsensusMarketCoverage(player))
                    .slice()
                    .sort((a, b) => {
                        const left = sortValue(a, posRanks);
                        const right = sortValue(b, posRanks);
                        if (left.missing !== right.missing) {
                            return left.missing ? 1 : -1;
                        }
                        if (typeof left.value === "string" || typeof right.value === "string") {
                            const compared = String(left.value).localeCompare(String(right.value));
                            return compared === 0 ? a.globalIndex - b.globalIndex : compared * direction;
                        }
                        if (left.value === right.value) {
                            return a.globalIndex - b.globalIndex;
                        }
                        return left.value > right.value ? direction : -direction;
                    });
            };

            const updateSortButtons = () => {
                elements.sortButtons.forEach((button) => {
                    const direction = button.dataset.sort === state.sort.key ? state.sort.direction : "";
                    button.dataset.direction = direction;
                    button.setAttribute("aria-sort", direction || "none");
                });
            };

            const cycleSort = (key) => {
                if (state.sort.key !== key) {
                    state.sort = { key, direction: key.startsWith("metric:") ? "desc" : "asc" };
                } else if (state.sort.direction === "asc") {
                    state.sort = { key, direction: "desc" };
                } else {
                    state.sort = { key: "", direction: "" };
                }
                render();
            };

            const playerContext = (playerId) => {
                const byId = playersById();
                let playerIndex = 0;
                let currentTierLabel = "";
                for (const item of state.items) {
                    if (item.type === "tier") {
                        currentTierLabel = item.label;
                        continue;
                    }
                    const player = byId.get(item.playerId);
                    if (!player) {
                        continue;
                    }
                    const globalIndex = playerIndex;
                    playerIndex += 1;
                    if (player.id === String(playerId)) {
                        return { item, player, globalIndex, tierLabel: currentTierLabel };
                    }
                }
                return null;
            };

            const detailCard = (label, value, className = "") => {
                const card = document.createElement("div");
                card.className = "detail-card";
                const labelNode = document.createElement("span");
                const valueNode = document.createElement("strong");
                labelNode.textContent = label;
                valueNode.textContent = value;
                if (className) {
                    valueNode.className = className;
                }
                card.append(labelNode, valueNode);
                return card;
            };

            const formatDecimal = (value) => {
                const number = Number(value);
                if (!Number.isFinite(number)) {
                    return "N/A";
                }
                return Number.isInteger(number) ? String(number) : number.toFixed(1);
            };

            const formatWhole = (value) => {
                const number = Number(value);
                if (!Number.isFinite(number)) {
                    return "N/A";
                }
                return Math.round(number).toLocaleString();
            };

            const formatPercent = (value) => {
                const number = Number(value);
                if (!Number.isFinite(number)) {
                    return "N/A";
                }
                return `${Math.round(number)}%`;
            };

            const decimalAge = (dob, fallbackAge) => {
                if (dob) {
                    const born = new Date(dob);
                    if (!Number.isNaN(born.getTime())) {
                        const years = (Date.now() - born.getTime()) / (365.25 * 24 * 60 * 60 * 1000);
                        return formatDecimal(years);
                    }
                }
                return Number.isFinite(Number(fallbackAge)) ? formatDecimal(fallbackAge) : "N/A";
            };

            const formatPerformanceKey = (playerId, year = state.profileYear) => `${playerId}|${year}`;

            const formatYearlyKey = (playerId) => String(playerId);

            const performancePlayerId = (player, flockDetail) => {
                const asset = state.playerAssets[playerMarketKey(player)];
                return String(flockDetail?.playerId || asset?.id || player.id || "");
            };

            const performanceForPlayer = (player, flockDetail, year = state.profileYear) => {
                const playerId = performancePlayerId(player, flockDetail);
                return playerId ? state.playerPerformance[formatPerformanceKey(playerId, year)] : null;
            };

            const yearlyForPlayer = (player, flockDetail) => {
                const playerId = performancePlayerId(player, flockDetail);
                return playerId ? state.playerYearlyStats[formatYearlyKey(playerId)] : null;
            };

            const refreshPlayerPerformance = async (player, flockDetail, year = state.profileYear, options = {}) => {
                const playerId = performancePlayerId(player, flockDetail);
                if (!playerId) {
                    return;
                }
                const key = formatPerformanceKey(playerId, year);
                if (state.playerPerformance[key]?.loading || state.playerPerformance[key]?.data || state.playerPerformance[key]?.error) {
                    return;
                }
                state.playerPerformance[key] = { loading: true, data: null, error: "" };
                try {
                    let payload;
                    try {
                        payload = await fetchJson(`${FLOCK_PERFORMANCE_PROXY_URL}?playerId=${encodeURIComponent(playerId)}&year=${year}`);
                    } catch (proxyError) {
                        payload = await fetchJson(`${FLOCK_PERFORMANCE_DIRECT_URL}/${encodeURIComponent(playerId)}/performance?year=${year}`);
                    }
                    state.playerPerformance[key] = { loading: false, data: payload, error: "" };
                } catch (error) {
                    console.warn("Flock player performance could not be loaded.", error);
                    state.playerPerformance[key] = { loading: false, data: null, error: "Performance data unavailable" };
                }
                if (options.silent) {
                    return;
                }
                if (state.selectedPlayerId === player.id && !elements.playerDrawerBackdrop.hidden) {
                    openPlayerDetails(player.id, { preserveYear: true });
                } else if (!state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                    openComparisonDetails();
                }
            };

            const refreshYearlyStats = async (player, flockDetail, options = {}) => {
                const playerId = performancePlayerId(player, flockDetail);
                if (!playerId) {
                    return;
                }
                const key = formatYearlyKey(playerId);
                if (state.playerYearlyStats[key]?.loading || state.playerYearlyStats[key]?.data || state.playerYearlyStats[key]?.error) {
                    return;
                }
                state.playerYearlyStats[key] = { loading: true, data: null, error: "" };
                try {
                    let payload;
                    try {
                        payload = await fetchJson(`${FLOCK_YEARLY_PROXY_URL}?playerId=${encodeURIComponent(playerId)}`);
                    } catch (proxyError) {
                        payload = await fetchJson(`${FLOCK_PERFORMANCE_DIRECT_URL}/${encodeURIComponent(playerId)}/yearly`);
                    }
                    state.playerYearlyStats[key] = { loading: false, data: payload, error: "" };
                } catch (error) {
                    console.warn("Flock yearly stats could not be loaded.", error);
                    state.playerYearlyStats[key] = { loading: false, data: null, error: "Yearly stats unavailable" };

                if (options.silent) {
                    return;

                if (state.selectedPlayerId === player.id && !elements.playerDrawerBackdrop.hidden) {

                    openComparisonDetails();

            const weeklyPoints = (performance) => {
                const pointsByWeek = Object.entries(performance?.data?.weeklyPointsPerGame || {})
                    .reduce((weeks, [week, points]) => {
                        const weekNumber = Number(week);
                        const value = Number(points);
                        if (Number.isFinite(weekNumber) && Number.isFinite(value)) {
                            weeks.set(weekNumber, value);
                        }
                        return weeks;
                    }, new Map());
                return Array.from({ length: 18 }, (_, index) => {
                    const week = index + 1;
                    const hasData = pointsByWeek.has(week);
                    return { week, points: hasData ? pointsByWeek.get(week) : 0, hasData };

            const playerProfileImageUrl = (flockDetail, player) => {

            const formatStatValue = (value, suffix = "") => value === null ? "N/A" : `${formatDecimal(value)}${suffix}`;

            const positionStatDefinitions = (pos) => {

                        ["Games", "Games", ""],
                        ["Targets", "ReceivingTargets", ""],
                        ["Rec", "Receptions", ""],
                        ["Rush Att", "RushingAttempts", ""],
                        ["Rush Yds", "RushingYards", ""],
                        ["Rec Yds", "ReceivingYards", ""],
                        ["Rush TD", "RushingTouchdowns", ""],
                        ["Snap %", "SnapShare", "%"],
                        ["Rec TD", "ReceivingTouchdowns", ""],
                    ];

                return [
                    ["Games", "Games", ""],

            const positionStatsGrid = (player, yearly) => {

                    const valueNode = document.createElement("strong");
                    labelNode.textContent = label;
                    const value = serialId === "Games" ? seasonGamesValue(yearly) : seasonStatValue(yearly, serialId);
                    valueNode.textContent = formatStatValue(value, suffix);
                    card.append(labelNode, valueNode);
                    grid.appendChild(card);

            const bettingPropsSection = (player) => {

            const teamContextSection = (player) => {

                const heading = document.createElement("h3");
                const grid = document.createElement("div");
                const clay = clayTeamProjection(player.team);

                const offense = clay?.offense || {};
                const positions = clay?.positions || {};
                section.className = "drawer-section";
                heading.textContent = `${player.team} Team Context`;
                grid.className = "betting-props-grid";

                const card = (label, value, detail = "", rank = null) => {
                    const node = document.createElement("div");
                    const labelNode = document.createElement("span");
                    const valueNode = document.createElement("strong");
                    const detailNode = document.createElement("small");
                    const rankNode = document.createElement("b");
                    node.className = `betting-prop-card team-context-card ${rankClass(rank?.rank, rank?.total)}`;
                    labelNode.textContent = label;
                    valueNode.textContent = value;
                    detailNode.textContent = detail;
                    if (rank?.rank && rank?.total) {
                        rankNode.className = "rank-chip";
                        rankNode.textContent = `${rank.rank}/${rank.total}`;
                        node.appendChild(rankNode);
                    }
                    node.append(labelNode, valueNode, detailNode);
                    return node;
                };

                if (state.teamFutures.loading) {
                    grid.appendChild(card("BettingPros Wins", "Loading", "Season win total"));
                } else if (future) {
                    grid.appendChild(card(
                        "BettingPros Wins",
                        bettingLineLabel(future),
                        `O ${formatAmericanOdds(future.overCost)} / U ${formatAmericanOdds(future.underCost)}`,
                        rankAmongFutures(player.team)
                    ));
                } else {
                    grid.appendChild(card("BettingPros Wins", "N/A", state.teamFutures.error || "No win total available"));
                }

                if (!clay) {
                    grid.appendChild(card("Mike Clay", "N/A", "Team projection unavailable"));
                    section.append(heading, grid);
                    return section;
                }

                const positionShareCard = ["RB", "WR", "TE"].includes(player.pos)
                    ? (() => {
                        const posTargets = Number(positions[player.pos]?.targets);
                        const share = teamPositionShare(clay, player.pos);
                        return card(
                            `${player.pos} Target Share`,
                            formatPercent(share),
                            `${formatWhole(posTargets)} targets / ${formatWhole(positions[player.pos]?.ppr)} PPR`,
                            rankAmongTeams(player.team, (projection) => teamPositionShare(projection, player.pos))
                        );
                    })()
                    : null;

                grid.append(
                    ...(positionShareCard ? [positionShareCard] : []),
                    card(
                        "Clay Passing",
                        formatWhole(offense.passYds),
                        `${formatWhole(offense.passAtt)} att / ${formatWhole(offense.passTd)} TD`,
                        rankAmongTeams(player.team, (projection) => projection.offense?.passYds)
                    ),
                    card(
                        "Clay Rushing",
                        formatWhole(offense.rushYds),
                        `${formatWhole(offense.rushAtt)} att / ${formatWhole(offense.rushTd)} TD`,
                        rankAmongTeams(player.team, (projection) => projection.offense?.rushYds)
                    )
                );
                section.append(heading, grid);
                return section;
            };

            const profilePlayerIds = () => sortedVisibleItems(getVisibleItems(), getPositionRanks())
                .filter(({ player }) => player)
                .map(({ player }) => player.id);

            const adjacentPlayerId = (playerId, offset) => {
                const ids = profilePlayerIds();
                const index = ids.indexOf(String(playerId));
                if (index < 0 || ids.length === 0) {
                    return "";
                }
                return ids[(index + offset + ids.length) % ids.length];
            };

            const profileNavButton = (label, playerId, offset) => {
                const button = document.createElement("button");
                button.className = `profile-nav ${offset < 0 ? "prev" : "next"}`;
                button.type = "button";
                button.textContent = label;
                button.addEventListener("click", () => {
                    const nextId = adjacentPlayerId(playerId, offset);
                    if (nextId) {
                        openPlayerDetails(nextId, { preserveYear: true });
                    }
                });
                return button;
            };

            const yearTabs = (playerId) => {
                const tabs = document.createElement("span");
                tabs.className = "year-tabs";
                [2025, 2024, 2023].forEach((year) => {
                    const button = document.createElement("button");
                    button.className = `year-tab${Number(state.profileYear) === year ? " active" : ""}`;
                    button.type = "button";
                    button.textContent = String(year);
                    button.addEventListener("click", () => {
                        state.profileYear = year;
                        openPlayerDetails(playerId, { preserveYear: true });
                    });
                    tabs.appendChild(button);
                });
                return tabs;
            };

            const comparisonYearForPlayer = (playerId) => Number(state.compareYears[playerId]) || PLAYER_PROFILE_SEASON;

            const comparisonYearTabs = (playerId) => {
                const tabs = document.createElement("span");
                tabs.className = "year-tabs";
                const activeYear = comparisonYearForPlayer(playerId);
                [2025, 2024, 2023].forEach((year) => {
                    const button = document.createElement("button");
                    button.className = `year-tab${activeYear === year ? " active" : ""}`;
                    button.type = "button";
                    button.textContent = String(year);
                    button.addEventListener("click", () => {
                        state.compareYears[playerId] = year;
                        state.comparisonRankLoadKey = "";
                        openComparisonDetails();
                    });
                    tabs.appendChild(button);
                });
                return tabs;
            };

            const profileStatStrip = (player, flockDetail, performance, flockRank, myRank) => {
                const strip = document.createElement("div");
                strip.className = "modal-stat-strip";
                const perf = performance?.data;
                const ppg = perf?.pointsPerGame ?? flockDetail?.previousYearPprAverage;
                const finish = finishValueForPlayer(player);
                const delta = Number(perf?.ownership?.underdogAdpDelta7d ?? flockDetail?.rankDelta);
                const deltaLabel = Number.isFinite(delta) ? `${delta > 0 ? "+" : ""}${formatDecimal(delta)}` : "N/A";
                strip.append(
                    detailCard("My Rank", String(myRank)),
                    detailCard("Finish", finish ? `${player.pos}${finish}` : "N/A"),
                    detailCard("PPG", formatDecimal(ppg)),
                    detailCard("Age", decimalAge(perf?.dob || flockDetail?.dob, flockDetail?.age)),
                    detailCard("Pos", player.pos),
                    detailCard("Team", player.team)
                );
                return strip;
            };

            const performanceChart = (performance) => {
                const section = document.createElement("section");
                section.className = "drawer-section";
                const heading = document.createElement("h3");
                heading.textContent = "Player Performance / Season ";
                heading.appendChild(yearTabs(state.selectedPlayerId));
                const chart = document.createElement("div");
                chart.className = "performance-chart";
                const rows = weeklyPoints(performance);
                if (performance?.loading) {
                    chart.textContent = "Loading game log...";
                } else if (!performance?.data) {
                    chart.textContent = performance?.error || "Game log unavailable.";
                } else {
                    const maxPoints = Math.max(1, ...rows.map((row) => row.points));
                    rows.forEach((row) => {
                        const bar = document.createElement("div");
                        bar.className = "week-bar";
                        const track = document.createElement("div");
                        const stack = document.createElement("div");
                        const label = document.createElement("span");
                        const fill = document.createElement("div");
                        const week = document.createElement("span");
                        track.className = "bar-track";
                        stack.className = "bar-stack";
                        stack.style.height = `${Math.max(4, (row.points / maxPoints) * 100)}%`;
                        label.className = "bar-value";
                        label.textContent = row.hasData ? formatDecimal(row.points) : "0";
                        fill.className = row.hasData
                            ? `bar-fill${row.points < 10 ? " low" : row.points < 20 ? " mid" : ""}`
                            : "bar-fill inactive";
                        fill.style.height = "100%";
                        week.textContent = String(row.week);
                        stack.append(label, fill);
                        track.appendChild(stack);
                        bar.append(track, week);
                        chart.appendChild(bar);
                    });
                }
                section.append(heading, chart);
                return section;
            };

            const captureBoardScroll = () => ({
                tableLeft: elements.tableScroll.scrollLeft,
                tableTop: elements.tableScroll.scrollTop,
                windowX: window.scrollX,
                windowY: window.scrollY,
            });

            const restoreBoardScroll = (scroll) => {
                if (!scroll) {
                    return;
                }
                requestAnimationFrame(() => {
                    elements.tableScroll.scrollLeft = scroll.tableLeft;
                    elements.tableScroll.scrollTop = scroll.tableTop;
                    window.scrollTo(scroll.windowX, scroll.windowY);
                });
            };

            const closePlayerDetails = () => {
                const restoreScroll = state.drawerReturnScroll;
                state.selectedPlayerId = "";
                elements.playerDrawerBackdrop.hidden = true;
                document.body.classList.remove("drawer-open");
                elements.playerDrawerContent.className = "";
                elements.playerDrawerContent.replaceChildren();
                state.drawerReturnScroll = null;
                restoreBoardScroll(restoreScroll);
            };

            const comparisonEntry = (playerId, shouldRefresh = true, forcedYear = null) => {
                const context = playerContext(playerId);
                if (!context) {
                    return null;
                }
                const { player, globalIndex } = context;
                const year = Number(forcedYear) || comparisonYearForPlayer(player.id);
                const myRank = globalIndex + 1;
                const posRanks = getPositionRanks();
                const playerKey = playerMarketKey(player);
                const flockRank = state.flockRanks[playerKey];
                const flockDetail = state.flockDetails[playerKey];
                if (shouldRefresh) {
                    refreshPlayerPerformance(player, flockDetail, year);
                    refreshYearlyStats(player, flockDetail);
                }
                const performance = performanceForPlayer(player, flockDetail, year);
                const yearly = yearlyForPlayer(player, flockDetail);
                const betProps = playerBettingProps(player);
                return { player, myRank, posRank: posRanks[player.id] || "N/A", flockDetail, flockRank, performance, yearly, year, betProps };
            };

            const posRankNumber = (rank) => {
                const match = String(rank || "").match(/\d+/);
                return match ? Number(match[0]) : null;
            };

            const comparisonMetricDefinitions = (entries) => {
                const positionStats = [];
                const bettingStats = [];
                const seen = new Set();
                const seenBetting = new Set();
                const teamStats = [
                    {
                        category: "Team Context",
                        label: "Team",
                        highWins: null,
                        value: () => 0,
                        display: (entry) => displayTeam(entry.player.team),
                    },
                    {
                        category: "Team Context",
                        label: "BettingPros Wins",
                        highWins: true,
                        value: (entry) => teamMetricValue(entry.player, "teamWins"),
                        display: (entry) => formatDecimal(teamMetricValue(entry.player, "teamWins")),
                    },
                    {
                        category: "Team Context",
                        label: "Pos Target Share",
                        highWins: true,
                        value: (entry) => teamMetricValue(entry.player, "teamTargetShare"),
                        display: (entry) => {
                            const share = teamMetricValue(entry.player, "teamTargetShare");
                            return share === null ? "N/A" : `${entry.player.pos} ${formatPercent(share)}`;
                        },
                    },
                    {
                        category: "Team Context",
                        label: "Clay Passing",
                        highWins: true,
                        value: (entry) => teamMetricValue(entry.player, "teamPassYds"),
                        display: (entry) => formatWhole(teamMetricValue(entry.player, "teamPassYds")),
                    },
                    {
                        category: "Team Context",
                        label: "Clay Rushing",
                        highWins: true,
                        value: (entry) => teamMetricValue(entry.player, "teamRushYds"),
                        display: (entry) => formatWhole(teamMetricValue(entry.player, "teamRushYds")),
                    },
                ];
                entries.forEach(({ player }) => {
                    positionStatDefinitions(player.pos).forEach(([label, serialId, suffix]) => {
                        if (!seen.has(label)) {
                            seen.add(label);
                            positionStats.push({
                                category: "Production",
                                label,
                                highWins: true,
                                rankable: true,
                                requiresYearly: true,
                                loading: (entry) => entry.yearly?.loading,
                                value: (entry) => serialId === "Games" ? seasonGamesValue(entry.yearly, entry.year) : seasonStatValue(entry.yearly, serialId, { year: entry.year }),
                                display: (entry) => entry.yearly?.loading ? "Loading" : formatStatValue(serialId === "Games" ? seasonGamesValue(entry.yearly, entry.year) : seasonStatValue(entry.yearly, serialId, { year: entry.year }), suffix),
                            });
                        }
                        const perGameLabel = `${label}/G`;
                        if (label !== "Games" && suffix !== "%" && !seen.has(perGameLabel)) {
                            seen.add(perGameLabel);
                            positionStats.push({
                                category: "Production",
                                label: perGameLabel,
                                highWins: true,
                                rankable: true,
                                requiresYearly: true,
                                loading: (entry) => entry.yearly?.loading,
                                value: (entry) => {
                                    const direct = seasonStatValue(entry.yearly, serialId, { perGame: true, year: entry.year });
                                    if (direct !== null) {
                                        return direct;
                                    }
                                    const total = seasonStatValue(entry.yearly, serialId, { year: entry.year });
                                    const games = seasonGamesValue(entry.yearly, entry.year);
                                    return total !== null && games ? total / games : null;
                                },
                                display: (entry) => {
                                    if (entry.yearly?.loading) {
                                        return "Loading";
                                    }
                                    const direct = seasonStatValue(entry.yearly, serialId, { perGame: true, year: entry.year });
                                    if (direct !== null) {
                                        return `${formatDecimal(direct)}${suffix}`;
                                    }
                                    const total = seasonStatValue(entry.yearly, serialId, { year: entry.year });
                                    const games = seasonGamesValue(entry.yearly, entry.year);
                                    return total !== null && games ? `${formatDecimal(total / games)}${suffix}` : "N/A";
                                },
                            });
                        }
                    });
                });
                entries.forEach((entry) => {
                    entry.betProps.forEach((prop) => {
                        if (seenBetting.has(prop.key)) {
                            return;
                        }
                        seenBetting.add(prop.key);
                        bettingStats.push({
                            category: "Props",
                            label: prop.label,
                            highWins: true,
                            rankable: false,
                            value: (candidate) => {
                                const match = candidate.betProps.find((item) => item.key === prop.key);
                                return match ? Number(match.line) : null;
                            },
                            display: (candidate) => {
                                const match = candidate.betProps.find((item) => item.key === prop.key);
                                return match ? `${bettingLineLabel(match)} O ${formatAmericanOdds(match.overCost)}` : "N/A";
                            },
                        });
                    });
                });
                return [
                    { category: "My Board", label: "My Rank", highWins: false, value: (entry) => entry.myRank, display: (entry) => String(entry.myRank) },
                    { category: "My Board", label: "My Pos Rank", highWins: false, value: (entry) => posRankNumber(entry.posRank), display: (entry) => entry.posRank },
                    { category: "Markets", label: "Underdog ADP", highWins: false, value: (entry) => entry.player.udAdp === 999 ? null : entry.player.udAdp, display: (entry) => formatAdp(entry.player.udAdp, entry.player.udPick) },
                    ...bettingStats,
                    ...teamStats,
                    { category: "Production", label: "Finish", highWins: false, rankable: false, requiresYearly: true, loading: (entry) => entry.yearly?.loading, value: (entry) => finishValueForPlayer(entry.player, entry.year), display: (entry) => {
                        if (entry.yearly?.loading) {
                            return "Loading";
                        }
                        const finish = finishValueForPlayer(entry.player, entry.year);
                        return finish ? `${entry.player.pos}${finish}` : "N/A";
                    } },
                    { category: "Production", label: "PPG", highWins: true, rankable: true, requiresPerformance: true, loading: (entry) => entry.performance?.loading, value: comparisonPpgValue, display: (entry) => entry.performance?.loading ? "Loading" : formatDecimal(comparisonPpgValue(entry)) },
                    ...positionStats,
                ];
            };

            const comparisonPpgValue = (entry) => numericOrNull(
                entry.performance?.data?.pointsPerGame
                    ?? (Number(entry.year) === PLAYER_PROFILE_SEASON ? entry.flockDetail?.previousYearPprAverage : null)
            );

            const comparisonPositionRank = (entry, metric) => {
                if (!metric.rankable || metric.highWins === null) {
                    return null;
                }
                if (metric.requiresYearly && positionRankDataPending(entry.player.pos, entry.year)) {
                    return null;
                }
                if (metric.requiresPerformance && positionPerformanceDataPending(entry.player.pos, entry.year)) {
                    return null;
                }
                return positionRankForValue(entry.player, (candidate) => {
                    const candidateEntry = comparisonEntry(candidate.id, false, entry.year);
                    return candidateEntry ? metric.value(candidateEntry) : null;
                }, metric.highWins);
            };

            const positionRankDataPending = (pos, year) => orderedPlayers()
                .filter((player) => player.pos === pos)
                .some((player) => {
                    const detail = state.flockDetails[playerMarketKey(player)];
                    const playerId = performancePlayerId(player, detail);
                    if (!playerId) {
                        return false;
                    }
                    const yearly = state.playerYearlyStats[formatYearlyKey(playerId)];
                    return !yearly || yearly.loading;
                });

            const positionPerformanceDataPending = (pos, year) => orderedPlayers()
                .filter((player) => player.pos === pos)
                .some((player) => {
                    const detail = state.flockDetails[playerMarketKey(player)];
                    const playerId = performancePlayerId(player, detail);
                    if (!playerId) {
                        return false;
                    }
                    const performance = state.playerPerformance[formatPerformanceKey(playerId, year)];
                    return !performance || performance.loading;
                });

            const ensureComparisonRankData = async (entries) => {
                const positionYears = [...new Set(entries.map((entry) => `${entry.player.pos}|${entry.year}`))].sort();
                const loadKey = positionYears.join(",");
                if (!loadKey || state.comparisonRankLoadKey === loadKey) {
                    return;
                }
                state.comparisonRankLoadKey = loadKey;
                const tasks = orderedPlayers().flatMap((player) => positionYears
                    .filter((positionYear) => positionYear.startsWith(`${player.pos}|`))
                    .map((positionYear) => () => {
                        const year = Number(positionYear.split("|")[1]);
                        const detail = state.flockDetails[playerMarketKey(player)];
                        return Promise.all([
                            refreshYearlyStats(player, detail, { silent: true }),
                            refreshPlayerPerformance(player, detail, year, { silent: true }),
                        ]);
                    }));
                for (let index = 0; index < tasks.length; index += 12) {
                    await Promise.all(tasks.slice(index, index + 12).map((task) => task()));
                }
                if (!state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                    openComparisonDetails();
                }
            };

            const comparisonPlayerHeader = (entry) => {
                const playerCard = document.createElement("div");
                const text = document.createElement("div");
                const name = document.createElement("strong");
                const meta = document.createElement("span");
                playerCard.className = "comparison-player";
                name.textContent = entry.player.name;
                meta.textContent = `${entry.posRank} / ${entry.player.team}`;
                text.append(name, meta, comparisonYearTabs(entry.player.id));
                playerCard.append(profileImage(entry.player, entry.flockDetail), text);
                return playerCard;
            };

            const comparisonCell = (metric, entry, winnerValue) => {
                const cell = document.createElement("div");
                const value = metric.value(entry);
                cell.className = "comparison-cell";
                const rank = comparisonPositionRank(entry, metric);
                cell.textContent = `${metric.display(entry)}${rank ? ` (${rank})` : ""}`;
                if (!Number.isFinite(value)) {
                    cell.classList.add("missing");
                }
                if (metric.highWins !== null && Number.isFinite(value) && value === winnerValue) {
                    cell.classList.add("winner");
                }
                return cell;
            };

            const openComparisonDetails = () => {
                if (state.compareIds.length < 2) {
                    return;
                }
                const wasOpen = !elements.playerDrawerBackdrop.hidden && elements.playerDrawerContent.classList.contains("comparison-board");
                if (elements.playerDrawerBackdrop.hidden) {
                    state.drawerReturnScroll = captureBoardScroll();
                }
                const restoreScrollTop = elements.playerDrawerBackdrop.scrollTop;
                state.selectedPlayerId = "";
                const entries = state.compareIds.map(comparisonEntry).filter(Boolean);
                ensureComparisonRankData(entries);
                const title = document.createElement("h2");
                const subtitle = document.createElement("div");
                const header = document.createElement("div");
                const table = document.createElement("div");
                const template = `92px repeat(${entries.length}, minmax(190px, 1fr))`;
                title.id = "playerDrawerTitle";
                title.textContent = "Player Comparison";
                subtitle.className = "drawer-subtitle";
                subtitle.textContent = `${entries.length} selected players`;
                header.className = "drawer-section";
                header.append(title, subtitle);
                table.className = "comparison-table";

                const playerRow = document.createElement("div");
                const emptyLabel = document.createElement("div");
                playerRow.className = "comparison-row";
                playerRow.style.gridTemplateColumns = template;
                emptyLabel.className = "comparison-label";
                emptyLabel.textContent = "Player";
                playerRow.append(emptyLabel, ...entries.map(comparisonPlayerHeader));
                table.appendChild(playerRow);

                let currentCategory = "";
                comparisonMetricDefinitions(entries).forEach((metric) => {
                    const category = metric.category || "Other";
                    if (category !== currentCategory) {
                        currentCategory = category;
                        const sectionRow = document.createElement("div");
                        const sectionLabel = document.createElement("div");
                        sectionRow.className = "comparison-row comparison-section-row";
                        sectionRow.style.gridTemplateColumns = template;
                        sectionLabel.className = "comparison-section";
                        sectionLabel.textContent = category;
                        sectionLabel.style.gridColumn = `1 / ${entries.length + 2}`;
                        sectionRow.appendChild(sectionLabel);
                        table.appendChild(sectionRow);
                    }
                    const values = entries.map(metric.value).filter((value) => Number.isFinite(value));
                    const winnerValue = metric.highWins === null || values.length === 0
                        ? null
                        : (metric.highWins ? Math.max(...values) : Math.min(...values));
                    const row = document.createElement("div");
                    const label = document.createElement("div");
                    row.className = `comparison-row ${category.toLowerCase().replace(/[^a-z]+/g, "-")}`;
                    row.style.gridTemplateColumns = template;
                    label.className = "comparison-label";
                    label.textContent = metric.label;
                    row.append(label, ...entries.map((entry) => comparisonCell(metric, entry, winnerValue)));
                    table.appendChild(row);
                });

                elements.playerDrawerContent.className = "comparison-board";
                elements.playerDrawerContent.replaceChildren(header, table);
                elements.playerDrawerBackdrop.hidden = false;
                document.body.classList.add("drawer-open");
                requestAnimationFrame(() => {
                    elements.playerDrawerBackdrop.scrollTop = wasOpen ? restoreScrollTop : 0;
                });
            };

            const openPlayerDetails = (playerId, options = {}) => {
                const context = playerContext(playerId);
                if (!context) {
                    return;
                }
                if (elements.playerDrawerBackdrop.hidden) {
                    state.drawerReturnScroll = captureBoardScroll();
                }
                if (options.resetYear || !options.preserveYear) {
                    state.profileYear = PLAYER_PROFILE_SEASON;
                }
                elements.playerDrawerContent.className = "";
                state.selectedPlayerId = String(playerId);
                const { player, globalIndex, tierLabel } = context;
                const myRank = globalIndex + 1;
                const posRanks = getPositionRanks();
                const playerKey = playerMarketKey(player);
                const flockRank = state.flockRanks[playerKey];
                const flockDetail = state.flockDetails[playerKey];
                const underdogVariance = formatVariance(player.udAdp, myRank);
                const sleeperVariance = formatVariance(player.sleeperAdp, myRank);
                const flockVariance = formatVariance(Number.isFinite(flockRank) ? flockRank : 999, myRank);
                const isDrafted = state.draft.draftedKeys.has(playerKey);

                const head = document.createElement("div");
                head.className = "drawer-head";
                const titleWrap = document.createElement("div");
                const title = document.createElement("h2");
                title.id = "playerDrawerTitle";
                title.textContent = player.name;
                const subtitle = document.createElement("div");
                subtitle.className = "drawer-subtitle";
                subtitle.textContent = `${tierLabel || "No tier"} / ${player.pos} / ${player.team}${isDrafted ? " / Drafted" : ""}`;
                titleWrap.append(title, subtitle);
                head.append(
                    profileImage(player, flockDetail),
                    titleWrap,
                    profileStatStrip(player, flockDetail, performanceForPlayer(player, flockDetail), flockRank, myRank)
                );

                const myGrid = document.createElement("div");
                myGrid.className = "detail-grid";
                myGrid.append(
                    detailCard("My Rank", String(myRank)),
                    detailCard("My Pos Rank", posRanks[player.id] || "N/A"),
                    detailCard("Underdog ADP", formatAdp(player.udAdp, player.udPick)),
                    detailCard("UD Var", underdogVariance.label, underdogVariance.className),
                    detailCard("Sleeper ADP", formatAdp(player.sleeperAdp, player.sleeperPick)),
                    detailCard("Sleeper Var", sleeperVariance.label, sleeperVariance.className),
                    detailCard("Flock Rank", formatMarketRank(flockRank)),
                    detailCard("Flock Var", flockVariance.label, flockVariance.className)
                );

                elements.playerDrawerContent.replaceChildren(
                    profileNavButton("<", player.id, -1),
                    profileNavButton(">", player.id, 1),
                    head,
                    myGrid
                );
                elements.playerDrawerBackdrop.hidden = false;
                document.body.classList.add("drawer-open");
                elements.playerDrawerBackdrop.scrollTop = 0;

                try {
                    const performance = performanceForPlayer(player, flockDetail);
                    const yearly = yearlyForPlayer(player, flockDetail);
                    elements.playerDrawerContent.append(positionStatsGrid(player, yearly), teamContextSection(player), bettingPropsSection(player), performanceChart(performance));
                    refreshPlayerPerformance(player, flockDetail);
                    refreshYearlyStats(player, flockDetail);
                } catch (error) {
                    console.warn("Player detail stats could not be rendered.", error);
                }
            };
            const getVisibleItems = () => {
                const byId = playersById();
                const searchQuery = normalizeSearch(state.searchQuery);
                const hasLabFilter = hasLabCriteria();
                const showTierRows = state.selectedPositions.size === 0 && state.activeTeam === "ALL" && !searchQuery && !state.availableOnly && !state.sort.key && !hasLabFilter;
                let playerIndex = 0;
                let currentTierLabel = "";

                return state.items.reduce((visible, item) => {
                    if (item.type === "tier") {
                        currentTierLabel = item.label;
                        if (showTierRows) {
                            visible.push({ item });
                        }
                        return visible;
                    }

                    const player = byId.get(item.playerId);
                    if (!player) {
                        return visible;
                    }

                    const globalIndex = playerIndex;
                    playerIndex += 1;
                    const playerKey = playerMarketKey(player);
                    const positionMatch = state.selectedPositions.size === 0 || state.selectedPositions.has(player.pos);
                    const teamMatch = state.activeTeam === "ALL" || displayTeam(player.team) === displayTeam(state.activeTeam);
                    const searchMatch = !searchQuery || normalizeSearch(player.name).includes(searchQuery);
                    const availabilityMatch = !state.availableOnly || !state.draft.active || !state.draft.draftedKeys.has(playerKey);
                    if (positionMatch && teamMatch && searchMatch && availabilityMatch && metricFilterMatch(player, globalIndex)) {
                        visible.push({ globalIndex, item, player, tierLabel: showTierRows ? "" : currentTierLabel });
                    }
                    return visible;
                }, []);
            };

            const filterLabel = () => {
                const parts = [state.selectedPositions.size ? Array.from(state.selectedPositions).join(" / ") : "ALL"];
                if (state.activeTeam !== "ALL") {
                    parts.push(displayTeam(state.activeTeam));
                }
                if (state.searchQuery.trim()) {
                    parts.push("Search");
                }
                return parts.join(" / ");
            };

            const populateTeamFilter = () => {
                const currentTeam = displayTeam(state.activeTeam);
                const teams = Array.from(new Set(orderedPlayers().map((player) => displayTeam(player.team)))).sort();
                elements.teamFilter.replaceChildren(new Option("All Teams", "ALL"));
                teams.forEach((team) => {
                    elements.teamFilter.appendChild(new Option(team, team));
                });
                state.activeTeam = teams.includes(currentTeam) ? currentTeam : "ALL";
                elements.teamFilter.value = state.activeTeam;
                elements.playerSearch.value = state.searchQuery;
                elements.availableOnly.checked = state.availableOnly;
            };

            const hasLabCriteria = () => state.lab.metrics.length > 0;

            const metricLabel = (metricKey) => LAB_METRICS[metricKey]?.label || "Metric";

            const metricDisplayValue = (player, globalIndex, metricKey) => {
                const metric = LAB_METRICS[metricKey];
                const value = metricValueForPlayer(player, globalIndex, metricKey);
                if (value === null) {
                    return "N/A";
                }
                if (metricKey === "finish") {
                    return `${player.pos}${value}`;
                }
                if (metric?.format === "whole") {
                    return formatWhole(value);
                }
                return `${formatDecimal(value)}${metric?.suffix || ""}`;
            };

            const metricFilterMatch = (player, globalIndex) => state.lab.metrics.every((metricKey) => {
                const filter = state.lab.filters[metricKey] || {};
                const min = filter.min === "" || filter.min === undefined ? null : Number(filter.min);
                const max = filter.max === "" || filter.max === undefined ? null : Number(filter.max);
                if (min === null && max === null) {
                    return true;
                }
                const value = metricValueForPlayer(player, globalIndex, metricKey);
                if (!Number.isFinite(value)) {
                    return false;
                }
                return (min === null || value >= min) && (max === null || value <= max);
            });

            const addMetricColumn = (metricKey = elements.metricSelect.value) => {
                if (!metricKey || state.lab.metrics.includes(metricKey)) {
                    return;
                }
                state.lab.metrics.push(metricKey);
                state.lab.filters[metricKey] = { min: "", max: "" };
                render();
                loadDataLabStats();
            };

            const removeMetricColumn = (metricKey) => {
                state.lab.metrics = state.lab.metrics.filter((item) => item !== metricKey);
                delete state.lab.filters[metricKey];
                if (state.sort.key === `metric:${metricKey}`) {
                    state.sort = { key: "", direction: "" };
                }
                render();
            };

            const renderMetricHeaders = () => {
                elements.rankingsHeadRow.querySelectorAll(".metric-col").forEach((column) => column.remove());
                const anchor = elements.rankingsHeadRow.querySelector("[data-metric-anchor]");
                state.lab.metrics.forEach((metricKey) => {
                    const metric = LAB_METRICS[metricKey];
                    const header = document.createElement("th");
                    const button = document.createElement("button");
                    header.className = "metric-col";
                    button.className = "sort-btn";
                    button.type = "button";
                    button.dataset.sort = `metric:${metricKey}`;
                    button.textContent = metric?.label || metricKey;
                    button.addEventListener("click", () => cycleSort(button.dataset.sort));
                    header.appendChild(button);
                    anchor.before(header);
                });
                elements.sortButtons = Array.from(document.querySelectorAll(".sort-btn"));
                updateSortButtons();
            };

            const renderMetricChips = () => {
                elements.metricChips.replaceChildren();
                if (state.lab.metrics.length === 0) {
                    const empty = document.createElement("span");
                    empty.className = "lab-status";
                    empty.textContent = "No metric columns selected.";
                    elements.metricChips.appendChild(empty);
                    return;
                }
                state.lab.metrics.forEach((metricKey) => {
                    const metric = LAB_METRICS[metricKey];
                    const filter = state.lab.filters[metricKey] || { min: "", max: "" };
                    const chip = document.createElement("div");
                    const label = document.createElement("strong");
                    const min = document.createElement("input");
                    const max = document.createElement("input");
                    const remove = document.createElement("button");
                    chip.className = "metric-chip";
                    label.textContent = metric?.label || metricKey;
                    min.type = "number";
                    min.step = "0.1";
                    min.placeholder = "Min";
                    min.value = filter.min || "";
                    max.type = "number";
                    max.step = "0.1";
                    max.placeholder = "Max";
                    max.value = filter.max || "";
                    remove.className = "chip-remove";
                    remove.type = "button";
                    remove.textContent = "x";
                    remove.title = `Remove ${label.textContent}`;
                    min.addEventListener("input", () => {
                        state.lab.filters[metricKey].min = min.value;
                        render();
                        loadDataLabStats();
                    });
                    max.addEventListener("input", () => {
                        state.lab.filters[metricKey].max = max.value;
                        render();
                        loadDataLabStats();
                    });
                    remove.addEventListener("click", () => removeMetricColumn(metricKey));
                    chip.append(label, min, max, remove);
                    elements.metricChips.appendChild(chip);
                });
            };

            const toggleComparePlayer = (playerId) => {
                const id = String(playerId);
                if (state.compareIds.includes(id)) {
                    state.compareIds = state.compareIds.filter((item) => item !== id);
                    delete state.compareYears[id];
                } else {
                    state.compareIds = state.compareIds.concat(id);
                    state.compareIds.forEach((compareId) => {
                        state.compareYears[compareId] ||= PLAYER_PROFILE_SEASON;
                    });
                    Object.keys(state.compareYears).forEach((compareId) => {
                        if (!state.compareIds.includes(compareId)) {
                            delete state.compareYears[compareId];
                        }
                    });
                }
                state.comparisonRankLoadKey = "";
                updateCompareButtons();
                renderComparePanel();
                if (state.compareScroll) {
                    const restoreScroll = state.compareScroll;
                    requestAnimationFrame(() => {
                        elements.tableScroll.scrollLeft = restoreScroll.tableLeft;
                        elements.tableScroll.scrollTop = restoreScroll.tableTop;
                        window.scrollTo(restoreScroll.windowX, restoreScroll.windowY);
                        state.compareScroll = null;
                    });
                }
                loadDataLabStats();
            };

            const updateCompareButtons = () => {
                document.querySelectorAll(".compare-btn").forEach((label) => {
                    const input = label.querySelector("input");
                    const checked = state.compareIds.includes(input?.dataset.compareId || "");
                    label.classList.toggle("active", checked);
                    if (input) {
                        input.checked = checked;
                        input.setAttribute("aria-label", checked ? "Remove from comparison" : "Add to comparison");
                    }
                    label.title = checked ? "Remove from comparison" : "Add to comparison";
                });
            };

            const renderComparePanel = () => {
                const byId = playersById();
                elements.compareGrid.replaceChildren();
                elements.compareOpen.disabled = state.compareIds.length < 2;
                elements.compareClear.disabled = state.compareIds.length === 0;
                if (state.compareIds.length === 0) {
                    return;
                }

                state.compareIds.forEach((playerId) => {
                    const player = byId.get(playerId);
                    if (!player) {
                        return;
                    }
                    const card = document.createElement("div");
                    card.className = "compare-card";
                    card.textContent = player.name;
                    elements.compareGrid.appendChild(card);
                });
            };

            const updateLabStatus = (visiblePlayerCount) => {
                if (state.lab.loading) {
                    elements.labStatus.textContent = "Loading advanced stats...";
                } else if (hasLabCriteria()) {
                    elements.labStatus.textContent = `${visiblePlayerCount} rows match selected metrics.`;
                } else {
                    elements.labStatus.textContent = "Add metrics to create sortable stat columns.";
                }
            };

            const render = () => {
                updateDraftStatus();
                const visibleItems = getVisibleItems();
                const posRanks = getPositionRanks();
                const displayItems = sortedVisibleItems(visibleItems, posRanks);
                const fragment = document.createDocumentFragment();
                const visiblePlayerCount = visibleItems.filter(({ player }) => player).length;

                elements.body.replaceChildren();
                displayItems.forEach(({ item, player, globalIndex, tierLabel }) => {
                    if (item.type === "tier") {
                        fragment.appendChild(createTierRow(item));
                    } else {
                        fragment.appendChild(createPlayerRow(item, player, globalIndex, posRanks, tierLabel));
                    }
                });
                elements.body.appendChild(fragment);

                elements.empty.hidden = visiblePlayerCount > 0;
                elements.playerCount.textContent = String(visiblePlayerCount);
                elements.filterLabel.textContent = filterLabel();
                elements.filters.forEach((button) => {
                    const filter = button.dataset.filter;
                    const pressed = filter === "ALL" ? state.selectedPositions.size === 0 : state.selectedPositions.has(filter);
                    button.setAttribute("aria-pressed", String(pressed));
                });
                elements.teamFilter.value = state.activeTeam;
                renderMetricHeaders();
                renderMetricChips();
                updateLabStatus(visiblePlayerCount);
                renderComparePanel();
            };

            const normalizeFlockRankings = (payload) => {
                const rows = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.data) ? payload.data : []);
                return rows.reduce((result, row, index) => {
                    const name = row.playerName || row.player_name || row.name;
                    const team = row.team || row.teamAbbr || row.team_abbr || "";
                    const pos = row.position || row.pos || "";
                    if (!name || !team || !pos) {
                        return result;
                    }
                    const key = `${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}`;
                    const rank = index + 1;
                    result.ranks[key] = rank;
                    result.details[key] = { ...row, listRank: rank };
                    return result;
                }, { ranks: {}, details: {} });
            };

            const fetchJson = async (url) => {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Request failed: ${response.status}`);
                }
                return response.json();
            };

            const refreshFantasyProsAdp = async () => {
                try {
                    const payload = await fetchJson(FANTASYPROS_ADP_PROXY_URL);
                    const adpRows = Array.isArray(payload?.players) ? payload.players : [];
                    const adpByKey = new Map(adpRows.map((row) => [
                        `${nameKey(row.name)}|${marketTeam(row.team)}|${String(row.pos || "").toUpperCase()}`,
                        row,
                    ]));
                    const adpByNamePos = new Map();
                    adpRows.forEach((row) => {
                        const key = `${nameKey(row.name)}|${String(row.pos || "").toUpperCase()}`;
                        if (adpByNamePos.has(key)) {
                            adpByNamePos.set(key, null);
                            return;
                        }
                        adpByNamePos.set(key, row);
                    });
