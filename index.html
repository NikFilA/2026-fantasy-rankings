                    let updated = 0;
                    sourcePlayers().forEach((player) => {
                        const row = adpByKey.get(playerMarketKey(player)) || adpByNamePos.get(`${nameKey(player.name)}|${player.pos}`);
                        const adp = Number(row?.underdogAdp);
                        if (!Number.isFinite(adp)) {
                            return;
                        }
                        if (row.team) {
                            state.livePlayerMeta[`${nameKey(player.name)}|${player.pos}`] = {
                                ...(state.livePlayerMeta[`${nameKey(player.name)}|${player.pos}`] || {}),
                                team: row.team,
                                pos: player.pos,
                            };
                        }
                        player.udAdp = adp;
                        player.udPick = row.underdogPick || pickLabelFromAdp(adp);
                        updated += 1;
                    });
                    if (updated) {
                        applyLivePlayerMeta();
                        populateTeamFilter();
                        render();
                    }
                } catch (error) {
                    console.warn("FantasyPros Underdog ADP could not be loaded.", error);
                }
            };

            const refreshBettingProps = async () => {
                if (state.bettingProps.loading) {
                    return;
                }
                state.bettingProps = { ...state.bettingProps, loading: true, error: "" };
                try {
                    const payload = await fetchJson(BETTING_PROPS_PROXY_URL);
                    const byKey = {};
                    const byNamePos = {};
                    (payload?.players || []).forEach((player) => {
                        const props = Array.isArray(player.props) ? player.props : [];
                        const row = { ...player, props };
                        byKey[`${nameKey(player.name)}|${marketTeam(player.team)}|${String(player.pos || "").toUpperCase()}`] = row;
                        const fallbackKey = `${nameKey(player.name)}|${String(player.pos || "").toUpperCase()}`;
                        if (byNamePos[fallbackKey]) {
                            byNamePos[fallbackKey] = null;
                        } else {
                            byNamePos[fallbackKey] = row;
                        }
                    });
                    state.bettingProps = {
                        loading: false,
                        byKey,
                        byNamePos,
                        updatedAt: payload?.updatedAt || "",
                        source: payload?.source || "",
                        error: "",
                    };
                    render();
                    if (state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openPlayerDetails(state.selectedPlayerId, { preserveYear: true });
                    } else if (!state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openComparisonDetails();
                    }
                } catch (error) {
                    console.warn("BettingPros player futures could not be loaded.", error);
                    state.bettingProps = { ...state.bettingProps, loading: false, error: "Betting lines unavailable." };
                    render();
                }
            };

            const refreshTeamFutures = async () => {
                if (state.teamFutures.loading) {
                    return;
                }
                state.teamFutures = { ...state.teamFutures, loading: true, error: "" };
                try {
                    const payload = await fetchJson(TEAM_FUTURES_PROXY_URL);
                    const byTeam = {};
                    (payload?.teams || []).forEach((team) => {
                        byTeam[marketTeam(team.team)] = team;
                    });
                    state.teamFutures = {
                        loading: false,
                        byTeam,
                        updatedAt: payload?.updatedAt || "",
                        source: payload?.source || "",
                        error: "",
                    };
                    render();
                    if (state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openPlayerDetails(state.selectedPlayerId, { preserveYear: true });
                    } else if (!state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openComparisonDetails();
                    }
                } catch (error) {
                    console.warn("BettingPros team futures could not be loaded.", error);
                    state.teamFutures = { ...state.teamFutures, loading: false, error: "Team win total unavailable." };
                    render();
                }
            };

            const refreshFlockRanks = async () => {
                try {
                    let payload;
                    try {
                        payload = await fetchJson(FLOCK_PROXY_URL);
                    } catch (proxyError) {
                        payload = await fetchJson(FLOCK_DIRECT_URL);
                    }
                    const flockData = normalizeFlockRankings(payload);
                    state.flockRanks = flockData.ranks;
                    state.flockDetails = flockData.details;
                    render();
                    if (state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openPlayerDetails(state.selectedPlayerId);
                    }
                } catch (error) {
                    console.warn("Flock rankings could not be loaded.", error);
                }
            };

            const normalizeSleeperPlayers = (payload) => {
                const rows = Array.isArray(payload)
                    ? payload
                    : Object.values(payload || {}).map((player) => ({
                        id: player.player_id,
                        name: player.full_name || `${player.first_name || ""} ${player.last_name || ""}`.trim(),
                        pos: player.position,
                        team: player.team,
                    }));
                const assets = {};
                const sleeperKeyById = {};
                rows.forEach((row) => {
                    const id = String(row.id || row.player_id || "");
                    const name = row.name || row.full_name;
                    const pos = row.pos || row.position;
                    const team = row.team;
                    if (!id || !name || !pos || !team || !POSITIONS.includes(String(pos).toUpperCase())) {
                        return;
                    }
                    const position = String(pos).toUpperCase();
                    const namePosKey = `${nameKey(name)}|${position}`;
                    const key = `${nameKey(name)}|${marketTeam(team)}|${position}`;
                    state.livePlayerMeta[namePosKey] = {
                        ...(state.livePlayerMeta[namePosKey] || {}),
                        team,
                        pos: position,
                    };
                    assets[key] = {
                        id,
                        imageUrl: `https://sleepercdn.com/content/nfl/players/thumb/${id}.jpg`,
                    };
                    sleeperKeyById[id] = key;
                });
                applyLivePlayerMeta();
                state.playerAssets = assets;
                state.sleeperKeyById = sleeperKeyById;
            };

            const refreshSleeperPlayers = async () => {
                try {
                    let payload;
                    try {
                        payload = await fetchJson(SLEEPER_PLAYERS_PROXY_URL);
                    } catch (proxyError) {
                        payload = await fetchJson(SLEEPER_PLAYERS_DIRECT_URL);
                    }
                    normalizeSleeperPlayers(payload);
                    render();
                } catch (error) {
                    console.warn("Sleeper player images could not be loaded.", error);
                }
            };

            const refreshMarketData = async () => {
                await Promise.allSettled([refreshFantasyProsAdp(), refreshSleeperPlayers()]);
                await Promise.allSettled([refreshFlockRanks(), refreshBettingProps(), refreshTeamFutures()]);
            };

            const draftIdFromInput = (value) => {
                const input = String(value || "").trim();
                const draftPathMatch = input.match(/draft\/(?:nfl\/)?(\d+)/i);
                if (draftPathMatch) {
                    return draftPathMatch[1];
                }
                const idMatch = input.match(/\d{8,}/);
                return idMatch ? idMatch[0] : "";
            };

            const pickDraftSlot = (pick) => String(pick.draft_slot || pick.metadata?.draft_slot || pick.roster_id || "");

            const pickPosition = (pick) => {
                const pos = String(pick.metadata?.position || "").toUpperCase();
                return POSITIONS.includes(pos) ? pos : "";
            };

            const draftTeamCount = () => {
                const settingsTeams = Number(state.draft.details?.settings?.teams || state.draft.details?.teams || 0);
                if (settingsTeams > 0) {
                    return settingsTeams;
                }
                const pickSlots = state.draft.picks.map((pick) => Number(pickDraftSlot(pick))).filter((slot) => Number.isFinite(slot));
                return pickSlots.length ? Math.max(...pickSlots) : 12;
            };

            const populateMySlotOptions = () => {
                const current = state.draft.myRosterId;
                const teamCount = draftTeamCount();
                elements.mySlot.replaceChildren(new Option("My Slot", ""));
                for (let slot = 1; slot <= teamCount; slot += 1) {
                    elements.mySlot.appendChild(new Option(`Slot ${slot}`, String(slot)));
                }
                if (current && Number(current) >= 1 && Number(current) <= teamCount) {
                    elements.mySlot.value = current;
                } else {
                    state.draft.myRosterId = "";
                    elements.mySlot.value = "";
                }
            };

            const myRosterCounts = () => {
                const counts = Object.fromEntries(POSITIONS.map((pos) => [pos, 0]));
                if (!state.draft.myRosterId) {
                    return { counts, total: 0 };
                }
                let total = 0;
                state.draft.picks.forEach((pick) => {
                    if (pickDraftSlot(pick) !== state.draft.myRosterId) {
                        return;
                    }
                    const pos = pickPosition(pick);
                    if (pos) {
                        counts[pos] += 1;
                        total += 1;
                    }
                });
                return { counts, total };
            };

            const updateRosterTracker = () => {
                const { counts, total } = myRosterCounts();
                const label = state.draft.myRosterId ? `My roster · Slot ${state.draft.myRosterId} · ${total} picks` : "My roster · choose slot";
                elements.rosterTracker.replaceChildren();
                const labelNode = document.createElement("span");
                labelNode.textContent = label;
                elements.rosterTracker.appendChild(labelNode);
                POSITIONS.forEach((pos) => {
                    const pill = document.createElement("span");
                    pill.className = "roster-pill";
                    pill.textContent = `${pos} ${counts[pos]}`;
                    elements.rosterTracker.appendChild(pill);
                });
            };

            const keyFromDraftPick = (pick) => {
                const sleeperId = String(pick.player_id || pick.metadata?.player_id || "");
                if (sleeperId && state.sleeperKeyById[sleeperId]) {
                    return state.sleeperKeyById[sleeperId];
                }
                const metadata = pick.metadata || {};
                const firstName = metadata.first_name || metadata.firstName || "";
                const lastName = metadata.last_name || metadata.lastName || "";
                const name = metadata.player_name || metadata.name || `${firstName} ${lastName}`.trim();
                const team = metadata.team || "";
                const pos = metadata.position || "";
                return name && team && pos ? `${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}` : "";
            };

            const playerShortDraftKey = (player) => {
                const parts = String(player.name || "").split(/\s+/).filter(Boolean);
                const first = parts[0] || "";
                const last = parts.slice(1).join(" ") || first;
                return `${first[0] || ""}|${nameKey(last)}|${marketTeam(player.team)}|${player.pos}`.toLowerCase();
            };

            const keyFromUnderdogPick = (shortName, pos, team) => {
                const shortParts = String(shortName || "").replace(/\s+/g, " ").trim().split(" ");
                const initial = String(shortParts[0] || "").replace(/[^A-Za-z]/g, "")[0] || "";
                const last = shortParts.slice(1).join(" ") || shortParts[0] || "";
                const lookup = `${initial}|${nameKey(last)}|${marketTeam(team)}|${String(pos || "").toUpperCase()}`.toLowerCase();
                const player = basePlayers().find((candidate) => playerShortDraftKey(candidate) === lookup);
                return player ? playerMarketKey(player) : "";
            };

            const underdogDraftUrl = (value) => /app\.underdogsports\.com\/draft\/[0-9a-f-]{20,}/i.test(String(value || ""));

            const underdogDraftKeysFromText = (value) => {
                const text = String(value || "").replace(/\s+/g, " ");
                const pattern = /(?:\d+\.\d+\|\d+\s+)([A-Z]\.\s*(?:[A-Z]\.\s*)?[A-Za-z][A-Za-z.'-]*(?:\s+[A-Za-z][A-Za-z.'-]*){0,2})\s+(QB|RB|WR|TE)\s*-\s*([A-Z]{2,3})/g;
                const keys = new Set();
                let match = pattern.exec(text);
                while (match) {
                    const key = keyFromUnderdogPick(match[1], match[2], match[3]);
                    if (key) {
                        keys.add(key);
                    }
                    match = pattern.exec(text);
                }
                return keys;
            };

            const findBestAvailable = () => {
                const byId = playersById();
                for (const item of state.items) {
                    if (item.type !== "player") {
                        continue;
                    }
                    const player = byId.get(item.playerId);
                    if (player && !state.draft.draftedKeys.has(playerMarketKey(player))) {
                        return player;
                    }
                }
                return null;
            };

            const updateDraftStatus = () => {
                if (!state.draft.active) {
                    elements.draftBest.textContent = "Best available: Off";
                    elements.draftStatus.textContent = "Paste a Sleeper draft link or copied Underdog board when you are drafting.";
                    elements.draftStatus.className = "";
                    updateRosterTracker();
                    return;
                }
                if (state.draft.error) {
                    state.draft.bestAvailableKey = "";
                    elements.draftBest.textContent = "Best available: Off";
                    elements.draftStatus.textContent = state.draft.error;
                    elements.draftStatus.className = "error";
                    return;
                }
                const best = findBestAvailable();
                state.draft.bestAvailableKey = best ? playerMarketKey(best) : "";
                elements.draftBest.textContent = best ? `Best available: ${best.name}` : "Best available: None";
                if (state.draft.provider === "underdog") {
                    const synced = state.draft.lastSync ? state.draft.lastSync.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }) : "not imported";
                    elements.draftStatus.textContent = `Underdog manual import · ${state.draft.draftedKeys.size} picked · imported ${synced}`;
                    elements.draftStatus.className = "";
                    updateRosterTracker();
                    return;
                }
                const picked = state.draft.picks.length;
                const synced = state.draft.lastSync ? state.draft.lastSync.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }) : "not synced";
                elements.draftStatus.textContent = `Draft ${state.draft.id} · ${picked} picked · synced ${synced}`;
                elements.draftStatus.className = "";
                updateRosterTracker();
            };

            const refreshDraftDetails = async () => {
                const details = await fetchJson(`${SLEEPER_DRAFT_BASE_URL}/${state.draft.id}`);
                state.draft.details = details;
                populateMySlotOptions();
            };

            const refreshDraftPicks = async () => {
                if (state.draft.provider !== "sleeper" || !state.draft.id || state.draft.loading) {
                    return;
                }
                state.draft.loading = true;
                try {
                    const picks = await fetchJson(`${SLEEPER_DRAFT_BASE_URL}/${state.draft.id}/picks`);
                    const draftedKeys = new Set();
                    picks.forEach((pick) => {
                        const key = keyFromDraftPick(pick);
                        if (key) {
                            draftedKeys.add(key);
                        }
                    });
                    state.draft.picks = picks;
                    state.draft.draftedKeys = draftedKeys;
                    populateMySlotOptions();
                    state.draft.error = "";
                    state.draft.lastSync = new Date();
                } catch (error) {
                    console.warn("Sleeper draft could not be synced.", error);
                    state.draft.error = "Could not sync Sleeper draft. Check the draft ID.";
                } finally {
                    state.draft.loading = false;
                    updateDraftStatus();
                    render();
                }
            };

            const stopDraftSync = () => {
                if (draftTimer) {
                    clearInterval(draftTimer);
                    draftTimer = null;
                }
                state.draft.active = false;
                state.draft.provider = "sleeper";
                state.draft.error = "";
                state.draft.draftedKeys = new Set();
                state.draft.bestAvailableKey = "";
                state.draft.details = null;
                state.draft.myRosterId = "";
                state.draft.picks = [];
                localStorage.removeItem(DRAFT_STORAGE_KEY);
                localStorage.removeItem(MY_SLOT_STORAGE_KEY);
                populateMySlotOptions();
                render();
            };

            const startDraftSync = async (rawValue) => {
                const rawInput = String(rawValue || "").trim();
                const underdogKeys = underdogDraftKeysFromText(rawInput);
                if (underdogKeys.size > 0) {
                    if (draftTimer) {
                        clearInterval(draftTimer);
                        draftTimer = null;
                    }
                    state.draft.provider = "underdog";
                    state.draft.id = "underdog-manual";
                    state.draft.active = true;
                    state.draft.error = "";
                    state.draft.details = null;
                    state.draft.myRosterId = "";
                    state.draft.picks = [];
                    state.draft.draftedKeys = underdogKeys;
                    state.draft.lastSync = new Date();
                    localStorage.removeItem(DRAFT_STORAGE_KEY);
                    localStorage.removeItem(MY_SLOT_STORAGE_KEY);
                    populateMySlotOptions();
                    updateDraftStatus();
                    render();
                    return;
                }
                if (underdogDraftUrl(rawInput)) {
                    if (draftTimer) {
                        clearInterval(draftTimer);
                        draftTimer = null;
                    }
                    state.draft.provider = "underdog";
                    state.draft.id = "underdog-url";
                    state.draft.active = true;
                    state.draft.error = "Underdog links are not supported. Paste copied draft-board text from the Underdog room to import picks.";
                    state.draft.draftedKeys = new Set();
                    state.draft.bestAvailableKey = "";
                    localStorage.removeItem(DRAFT_STORAGE_KEY);
                    populateMySlotOptions();
                    updateDraftStatus();
                    render();
                    return;
                }
                const draftId = draftIdFromInput(rawValue);
                if (!draftId) {
                    state.draft.provider = "sleeper";
                    state.draft.active = true;
                    state.draft.error = "Paste a valid Sleeper draft URL or ID.";
                    updateDraftStatus();
                    return;
                }
                if (draftTimer) {
                    clearInterval(draftTimer);
                }
                state.draft.provider = "sleeper";
                state.draft.id = draftId;
                state.draft.active = true;
                state.draft.error = "";
                elements.draftInput.value = draftId;
                localStorage.setItem(DRAFT_STORAGE_KEY, draftId);
                try {
                    await refreshDraftDetails();
                } catch (error) {
                    console.warn("Sleeper draft details could not be loaded.", error);
                }
                await refreshDraftPicks();
                draftTimer = setInterval(refreshDraftPicks, DRAFT_REFRESH_MS);
            };

            const loadDataLabStats = async () => {
                if (state.lab.loading || !hasLabCriteria()) {
                    return;
                }
                const metrics = state.lab.metrics.map((metricKey) => LAB_METRICS[metricKey]).filter(Boolean);
                const needsPerformance = metrics.some((metric) => metric.source === "performance" || metric.source === "profile");
                const needsYearly = metrics.some((metric) => metric.source === "yearly");
                if (!needsPerformance && !needsYearly) {
                    return;
                }

                const entries = getVisibleItems().filter(({ player }) => player);
                const tasks = entries.flatMap(({ player }) => {
                    const flockDetail = state.flockDetails[playerMarketKey(player)];
                    const jobs = [];
                    if (needsPerformance) {
                        jobs.push(() => refreshPlayerPerformance(player, flockDetail));
                    }
                    if (needsYearly) {
                        jobs.push(() => refreshYearlyStats(player, flockDetail));
                    }
                    return jobs;
                });
                if (!tasks.length) {
                    return;
                }

                state.lab.loading = true;
                render();
                try {
                    for (let index = 0; index < tasks.length; index += 8) {
                        await Promise.all(tasks.slice(index, index + 8).map((task) => task()));
                    }
                } finally {
                    state.lab.loading = false;
                    render();
                }
            };

            const bindTableDragScroll = () => {
                const scrollArea = elements.tableScroll;
                let pointerId = null;
                let startX = 0;
                let startY = 0;
                let startScrollLeft = 0;
                let startScrollTop = 0;
                let hasDragged = false;
                let captureStarted = false;

                const canStartScroll = (event) => {
                    if (event.button !== 0 || state.draggedItemId) {
                        return false;
                    }
                    return !closestElement(event.target, ".handle, button, input, select, a");
                };

                scrollArea.addEventListener("pointerdown", (event) => {
                    if (!canStartScroll(event)) {
                        return;
                    }
                    pointerId = event.pointerId;
                    startX = event.clientX;
                    startY = event.clientY;
                    startScrollLeft = scrollArea.scrollLeft;
                    startScrollTop = scrollArea.scrollTop;
                    hasDragged = false;
                    captureStarted = false;
                });

                scrollArea.addEventListener("pointermove", (event) => {
                    if (pointerId !== event.pointerId) {
                        return;
                    }
                    const deltaX = event.clientX - startX;
                    const deltaY = event.clientY - startY;
                    if (Math.abs(deltaX) > 4 || Math.abs(deltaY) > 4) {
                        hasDragged = true;
                        scrollArea.classList.add("drag-scrolling");
                        if (!captureStarted) {
                            scrollArea.setPointerCapture(pointerId);
                            captureStarted = true;
                        }
                    }
                    if (hasDragged) {
                        event.preventDefault();
                        scrollArea.scrollLeft = startScrollLeft - deltaX;
                        scrollArea.scrollTop = startScrollTop - deltaY;
                    }
                });

                const stopDragScroll = (event) => {
                    if (pointerId !== event.pointerId) {
                        return;
                    }
                    pointerId = null;
                    captureStarted = false;
                    scrollArea.classList.remove("drag-scrolling");
                };

                scrollArea.addEventListener("pointerup", stopDragScroll);
                scrollArea.addEventListener("pointercancel", stopDragScroll);
                scrollArea.addEventListener("lostpointercapture", () => {
                    pointerId = null;
                    captureStarted = false;
                    scrollArea.classList.remove("drag-scrolling");
                });
                scrollArea.addEventListener("click", (event) => {
                    if (hasDragged) {
                        event.preventDefault();
                        event.stopPropagation();
                        hasDragged = false;
                    }
                }, true);
            };

            const bindEvents = () => {
                bindTableDragScroll();

                elements.filters.forEach((button) => {
                    button.addEventListener("click", () => {
                        const filter = button.dataset.filter;
                        if (filter === "ALL") {
                            state.selectedPositions.clear();
                        } else if (state.selectedPositions.has(filter)) {
                            state.selectedPositions.delete(filter);
                        } else {
                            state.selectedPositions.add(filter);
                        }
                        render();
                        scrollBoardTop(false);
                        loadDataLabStats();
                    });
                });

                elements.teamFilter.addEventListener("change", () => {
                    state.activeTeam = elements.teamFilter.value;
                    render();
                    scrollBoardTop(false);
                    loadDataLabStats();
                });

                elements.sortButtons.forEach((button) => {
                    button.addEventListener("click", () => {
                        cycleSort(button.dataset.sort);
                    });
                });

                elements.metricAdd.addEventListener("click", () => addMetricColumn());

                elements.metricSelect.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        addMetricColumn();
                    }
                });

                elements.metricReset.addEventListener("click", () => {
                    state.lab.metrics = [];
                    state.lab.filters = {};
                    if (state.sort.key?.startsWith("metric:")) {
                        state.sort = { key: "", direction: "" };
                    }
                    render();
                });

                elements.compareOpen.addEventListener("click", openComparisonDetails);

                elements.compareClear.addEventListener("click", () => {
                    state.compareIds = [];
                    state.compareYears = {};
                    state.comparisonRankLoadKey = "";
                    updateCompareButtons();
                    renderComparePanel();
                });

                elements.playerSearch.addEventListener("input", () => {
                    state.searchQuery = elements.playerSearch.value;
                    render();
                    elements.tableScroll.scrollTop = 0;
                    loadDataLabStats();
                });

                elements.availableOnly.addEventListener("change", () => {
                    state.availableOnly = elements.availableOnly.checked;
                    render();
                    scrollBoardTop(false);
                });

                elements.home.addEventListener("click", resetBoardView);
                elements.scrollTop.addEventListener("click", () => scrollBoardTop());

                elements.mySlot.addEventListener("change", () => {
                    state.draft.myRosterId = elements.mySlot.value;
                    if (state.draft.myRosterId) {
                        localStorage.setItem(MY_SLOT_STORAGE_KEY, state.draft.myRosterId);
                    } else {
                        localStorage.removeItem(MY_SLOT_STORAGE_KEY);
                    }
                    render();
                });

                elements.draftConnect.addEventListener("click", () => {
                    startDraftSync(elements.draftInput.value);
                });

                elements.draftInput.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        startDraftSync(elements.draftInput.value);
                    }
                });

                elements.draftStop.addEventListener("click", stopDraftSync);

                elements.playerDrawerClose.addEventListener("click", closePlayerDetails);
                elements.playerDrawerBackdrop.addEventListener("click", (event) => {
                    if (event.target === elements.playerDrawerBackdrop) {
                        closePlayerDetails();
                    }
                });
                document.addEventListener("keydown", (event) => {
                    if (elements.playerDrawerBackdrop.hidden) {
                        return;
                    }
                    if (event.key === "Escape") {
                        closePlayerDetails();
                    }
                    if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
                        event.preventDefault();
                        const nextId = adjacentPlayerId(state.selectedPlayerId, event.key === "ArrowLeft" ? -1 : 1);
                        if (nextId) {
                            openPlayerDetails(nextId, { preserveYear: true });
                        }
                    }
                });

                window.addEventListener("focus", () => {
                    if (state.draft.active && state.draft.provider === "sleeper") {
                        refreshDraftPicks();
                    }
                    refreshMarketData();
                });

                document.addEventListener("visibilitychange", () => {
                    if (!document.hidden) {
                        if (state.draft.active && state.draft.provider === "sleeper") {
                            refreshDraftPicks();
                        }
                        refreshMarketData();
                    }
                });

            };

            const init = async () => {
                const players = basePlayers();
                const saved = await loadSavedState();
                if (saved.items) {
                    state.items = hydrateSavedItems(players, saved.items);
                } else if (saved.order) {
                    state.items = buildDefaultItems(applySavedOrder(players, saved.order));
                } else {
                    state.items = buildDefaultItems(players);
                }
                elements.saveState.textContent = saved.source;
                populateTeamFilter();
                bindEvents();
                render();
                if (marketTimer) {
                    clearInterval(marketTimer);
                }
                const metadataRefresh = refreshMarketData();
                marketTimer = setInterval(refreshMarketData, MARKET_REFRESH_MS);
                metadataRefresh.then(() => {
                    const savedDraftId = localStorage.getItem(DRAFT_STORAGE_KEY);
                    if (savedDraftId) {
                        elements.draftInput.value = savedDraftId;
                        startDraftSync(savedDraftId);
                    }
                });
            };

            init();
        })();
    </script>
</body>
</html>
