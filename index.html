                    clearInterval(draftTimer);
                }
                state.draft.id = draftId;
                state.draft.active = true;
                state.draft.error = "";
                elements.draftInput.value = draftId;
                localStorage.setItem(DRAFT_STORAGE_KEY, draftId);
                try {
                    await refreshDraftDetails();
                } catch (error) {
                    console.warn("Sleeper draft details could not be loaded.", error);
                }
                await refreshDraftPicks();
                draftTimer = setInterval(refreshDraftPicks, DRAFT_REFRESH_MS);
            };

            const bindEvents = () => {
                elements.filters.forEach((button) => {
                    button.addEventListener("click", () => {
                        const filter = button.dataset.filter;
                        if (filter === "ALL") {
                            state.selectedPositions.clear();
                        } else if (state.selectedPositions.has(filter)) {
                            state.selectedPositions.delete(filter);
                        } else {
                            state.selectedPositions.add(filter);
                        }
                        render();
                    });
                });

                elements.teamFilter.addEventListener("change", () => {
                    state.activeTeam = elements.teamFilter.value;
                    render();
                });

                elements.sortButtons.forEach((button) => {
                    button.addEventListener("click", () => {
                        cycleSort(button.dataset.sort);
                    });
                });

                elements.playerSearch.addEventListener("input", () => {
                    state.searchQuery = elements.playerSearch.value;
                    render();
                });

                elements.availableOnly.addEventListener("change", () => {
                    state.availableOnly = elements.availableOnly.checked;
                    render();
                });

                elements.mySlot.addEventListener("change", () => {
                    state.draft.myRosterId = elements.mySlot.value;
                    if (state.draft.myRosterId) {
                        localStorage.setItem(MY_SLOT_STORAGE_KEY, state.draft.myRosterId);
                    } else {
                        localStorage.removeItem(MY_SLOT_STORAGE_KEY);
                    }
                    render();
                });

                elements.draftConnect.addEventListener("click", () => {
                    startDraftSync(elements.draftInput.value);
                });

                elements.draftInput.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        startDraftSync(elements.draftInput.value);
                    }
                });

                elements.draftStop.addEventListener("click", stopDraftSync);

                elements.playerDrawerClose.addEventListener("click", closePlayerDetails);
                elements.playerDrawerBackdrop.addEventListener("click", (event) => {
                    if (event.target === elements.playerDrawerBackdrop) {
                        closePlayerDetails();
                    }
                });
                document.addEventListener("keydown", (event) => {
                    if (event.key === "Escape" && !elements.playerDrawerBackdrop.hidden) {
                        closePlayerDetails();
                    }
                });

                window.addEventListener("focus", () => {
                    if (state.draft.active) {
                        refreshDraftPicks();
                    }
                });

                document.addEventListener("visibilitychange", () => {
                    if (!document.hidden && state.draft.active) {
                        refreshDraftPicks();
                    }
                });

                elements.reset.addEventListener("click", resetPlayers);
            };

            const init = async () => {
                const players = basePlayers();
                const saved = await loadSavedState();
                if (saved.items) {
                    state.items = hydrateSavedItems(players, saved.items);
                } else if (saved.order) {
                    state.items = buildDefaultItems(applySavedOrder(players, saved.order));
                } else {
                    state.items = buildDefaultItems(players);
                }
                elements.saveState.textContent = saved.source;
                populateTeamFilter();
                bindEvents();
                render();
                refreshFlockRanks();
                refreshSleeperPlayers().then(() => {
                    const savedDraftId = localStorage.getItem(DRAFT_STORAGE_KEY);
                    if (savedDraftId) {
                        elements.draftInput.value = savedDraftId;
                        startDraftSync(savedDraftId);
                    }
                });
            };

            init();
        })();
    </script>
</body>
</html>
