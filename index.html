<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Draft Board</title>
    <script src="data.js"></script>
    <script src="team-projections.js"></script>
    <script src="sync-config.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111416;
            --panel: #171b1f;
            --panel-strong: #1d2329;
            --line: #29313a;
            --line-soft: #20272e;
            --text: #eef2f6;
            --muted: #96a1ad;
            --subtle: #687481;
            --accent: #38bdf8;
            --accent-strong: #facc15;
            --green: #4ade80;
            --red: #f87171;
            --shadow: rgba(0, 0, 0, 0.34);
            --orange: #fb923c;
            --yellow: #facc15;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-width: 320px;
            background: var(--bg);
        }

        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(56, 189, 248, 0.08), transparent 260px),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 15px;
            letter-spacing: 0;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .app {
            width: min(1380px, calc(100% - 32px));
            margin: 0 auto;
            padding: 18px 0 42px;
        }

        .topbar {
            margin-bottom: 14px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .site-title {
            display: inline-flex;
            border: 0;
            background: transparent;
            color: var(--accent-strong);
            cursor: pointer;
            font: inherit;
            padding: 0;
            text-align: left;
        }

        h1 {
            margin: 0;
            font-size: clamp(27px, 3.6vw, 44px);
            font-weight: 950;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 0 22px rgba(56, 189, 248, 0.22);
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(94px, 1fr));
            gap: 10px;
            min-width: min(420px, 100%);
        }

        .metric {
            min-height: 62px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
            box-shadow: 0 16px 36px var(--shadow);
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            font-size: 30px;
            line-height: 1;
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 320px) minmax(150px, 210px) auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 10px 12px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-btn,
        .player-search,
        .team-select,
        .reset-btn,
        .lab-select,
        .lab-input,
        .lab-btn,
        .compare-btn {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .player-search,
        .team-select,
        .lab-select,
        .lab-input {
            width: 100%;
            padding: 0 12px;
            color: var(--text);
            outline: none;
        }

        .player-search {
            cursor: text;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: none;
        }

        .player-search::placeholder {
            color: var(--subtle);
        }

        .filter-btn {
            width: 58px;
        }

        .filter-btn[aria-pressed="true"] {
            border-color: rgba(56, 189, 248, 0.8);
            background: rgba(56, 189, 248, 0.13);
            color: var(--text);
        }

        .reset-btn {
            padding: 0 14px;
            color: var(--text);
        }

        .board-status {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(17, 20, 22, 0.58);
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
            padding: 0 12px;
        }

        .board-status strong {
            color: var(--text);
            font-size: 13px;
            letter-spacing: 0;
        }

        .filter-btn:hover,
        .reset-btn:hover,
        .draft-btn:hover,
        .lab-btn:hover,
        .compare-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .data-lab {
            display: grid;
            grid-template-columns: minmax(430px, 1fr) minmax(280px, 440px) auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(25, 30, 35, 0.92), rgba(18, 22, 26, 0.92));
            padding: 10px;
        }

        .lab-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            min-width: 0;
        }

        .metric-tools {
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 0;
        }

        .lab-field {
            display: grid;
            gap: 5px;
        }

        .lab-field span {
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .data-lab .lab-field span,
        .compare-panel > span,
        .lab-status {
            display: none;
        }

        .metric-chips .lab-status {
            display: flex;
            align-items: center;
            min-height: 38px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .lab-select,
        .lab-input,
        .lab-btn {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .lab-select {
            min-width: 220px;
            min-height: 38px;
        }

        .metric-chips {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            min-width: 0;
            max-height: 40px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
        }

        .metric-chip {
            display: grid;
            grid-template-columns: auto 76px 76px auto;
            gap: 6px;
            align-items: center;
            flex: 0 0 auto;
            min-height: 38px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #12171b;
            padding: 6px 7px;
        }

        .metric-chip strong {
            color: var(--text);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .metric-chip input {
            width: 76px;
            min-height: 28px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #161b20;
            color: var(--text);
            font: inherit;
            font-size: 11px;
            font-weight: 800;
            padding: 0 7px;
        }

        .chip-remove {
            width: 28px;
            min-height: 28px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-weight: 900;
        }

        .lab-btn[aria-pressed="true"] {
            border-color: var(--accent);
            color: var(--text);
        }

        .compare-panel {
            display: contents;
        }

        .compare-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
            min-width: 0;
        }

        .compare-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            justify-content: center;
            max-width: 100%;
            min-height: 38px;
            max-height: 38px;
            border: 1px dashed rgba(148, 163, 184, 0.22);
            border-radius: 8px;
            background: rgba(11, 15, 18, 0.32);
            padding: 0 6px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
        }

        .compare-grid:empty::before {
            content: "Select players";
            align-self: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .compare-card {
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: rgba(17, 20, 22, 0.68);
            color: var(--text);
            flex: 0 0 auto;
            font-size: 12px;
            font-weight: 900;
            min-height: 38px;
            padding: 9px 10px;
            white-space: nowrap;
        }

        .compare-card strong {
            display: block;
            font-size: 17px;
            line-height: 1.2;
        }

        .compare-card span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .compare-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-top: 9px;
        }

        .compare-stat {
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 7px;
        }

        .compare-stat span {
            margin: 0;
            font-size: 9px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .compare-stat b {
            display: block;
            margin-top: 4px;
            font-size: 15px;
        }

        .compare-open {
            min-height: 38px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.13);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            padding: 0 12px;
            text-transform: uppercase;
        }

        .compare-open:disabled {
            border-color: var(--line);
            color: var(--subtle);
            cursor: not-allowed;
            opacity: 0.68;
        }

        .comparison-board {
            display: grid;
            gap: 10px;
            overflow-x: auto;
        }

        .comparison-table {
            display: grid;
            gap: 7px;
            min-width: 720px;
        }

        .comparison-row {
            display: grid;
            gap: 8px;
            align-items: stretch;
            min-width: max-content;
        }

        .comparison-label,
        .comparison-cell,
        .comparison-player {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 9px 10px;
        }

        .comparison-label {
            display: flex;
            align-items: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .comparison-section-row {
            margin-top: 8px;
        }

        .comparison-section {
            min-height: 30px;
            border: 1px solid rgba(56, 189, 248, 0.24);
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent);
            font-size: 11px;
            font-weight: 950;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .comparison-player {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: center;
        }

        .comparison-player .player-photo,
        .comparison-player .player-initials {
            width: 52px;
            height: 52px;
        }

        .comparison-player strong {
            display: block;
            overflow: hidden;
            color: var(--text);
            font-size: 19px;
            line-height: 1.05;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .comparison-player span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .comparison-cell {
            min-height: 44px;
            color: var(--text);
            font-size: 18px;
            font-weight: 950;
        }

        .comparison-cell.winner {
            border-color: rgba(74, 222, 128, 0.58);
            background:
                linear-gradient(90deg, rgba(74, 222, 128, 0.15), rgba(74, 222, 128, 0.05)),
                rgba(23, 27, 31, 0.78);
            color: var(--green);
        }

        .comparison-cell.missing {
            color: var(--subtle);
        }

        .comparison-row.market .comparison-label {
            border-color: rgba(250, 204, 21, 0.24);
            color: var(--yellow);
        }

        .comparison-row.props .comparison-label {
            border-color: rgba(56, 189, 248, 0.24);
            color: var(--accent);
        }

        .comparison-row.team-context .comparison-label {
            border-color: rgba(248, 113, 113, 0.24);
            color: #fca5a5;
        }

        .comparison-row.production .comparison-label {
            border-color: rgba(74, 222, 128, 0.22);
            color: #86efac;
        }

        .draft-panel {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) auto auto minmax(120px, 160px) auto minmax(240px, 0.9fr);
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .draft-input,
        .draft-select,
        .draft-btn {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--text);
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            outline: none;
        }

        .draft-input,
        .draft-select {
            width: 100%;
            padding: 0 12px;
            letter-spacing: 0;
        }

        .draft-select {
            color: var(--text);
        }

        .draft-input::placeholder {
            color: var(--subtle);
        }

        .draft-btn {
            cursor: pointer;
            letter-spacing: 0.06em;
            padding: 0 14px;
            text-transform: uppercase;
            transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .draft-btn.secondary {
            color: var(--muted);
        }

        .draft-toggle {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .draft-toggle input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .draft-status {
            display: grid;
            gap: 3px;
            min-height: 38px;
            align-content: center;
            color: var(--muted);
            font-size: 12px;
        }

        .draft-status strong {
            color: var(--text);
            font-size: 13px;
        }

        .draft-save-row {
            color: var(--subtle);
        }

        .draft-save-row strong {
            color: var(--accent-strong);
            font-size: 12px;
        }

        .draft-status.error,
        .draft-status .error {
            color: var(--red);
        }

        .roster-tracker {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .roster-pill {
            display: inline-grid;
            place-items: center;
            min-width: 54px;
            min-height: 26px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #13171b;
            color: var(--text);
            padding: 0 10px;
        }

        .scroll-top-btn {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 30;
            min-height: 42px;
            border: 1px solid rgba(56, 189, 248, 0.5);
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.92);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
            padding: 0 16px;
            text-transform: uppercase;
            box-shadow: 0 18px 36px var(--shadow);
        }

        .scroll-top-btn:hover {
            border-color: var(--accent);
            color: var(--accent-strong);
        }

        .table-shell {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 22px 58px var(--shadow);
        }

        .table-scroll {
            overflow: auto;
            max-height: calc(100vh - 245px);
            cursor: grab;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
        }

        .table-scroll.drag-scrolling {
            cursor: grabbing;
            user-select: none;
        }

        .table-scroll.drag-scrolling * {
            cursor: grabbing !important;
        }

        table {
            width: 100%;
            min-width: 1180px;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--panel-strong);
        }

        th {
            height: 46px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-align: left;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .sort-btn {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            min-height: 30px;
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            padding: 0;
            text-transform: inherit;
        }

        .sort-btn::after {
            content: "";
            color: var(--subtle);
            font-size: 11px;
        }

        .sort-btn[data-direction="asc"]::after {
            content: "^";
            color: var(--accent);
        }

        .sort-btn[data-direction="desc"]::after {
            content: "v";
            color: var(--accent);
        }

        td {
            height: 52px;
            border-bottom: 1px solid var(--line-soft);
            color: var(--text);
            vertical-align: middle;
        }

        th,
        td {
            padding: 0 9px;
        }

        tbody tr {
            background: rgba(17, 20, 22, 0.54);
            transition: background 120ms ease, opacity 120ms ease;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        tbody tr.dragging {
            opacity: 0.42;
        }

        tbody tr.drop-target {
            background: rgba(250, 204, 21, 0.1);
            outline: 1px solid rgba(250, 204, 21, 0.42);
            outline-offset: -1px;
        }

        tbody tr.drafted {
            opacity: 0.38;
        }

        tbody tr.best-available {
            background: rgba(74, 222, 128, 0.12);
            outline: 1px solid rgba(74, 222, 128, 0.44);
            outline-offset: -1px;
        }

        .drag-cell {
            width: 44px;
            color: var(--subtle);
            text-align: center;
        }

        .handle {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            color: var(--muted);
            cursor: grab;
            line-height: 1;
        }

        .rank {
            width: 56px;
            color: var(--accent-strong);
            font-weight: 900;
        }

        .player {
            min-width: 220px;
        }

        .tier-row td {
            height: 42px;
            border-bottom-color: rgba(0, 0, 0, 0.24);
            background: transparent;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .tier-row:hover {
            background: transparent;
        }

        .tier-label {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 30px;
            border-radius: 8px;
            background: linear-gradient(90deg, #ef4444, #f97316);
            color: #fff7ed;
            font-size: 16px;
            font-weight: 950;
            letter-spacing: 0.06em;
            padding: 0 14px;
            text-transform: uppercase;
        }

        .player-card {
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 0;
        }

        .player-photo,
        .player-initials {
            flex: 0 0 auto;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: #101418;
            object-fit: cover;
        }

        .player-initials {
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .player-text {
            flex: 1 1 auto;
            min-width: 0;
        }

        .player-name {
            display: block;
            font-weight: 800;
        }

        .draft-badge,
        .best-badge,
        .tier-chip {
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            height: 20px;
            margin-left: 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .draft-badge {
            background: rgba(248, 113, 113, 0.14);
            color: var(--red);
        }

        .best-badge {
            background: rgba(74, 222, 128, 0.14);
            color: var(--green);
        }

        .tier-chip {
            background: rgba(251, 146, 60, 0.14);
            color: var(--orange);
        }

        .player-meta {
            display: none;
            margin-top: 3px;
            color: var(--subtle);
            font-size: 12px;
        }

        .pill {
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            height: 26px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            font-size: 12px;
            font-weight: 900;
        }

        .pos-rank {
            color: var(--accent);
            font-weight: 900;
        }

        .num {
            font-variant-numeric: tabular-nums;
        }

        .variance {
            font-weight: 900;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--muted);
        }

        .empty {
            padding: 38px;
            color: var(--muted);
            text-align: center;
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            background: rgba(0, 0, 0, 0.68);
            overflow: auto;
            padding: 18px 20px;
        }

        .drawer-backdrop[hidden] {
            display: none;
        }

        .player-drawer {
            position: relative;
            width: min(1320px, calc(100% - 116px));
            overflow: visible;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #111416;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.52);
            padding: 24px;
        }

        body.drawer-open {
            overflow: hidden;
        }

        .drawer-close {
            position: absolute;
            top: -10px;
            right: -10px;
            z-index: 3;
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .drawer-head {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) minmax(430px, 0.9fr);
            gap: 16px;
            align-items: center;
            margin: 12px 0 16px;
        }

        .drawer-head .player-photo,
        .drawer-head .player-initials {
            width: 112px;
            height: 112px;
        }

        .drawer-head h2 {
            margin: 0;
            font-size: 34px;
            line-height: 1.05;
        }

        .drawer-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .profile-summary {
            display: block;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .detail-card {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .detail-card span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .detail-card strong {
            display: block;
            margin-top: 8px;
            font-size: 22px;
            line-height: 1;
        }

        .drawer-section {
            margin-top: 12px;
        }

        .drawer-section h3 {
            margin: 0 0 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .performance-chart {
            display: flex;
            gap: 10px;
            align-items: end;
            min-height: 250px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.72);
            padding: 16px 16px 12px;
        }

        .week-bar {
            display: grid;
            grid-template-rows: minmax(176px, 1fr) 18px;
            gap: 8px;
            justify-items: center;
            min-width: 28px;
            flex: 1 1 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .bar-track {
            display: flex;
            align-items: end;
            width: 100%;
            min-height: 176px;
        }

        .bar-stack {
            display: grid;
            gap: 5px;
            align-items: end;
            width: 100%;
        }

        .bar-value {
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .bar-fill {
            width: 100%;
            min-height: 4px;
            border-radius: 6px 6px 0 0;
            background: var(--green);
        }

        .bar-fill.mid {
            background: var(--yellow);
        }

        .bar-fill.low {
            background: var(--red);
        }

        .bar-fill.inactive {
            min-height: 3px;
            background: #4b5563;
            opacity: 0.62;
        }

        .modal-stat-strip {
            display: grid;
            grid-template-columns: repeat(6, minmax(80px, 1fr));
            gap: 10px;
        }

        .year-tabs {
            display: inline-flex;
            gap: 6px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .year-tab,
        .profile-nav {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
            min-height: 30px;
            padding: 0 10px;
        }

        .year-tab.active {
            border-color: var(--accent);
            color: var(--text);
        }

        .profile-nav {
            position: absolute;
            top: 50%;
            width: 42px;
            height: 58px;
            padding: 0;
            color: var(--text);
            font-size: 24px;
            transform: translateY(-50%);
            z-index: 1;
        }

        .profile-nav.prev {
            left: -56px;
        }

        .profile-nav.next {
            right: -56px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .stat-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 9px 10px;
        }

        .stat-card span {
            display: block;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .stat-card strong {
            display: block;
            margin-top: 5px;
            font-size: 18px;
        }

        .betting-props-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .betting-prop-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(17, 24, 29, 0.86);
            padding: 10px;
        }

        .betting-prop-card.team-context-card,
        .betting-prop-card.prop-context-card {
            position: relative;
            overflow: hidden;
            border-color: color-mix(in srgb, var(--line) 74%, var(--rank-color, var(--muted)));
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--rank-color, var(--muted)) 18%, transparent), rgba(17, 24, 29, 0.9) 56%),
                rgba(17, 24, 29, 0.86);
        }

        .rank-chip {
            position: absolute;
            top: 10px;
            right: 10px;
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            min-height: 22px;
            border: 1px solid color-mix(in srgb, var(--rank-color, var(--muted)) 70%, transparent);
            border-radius: 999px;
            background: color-mix(in srgb, var(--rank-color, var(--muted)) 16%, rgba(17, 24, 29, 0.92));
            color: var(--rank-color, var(--muted));
            font-size: 10px;
            font-weight: 950;
            letter-spacing: 0.04em;
        }

        .team-context-card.rank-elite,
        .prop-context-card.rank-elite {
            --rank-color: var(--green);
        }

        .team-context-card.rank-good,
        .prop-context-card.rank-good {
            --rank-color: #86efac;
        }

        .team-context-card.rank-mid,
        .prop-context-card.rank-mid {
            --rank-color: var(--yellow);
        }

        .team-context-card.rank-low,
        .prop-context-card.rank-low {
            --rank-color: var(--orange);
        }

        .team-context-card.rank-bad,
        .prop-context-card.rank-bad {
            --rank-color: var(--red);
        }

        .betting-prop-card span,
        .betting-prop-card small {
            display: block;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .betting-prop-card strong {
            display: block;
            margin-top: 5px;
            color: var(--text);
            font-size: 22px;
            line-height: 1;
        }

        .team-context-card strong,
        .prop-context-card strong {
            padding-right: 48px;
        }

        .betting-prop-card small {
            margin-top: 7px;
            color: var(--subtle);
            letter-spacing: 0;
            text-transform: none;
        }

        .expert-list {
            display: grid;
            gap: 7px;
        }

        .expert-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 8px;
            align-items: center;
            min-height: 34px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.7);
            padding: 0 10px;
        }

        .expert-row span:first-child {
            min-width: 0;
            overflow: hidden;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .expert-chip {
            display: inline-grid;
            place-items: center;
            min-width: 46px;
            min-height: 22px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.13);
            color: var(--accent);
            font-size: 11px;
            font-weight: 900;
        }

        .expert-chip.tier {
            background: rgba(251, 146, 60, 0.14);
            color: var(--orange);
        }

        .compare-btn {
            display: inline-grid;
            place-items: center;
            width: 34px;
            min-height: 30px;
            padding: 0 0 0 1px;
            color: var(--text);
            line-height: 1;
        }

        .compare-btn input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .compare-btn.active {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.15);
        }

        @media (max-width: 860px) {
            .app {
                width: min(100% - 20px, 1380px);
                padding-top: 20px;
            }

            .topbar,
            .controls,
            .draft-panel,
            .data-lab,
            .lab-row,
            .profile-summary,
            .drawer-head,
            .modal-stat-strip {
                grid-template-columns: 1fr;
            }

            .compare-panel {
                justify-content: flex-start;
            }

            .metric-tools {
                flex-wrap: wrap;
            }

            .lab-select {
                min-width: min(220px, 100%);
            }

            .summary {
                grid-template-columns: repeat(3, 1fr);
                min-width: 0;
            }

            .reset-btn {
                width: 100%;
            }

            .board-status {
                justify-content: flex-start;
            }

            .compare-actions {
                justify-content: flex-start;
            }

            .compare-grid {
                max-width: 100%;
            }

            .table-scroll {
                max-height: none;
            }

            .stat-grid,
            .betting-props-grid,
            .detail-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .profile-nav.prev {
                left: 8px;
            }

            .profile-nav.next {
                right: 8px;
            }

            .player-drawer {
                width: min(100%, 1320px);
                overflow: auto;
            }

            .player-meta {
                display: block;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="topbar" aria-label="Draft board overview">
            <button class="site-title" type="button" id="homeButton">
                <h1>Fantasy Football Rankings</h1>
            </button>
        </section>

        <section class="draft-panel" aria-label="Draft sync">
            <input class="draft-input" id="draftInput" type="text" placeholder="Sleeper draft URL or copied Underdog board text" aria-label="Sleeper draft URL or copied Underdog board text" autocomplete="off">
            <button class="draft-btn" type="button" id="draftConnectButton">Connect Draft</button>
            <button class="draft-btn secondary" type="button" id="draftStopButton">Stop</button>
            <select class="draft-select" id="mySlotSelect" aria-label="My Sleeper draft slot">
                <option value="">My Slot</option>
            </select>
            <label class="draft-toggle">
                <input id="availableOnlyToggle" type="checkbox">
                Available Only
            </label>
            <div class="draft-status" aria-live="polite">
                <strong id="draftBest">Best available: Off</strong>
                <span id="draftStatus">Paste a Sleeper draft link or copied Underdog board when you are drafting.</span>
                <span class="draft-save-row">Saved: <strong id="saveState">Local</strong></span>
            </div>
            <div class="roster-tracker" id="rosterTracker" aria-live="polite">
                <span>My roster</span>
                <span class="roster-pill">QB 0</span>
                <span class="roster-pill">RB 0</span>
                <span class="roster-pill">WR 0</span>
                <span class="roster-pill">TE 0</span>
            </div>
        </section>

        <section class="data-lab" aria-label="Data lab">
            <div class="lab-row">
                <div class="metric-tools">
                    <label class="lab-field">
                        <span>Add table metric</span>
                        <select class="lab-select" id="metricSelect">
                            <option value="age">Age</option>
                            <option value="finish">Pos finish</option>
                            <option value="ppg">PPG</option>
                            <option value="games">Games</option>
                            <option value="targets">Targets</option>
                            <option value="targetsPg">Targets/G</option>
                            <option value="rec">Receptions</option>
                            <option value="recPg">Rec/G</option>
                            <option value="recYds">Receiving yards</option>
                            <option value="recYdsPg">Rec yards/G</option>
                            <option value="snap">Snap %</option>
                            <option value="yprr">YPRR</option>
                            <option value="recTd">Receiving TD</option>
                            <option value="recTdPg">Rec TD/G</option>
                            <option value="rushAttPg">Rush att/G</option>
                            <option value="rushYds">Rushing yards</option>
                            <option value="rushYdsPg">Rush yards/G</option>
                            <option value="rushTd">Rushing TD</option>
                            <option value="rushTdPg">Rush TD/G</option>
                            <option value="teamWins">BettingPros wins</option>
                            <option value="teamTargetShare">Team pos target share</option>
                            <option value="teamPassYds">Clay team pass yds</option>
                            <option value="teamRushYds">Clay team rush yds</option>
                            <option value="propRecYds">Prop rec yards</option>
                            <option value="propRecTd">Prop rec TD</option>
                            <option value="propRushYds">Prop rush yards</option>
                            <option value="propRushTd">Prop rush TD</option>
                        </select>
                    </label>
                    <button class="lab-btn" type="button" id="metricAdd">Add column</button>
                    <button class="lab-btn" type="button" id="metricReset">Clear metrics</button>
                </div>
                <div class="metric-chips" id="metricChips" aria-live="polite"></div>
                <span class="lab-status" id="labStatus">Add metrics to create sortable stat columns.</span>
            </div>
            <div class="compare-panel" id="comparePanel" aria-live="polite">
                <span>Compare</span>
                <div class="compare-grid" id="compareGrid"></div>
                <div class="compare-actions">
                    <button class="compare-open" type="button" id="compareOpen" disabled>Open Comparison</button>
                    <button class="lab-btn" type="button" id="compareClear" disabled>Clear</button>
                </div>
            </div>
        </section>

        <section class="controls" aria-label="Draft board controls">
            <nav class="filters" aria-label="Position filters">
                <button class="filter-btn" type="button" data-filter="ALL" aria-pressed="true">ALL</button>
                <button class="filter-btn" type="button" data-filter="QB" aria-pressed="false">QB</button>
                <button class="filter-btn" type="button" data-filter="RB" aria-pressed="false">RB</button>
                <button class="filter-btn" type="button" data-filter="WR" aria-pressed="false">WR</button>
                <button class="filter-btn" type="button" data-filter="TE" aria-pressed="false">TE</button>
            </nav>
            <input class="player-search" id="playerSearch" type="search" placeholder="Search player..." aria-label="Search players" autocomplete="off">
            <select class="team-select" id="teamFilter" aria-label="Team filter">
                <option value="ALL">All Teams</option>
            </select>
            <div class="board-status" aria-label="Board status">
                <span>Players <strong id="playerCount">0</strong></span>
                <span>Filter <strong id="filterLabel">ALL</strong></span>
            </div>
        </section>

        <section class="table-shell" aria-label="Custom rankings table">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr id="rankingsHeadRow">
                            <th class="drag-cell" scope="col">Move</th>
                            <th scope="col">My Rank</th>
                            <th scope="col">Player</th>
                            <th scope="col">Pos</th>
                            <th scope="col">Team</th>
                            <th scope="col">My Pos Rank</th>
                            <th scope="col" data-metric-anchor><button class="sort-btn" type="button" data-sort="udAdp">Underdog ADP</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="udVar">UD Var</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="sleeperAdp">Sleeper ADP</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="sleeperVar">Sleeper Var</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="flockRank">Flock Rank</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="flockVar">Flock Var</button></th>
                        </tr>
                    </thead>
                    <tbody id="rankingsBody"></tbody>
                </table>
                <div class="empty" id="emptyState" hidden>No players match this filter.</div>
            </div>
        </section>
        <button class="scroll-top-btn" type="button" id="scrollTopButton">Top</button>
    </main>

    <div class="drawer-backdrop" id="playerDrawerBackdrop" hidden>
        <aside class="player-drawer" role="dialog" aria-modal="true" aria-labelledby="playerDrawerTitle">
            <button class="drawer-close" type="button" id="playerDrawerClose" aria-label="Close player details">x</button>
            <div id="playerDrawerContent"></div>
        </aside>
    </div>

    <script>
        (() => {
            "use strict";

            const STORAGE_KEY = "myCustomRankings";
            const DRAFT_STORAGE_KEY = "sleeperDraftId";
            const MY_SLOT_STORAGE_KEY = "sleeperMyRosterId";
            const DRAFT_REFRESH_MS = 1000;
            const MARKET_REFRESH_MS = 15 * 60 * 1000;
            const POSITIONS = ["QB", "RB", "WR", "TE"];
            const SUPABASE_CDN = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            const REMOTE_APP_ORIGIN = "https://2026-fantasy-rankings.vercel.app";
            const apiPath = (path) => window.location.protocol === "file:" ? `${REMOTE_APP_ORIGIN}${path}` : path;
            const FLOCK_PROXY_URL = apiPath("/api/flock-rankings");
            const FLOCK_DIRECT_URL = "https://api.flockfantasy.com/rankings?format=BEST_BALL&pickType=general";
            const SLEEPER_PLAYERS_PROXY_URL = apiPath("/api/sleeper-players");
            const SLEEPER_PLAYERS_DIRECT_URL = "https://api.sleeper.app/v1/players/nfl";
            const SLEEPER_DRAFT_BASE_URL = "https://api.sleeper.app/v1/draft";
            const FLOCK_PERFORMANCE_PROXY_URL = apiPath("/api/flock-player-performance");
            const FLOCK_YEARLY_PROXY_URL = apiPath("/api/flock-player-yearly");
            const FLOCK_PERFORMANCE_DIRECT_URL = "https://api.flockfantasy.com/players/card-stats";
            const FANTASYPROS_ADP_PROXY_URL = apiPath("/api/fantasypros-adp");
            const BETTING_PROPS_PROXY_URL = apiPath("/api/bettingpros-player-futures");
            const TEAM_FUTURES_PROXY_URL = apiPath("/api/bettingpros-team-futures");
            const PLAYER_PROFILE_SEASON = 2025;
            const DEFAULT_SYNC_CONFIG = {
                provider: "local",
                supabaseUrl: "",
                supabaseAnonKey: "",
                boardId: "main",
                tableName: "draft_board_states",
            };
            const syncConfig = { ...DEFAULT_SYNC_CONFIG, ...(window.SYNC_CONFIG || {}) };
            const state = {
                items: [],
                flockRanks: {},
                flockDetails: {},
                playerPerformance: {},
                playerYearlyStats: {},
                bettingProps: { loading: false, byKey: {}, byNamePos: {}, updatedAt: "", source: "", error: "" },
                teamFutures: { loading: false, byTeam: {}, updatedAt: "", source: "", error: "" },
                livePlayerMeta: {},
                profileYear: PLAYER_PROFILE_SEASON,
                playerAssets: {},
                sleeperKeyById: {},
                selectedPositions: new Set(),
                activeTeam: "ALL",
                searchQuery: "",
                availableOnly: false,
                sort: { key: "", direction: "" },
                selectedPlayerId: "",
                draggedItemId: null,
                lab: {
                    metrics: [],
                    filters: {},
                    loading: false,
                },
                compareIds: [],
                compareYears: {},
                comparisonRankLoadKey: "",
                drawerReturnScroll: null,
                draft: {
                    provider: "sleeper",
                    id: "",
                    active: false,
                    loading: false,
                    error: "",
                    details: null,
                    myRosterId: localStorage.getItem(MY_SLOT_STORAGE_KEY) || "",
                    picks: [],
                    draftedKeys: new Set(),
                    bestAvailableKey: "",
                    lastSync: null,
                },
            };
            let supabaseClientPromise = null;

            const elements = {
                body: document.getElementById("rankingsBody"),
                empty: document.getElementById("emptyState"),
                filters: Array.from(document.querySelectorAll(".filter-btn")),
                playerSearch: document.getElementById("playerSearch"),
                teamFilter: document.getElementById("teamFilter"),
                home: document.getElementById("homeButton"),
                scrollTop: document.getElementById("scrollTopButton"),
                playerCount: document.getElementById("playerCount"),
                filterLabel: document.getElementById("filterLabel"),
                saveState: document.getElementById("saveState"),
                draftInput: document.getElementById("draftInput"),
                draftConnect: document.getElementById("draftConnectButton"),
                draftStop: document.getElementById("draftStopButton"),
                mySlot: document.getElementById("mySlotSelect"),
                availableOnly: document.getElementById("availableOnlyToggle"),
                draftBest: document.getElementById("draftBest"),
                draftStatus: document.getElementById("draftStatus"),
                rosterTracker: document.getElementById("rosterTracker"),
                sortButtons: Array.from(document.querySelectorAll(".sort-btn")),
                rankingsHeadRow: document.getElementById("rankingsHeadRow"),
                metricSelect: document.getElementById("metricSelect"),
                metricAdd: document.getElementById("metricAdd"),
                metricChips: document.getElementById("metricChips"),
                metricReset: document.getElementById("metricReset"),
                labStatus: document.getElementById("labStatus"),
                comparePanel: document.getElementById("comparePanel"),
                compareGrid: document.getElementById("compareGrid"),
                compareOpen: document.getElementById("compareOpen"),
                compareClear: document.getElementById("compareClear"),
                tableScroll: document.querySelector(".table-scroll"),
                playerDrawerBackdrop: document.getElementById("playerDrawerBackdrop"),
                playerDrawerClose: document.getElementById("playerDrawerClose"),
                playerDrawerContent: document.getElementById("playerDrawerContent"),
            };
            let draftTimer = null;
            let marketTimer = null;

            const basePlayers = () => clonePlayers(window.defaultPlayers || defaultPlayers || []);

            const sourcePlayers = () => window.defaultPlayers || defaultPlayers || [];

            const initialsFor = (name) => String(name || "")
                .split(/\s+/)
                .filter(Boolean)
                .slice(0, 2)
                .map((part) => part[0])
                .join("")
                .toUpperCase();

            const clonePlayers = (players) => players.map((player, index) => ({
                id: String(player.id || index + 1),
                name: String(player.name || "Unknown Player"),
                pos: POSITIONS.includes(player.pos) ? player.pos : "WR",
                team: displayTeam(player.team || "FA"),
                udAdp: Number.isFinite(Number(player.udAdp)) ? Number(player.udAdp) : 999,
                udPick: String(player.udPick || ""),
                sleeperAdp: Number.isFinite(Number(player.sleeperAdp)) ? Number(player.sleeperAdp) : 999,
                sleeperPick: String(player.sleeperPick || ""),
            }));

            const tierLabel = (index) => `Tier ${index + 1}`;

            const TIER_COLORS = [
                ["#ef4444", "#f97316", "#fff7ed"],
                ["#f59e0b", "#eab308", "#111827"],
                ["#22c55e", "#14b8a6", "#052e16"],
                ["#06b6d4", "#3b82f6", "#eff6ff"],
                ["#8b5cf6", "#d946ef", "#faf5ff"],
                ["#ec4899", "#f43f5e", "#fff1f2"],
                ["#64748b", "#334155", "#f8fafc"],
                ["#84cc16", "#16a34a", "#052e16"],
            ];

            const tierIndexFromLabel = (label) => {
                const match = String(label || "").match(/\d+/);
                return match ? Math.max(0, Number(match[0]) - 1) : 0;
            };

            const tierPalette = (label) => TIER_COLORS[tierIndexFromLabel(label) % TIER_COLORS.length];

            const applyTierColor = (element, label, subtle = false) => {
                const [start, end, text] = tierPalette(label);
                if (subtle) {
                    element.style.background = `linear-gradient(90deg, ${start}26, ${end}26)`;
                    element.style.borderColor = `${start}99`;
                    element.style.color = start;
                    return;
                }
                element.style.background = `linear-gradient(90deg, ${start}, ${end})`;
                element.style.color = text;
            };

            const tierLabelFromItem = (item, index) => {
                const match = String(item.id || "").match(/^tier-(\d+)$/);
                if (match) {
                    return tierLabel(Number(match[1]) - 1);
                }
                return tierLabel(index);
            };

            const buildDefaultItems = (players) => {
                const items = [];
                players.forEach((player, index) => {
                    if (index % 6 === 0) {
                        const tierIndex = index / 6;
                        items.push({
                            id: `tier-${tierIndex + 1}`,
                            label: tierLabel(tierIndex),
                            type: "tier",
                        });
                    }
                    items.push({
                        id: `player-${player.id}`,
                        playerId: player.id,
                        type: "player",
                    });
                });
                return items;
            };

            const playerItems = () => state.items.filter((item) => item.type === "player");

            const parseSavedState = (saved) => {
                if (saved && Array.isArray(saved.items) && saved.items.length > 0) {
                    return {
                        items: saved.items,
                        order: null,
                    };
                }
                if (saved && Array.isArray(saved.order) && saved.order.length > 0) {
                    return {
                        items: null,
                        order: saved.order.map(String),
                    };
                }
                if (Array.isArray(saved) && saved.length > 0) {
                    return {
                        items: null,
                        order: saved.map((player) => String(player.id)),
                    };
                }
                return { items: null, order: null };
            };

            const localSavedState = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                    return parseSavedState(saved);
                } catch (error) {
                    console.warn("Saved rankings were ignored because they are not valid JSON.", error);
                    return { items: null, order: null };
                }
            };

            const cloudSyncEnabled = () => syncConfig.provider === "supabase"
                && syncConfig.supabaseUrl
                && syncConfig.supabaseAnonKey
                && syncConfig.boardId;

            const loadScript = (src) => new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[src="${src}"]`);
                if (existing) {
                    existing.addEventListener("load", resolve, { once: true });
                    existing.addEventListener("error", reject, { once: true });
                    if (window.supabase) {
                        resolve();
                    }
                    return;
                }
                const script = document.createElement("script");
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            const supabaseClient = async () => {
                if (!cloudSyncEnabled()) {
                    return null;
                }
                if (!supabaseClientPromise) {
                    supabaseClientPromise = (async () => {
                        await loadScript(SUPABASE_CDN);
                        return window.supabase.createClient(syncConfig.supabaseUrl, syncConfig.supabaseAnonKey);
                    })();
                }
                return supabaseClientPromise;
            };

            const remoteSavedState = async () => {
                const client = await supabaseClient();
                if (!client) {
                    return null;
                }
                const { data, error } = await client
                    .from(syncConfig.tableName)
                    .select("state")
                    .eq("board_id", syncConfig.boardId)
                    .maybeSingle();
                if (error) {
                    throw error;
                }
                return data ? parseSavedState(data.state) : null;
            };

            const currentPayload = () => ({
                version: 4,
                items: state.items,
                updatedAt: new Date().toISOString(),
            });

            const persistRemoteState = async (payload) => {
                const client = await supabaseClient();
                if (!client) {
                    return;
                }
                const { error } = await client
                    .from(syncConfig.tableName)
                    .upsert({
                        board_id: syncConfig.boardId,
                        state: payload,
                        updated_at: new Date().toISOString(),
                    });
                if (error) {
                    throw error;
                }
            };

            const loadSavedState = async () => {
                const localState = localSavedState();
                if (!cloudSyncEnabled()) {
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
                try {
                    const remoteState = await remoteSavedState();
                    if (remoteState && (remoteState.items || remoteState.order)) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify({
                            version: 4,
                            items: remoteState.items,
                            updatedAt: new Date().toISOString(),
                        }));
                        return { ...remoteState, source: "Cloud" };
                    }
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                } catch (error) {
                    console.warn("Cloud rankings could not be loaded; using local rankings.", error);
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
            };

            const applySavedOrder = (players, order) => {
                if (!order) {
                    return players;
                }
                const byId = new Map(players.map((player) => [player.id, player]));
                const ordered = order.map((id) => byId.get(id)).filter(Boolean);
                const used = new Set(ordered.map((player) => player.id));
                return ordered.concat(players.filter((player) => !used.has(player.id)));
            };

            const hydrateSavedItems = (players, savedItems) => {
                const byId = new Map(players.map((player) => [player.id, player]));
                const hydrated = [];
                const usedPlayers = new Set();

                savedItems.forEach((item, index) => {
                    if (item.type === "tier") {
                        hydrated.push({
                            id: String(item.id || `tier-saved-${index}`),
                            label: tierLabelFromItem(item, index),
                            type: "tier",
                        });
                    }

                    if (item.type === "player" && byId.has(String(item.playerId))) {
                        const playerId = String(item.playerId);
                        hydrated.push({
                            id: `player-${playerId}`,
                            playerId,
                            type: "player",
                        });
                        usedPlayers.add(playerId);
                    }
                });

                players.forEach((player) => {
                    if (!usedPlayers.has(player.id)) {
                        hydrated.push({
                            id: `player-${player.id}`,
                            playerId: player.id,
                            type: "player",
                        });
                    }
                });

                return hydrated.length > 0 ? hydrated : buildDefaultItems(players);
            };

            const savePlayers = () => {
                const payload = currentPayload();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                elements.saveState.textContent = "Local";
                if (cloudSyncEnabled()) {
                    persistRemoteState(payload)
                        .then(() => {
                            elements.saveState.textContent = "Cloud";
                        })
                        .catch((error) => {
                            console.warn("Cloud rankings could not be saved.", error);
                            elements.saveState.textContent = "Local";
                        });
                }
            };

            const scrollBoardTop = (smooth = true) => {
                elements.tableScroll.scrollTo({ top: 0, left: 0, behavior: smooth ? "smooth" : "auto" });
                window.scrollTo({ top: 0, behavior: smooth ? "smooth" : "auto" });
            };

            const resetBoardView = () => {
                state.selectedPositions.clear();
                state.activeTeam = "ALL";
                state.searchQuery = "";
                state.availableOnly = false;
                state.sort = { key: "", direction: "" };
                state.lab.metrics = [];
                state.lab.filters = {};
                elements.playerSearch.value = "";
                elements.availableOnly.checked = false;
                render();
                scrollBoardTop();
            };

            const nameKey = (name) => String(name || "")
                .toLowerCase()
                .replace(/\b(jr|sr|ii|iii|iv|v)\b\.?/g, "")
                .replace(/[^a-z0-9]+/g, "");

            const TEAM_ALIASES = {
                JAX: "JAC",
                JAC: "JAC",
                WAS: "WSH",
                WSH: "WSH",
            };

            const marketTeam = (team) => {
                const normalized = String(team || "").toUpperCase();
                return TEAM_ALIASES[normalized] || normalized;
            };

            const displayTeam = (team) => {
                const normalized = String(team || "").toUpperCase();
                return ({ JAX: "JAC", JAC: "JAC", WSH: "WAS", WAS: "WAS" })[normalized] || normalized;
            };

            const clayTeam = (team) => {
                const normalized = displayTeam(team);
                return normalized === "WSH" ? "WAS" : normalized;
            };

            const playerMarketKey = (player) => `${nameKey(player.name)}|${marketTeam(player.team)}|${player.pos}`;

            const pickLabelFromAdp = (adp) => {
                const pick = Math.max(1, Math.round(Number(adp)));
                const round = Math.floor((pick - 1) / 12) + 1;
                const slot = ((pick - 1) % 12) + 1;
                return `${round}.${slot}`;
            };

            const formatAdp = (adp, pickLabel) => {
                if (adp === 999) {
                    return "N/A";
                }
                const base = Number.isInteger(adp) ? String(adp) : adp.toFixed(1);
                return pickLabel ? `${base} (${pickLabel})` : base;
            };

            const formatAmericanOdds = (value) => {
                const number = Number(value);
                if (!Number.isFinite(number)) {
                    return "N/A";
                }
                return number > 0 ? `+${number}` : String(number);
            };

            const bettingLineLabel = (prop) => {
                if (!prop || !Number.isFinite(Number(prop.line))) {
                    return "N/A";
                }
                return Number.isInteger(Number(prop.line)) ? String(Number(prop.line)) : Number(prop.line).toFixed(1);
            };

            const playerBettingProps = (player) => {
                const exact = state.bettingProps.byKey[playerMarketKey(player)];
                if (exact) {
                    return exact.props || [];
                }
                const fallback = state.bettingProps.byNamePos[`${nameKey(player.name)}|${player.pos}`];
                return fallback?.props || [];
            };

            const applyLivePlayerMeta = () => {
                Object.entries(state.livePlayerMeta).forEach(([key, meta]) => {
                    sourcePlayers()
                        .filter((player) => `${nameKey(player.name)}|${player.pos}` === key)
                        .forEach((player) => {
                            if (meta.team) {
                                player.team = displayTeam(meta.team);
                            }
                            if (meta.pos && POSITIONS.includes(meta.pos)) {
                                player.pos = meta.pos;
                            }
                        });
                });
            };

            const clayTeamProjection = (team) => (window.clayTeamProjections || [])
                .find((projection) => projection.team === clayTeam(team));

            const teamWinFuture = (team) => state.teamFutures.byTeam[marketTeam(team)] || null;

            const rankClass = (rank, total = 32) => {
                if (!Number.isFinite(rank) || !Number.isFinite(total) || total <= 0) {
                    return "rank-mid";
                }
                const percentile = rank / total;
                if (percentile <= 0.2) {
                    return "rank-elite";
                }
                if (percentile <= 0.4) {
                    return "rank-good";
                }
                if (percentile <= 0.6) {
                    return "rank-mid";
                }
                if (percentile <= 0.8) {
                    return "rank-low";
                }
                return "rank-bad";
            };

            const rankAmongTeams = (team, valueForTeam, highWins = true) => {
                const rows = (window.clayTeamProjections || [])
                    .map((projection) => ({
                        team: projection.team,
                        value: Number(valueForTeam(projection)),
                    }))
                    .filter((row) => Number.isFinite(row.value));
                const targetTeam = clayTeam(team);
                const target = rows.find((row) => row.team === targetTeam);
                if (!target) {
                    return null;
                }
                const sorted = rows.slice().sort((a, b) => highWins ? b.value - a.value : a.value - b.value);
                return { rank: sorted.findIndex((row) => row.team === targetTeam) + 1, total: sorted.length };
            };

            const rankAmongFutures = (team) => {
                const rows = Object.values(state.teamFutures.byTeam)
                    .map((future) => ({ team: marketTeam(future.team), value: Number(future.line) }))
                    .filter((row) => row.team && Number.isFinite(row.value));
                const targetTeam = marketTeam(team);
                const target = rows.find((row) => row.team === targetTeam);
                if (!target) {
                    return null;
                }
                const sorted = rows.slice().sort((a, b) => b.value - a.value);
                return { rank: sorted.findIndex((row) => row.team === targetTeam) + 1, total: sorted.length };
            };

            const teamPositionShare = (projection, pos) => {
                const targets = Number(projection?.offense?.targets);
                const posTargets = Number(projection?.positions?.[pos]?.targets);
                return targets > 0 && Number.isFinite(posTargets) ? (posTargets / targets) * 100 : null;
            };

            const teamMetricValue = (player, metricKey) => {
                const clay = clayTeamProjection(player.team);
                const future = teamWinFuture(player.team);
                if (metricKey === "teamWins") {
                    return numericOrNull(future?.line);
                }
                if (metricKey === "teamTargetShare") {
                    return ["RB", "WR", "TE"].includes(player.pos) ? numericOrNull(teamPositionShare(clay, player.pos)) : null;
                }
                if (metricKey === "teamPassYds") {
                    return numericOrNull(clay?.offense?.passYds);
                }
                if (metricKey === "teamRushYds") {
                    return numericOrNull(clay?.offense?.rushYds);
                }
                return null;
            };

            const propMetricValue = (player, metric) => {
                const prop = playerBettingProps(player).find((item) => item.key === metric?.propKey);
                return numericOrNull(prop?.line);
            };

            const propLineRank = (player, prop) => {
                const propKey = prop?.key;
                const pos = String(player?.pos || "").toUpperCase();
                const rows = Object.values(state.bettingProps.byKey)
                    .filter((row) => String(row.pos || "").toUpperCase() === pos)
                    .map((row) => {
                        const match = (row.props || []).find((item) => item.key === propKey);
                        return {
                            key: `${nameKey(row.name)}|${marketTeam(row.team)}|${String(row.pos || "").toUpperCase()}`,
                            value: Number(match?.line),
                        };
                    })
                    .filter((row) => Number.isFinite(row.value));
                const targetKey = playerMarketKey(player);
                if (!propKey || !rows.some((row) => row.key === targetKey)) {
                    return null;
                }
                const sorted = rows.slice().sort((a, b) => b.value - a.value);
                return { rank: sorted.findIndex((row) => row.key === targetKey) + 1, total: sorted.length };
            };

            const varianceClass = (variance) => {
                if (variance > 0) {
                    return "positive";
                }
                if (variance < 0) {
                    return "negative";
                }
                return "neutral";
            };

            const formatMarketRank = (rank) => {
                if (!Number.isFinite(rank)) {
                    return "N/A";
                }
                return String(Math.round(rank));
            };

            const formatVariance = (marketAdp, myRank) => {
                if (marketAdp === 999) {
                    return { label: "N/A", className: "neutral" };
                }
                const variance = Math.round(marketAdp - myRank);
                const prefix = variance > 0 ? "+" : "";
                return { label: `${prefix}${variance}`, className: varianceClass(variance) };
            };

            const getPositionRanks = () => {
                const counters = { QB: 0, RB: 0, WR: 0, TE: 0 };
                return orderedPlayers().reduce((ranks, player) => {
                    counters[player.pos] += 1;
                    ranks[player.id] = `${player.pos}${counters[player.pos]}`;
                    return ranks;
                }, {});
            };

            const playersById = () => new Map(basePlayers().map((player) => [player.id, player]));

            const orderedPlayers = () => {
                const byId = playersById();
                return playerItems().map((item) => byId.get(item.playerId)).filter(Boolean);
            };

            const createCell = (className, content) => {
                const cell = document.createElement("td");
                if (className) {
                    cell.className = className;
                }
                if (content instanceof Node) {
                    cell.appendChild(content);
                } else {
                    cell.textContent = content;
                }
                return cell;
            };

            const closestElement = (target, selector) => {
                const element = target instanceof Element ? target : target?.parentElement;
                return element ? element.closest(selector) : null;
            };

            const attachDragEvents = (row, handle, itemId) => {
                row.draggable = false;
                row.dataset.itemId = itemId;
                handle.draggable = !state.sort.key;

                handle.addEventListener("dragstart", (event) => {
                    if (state.sort.key) {
                        event.preventDefault();
                        return;
                    }
                    state.draggedItemId = itemId;
                    row.classList.add("dragging");
                    event.dataTransfer.effectAllowed = "move";
                    event.dataTransfer.setData("text/plain", itemId);
                });

                handle.addEventListener("dragend", () => {
                    state.draggedItemId = null;
                    row.classList.remove("dragging");
                    document.querySelectorAll(".drop-target").forEach((item) => item.classList.remove("drop-target"));
                });

                row.addEventListener("dragover", (event) => {
                    event.preventDefault();
                    event.dataTransfer.dropEffect = "move";
                    row.classList.add("drop-target");
                });

                row.addEventListener("dragleave", () => {
                    row.classList.remove("drop-target");
                });

                row.addEventListener("drop", (event) => {
                    event.preventDefault();
                    row.classList.remove("drop-target");
                    handleDrop(itemId);
                });
            };

            const handleDrop = (targetItemId) => {
                if (!state.draggedItemId || state.draggedItemId === targetItemId) {
                    return;
                }

                const scrollArea = elements.tableScroll;
                const restoreScroll = {
                    tableLeft: scrollArea.scrollLeft,
                    tableTop: scrollArea.scrollTop,
                    windowX: window.scrollX,
                    windowY: window.scrollY,
                };
                const fromIndex = state.items.findIndex((item) => item.id === state.draggedItemId);
                const toIndex = state.items.findIndex((item) => item.id === targetItemId);
                if (fromIndex < 0 || toIndex < 0) {
                    return;
                }

                const [movedItem] = state.items.splice(fromIndex, 1);
                state.items.splice(toIndex, 0, movedItem);
                savePlayers();
                render();
                requestAnimationFrame(() => {
                    scrollArea.scrollLeft = restoreScroll.tableLeft;
                    scrollArea.scrollTop = restoreScroll.tableTop;
                    window.scrollTo(restoreScroll.windowX, restoreScroll.windowY);
                });
            };

            const createTierRow = (item) => {
                const row = document.createElement("tr");
                row.className = "tier-row";

                const handle = document.createElement("span");
                handle.className = "handle";
