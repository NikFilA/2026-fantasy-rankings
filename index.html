<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Draft Board</title>
    <script src="data.js"></script>
    <script src="sync-config.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111416;
            --panel: #171b1f;
            --panel-strong: #1d2329;
            --line: #29313a;
            --line-soft: #20272e;
            --text: #eef2f6;
            --muted: #96a1ad;
            --subtle: #687481;
            --accent: #38bdf8;
            --accent-strong: #facc15;
            --green: #4ade80;
            --red: #f87171;
            --shadow: rgba(0, 0, 0, 0.34);
            --orange: #fb923c;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-width: 320px;
            background: var(--bg);
        }

        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(56, 189, 248, 0.08), transparent 260px),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 15px;
            letter-spacing: 0;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .app {
            width: min(1380px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 42px;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin-bottom: 22px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            max-width: 780px;
            font-size: clamp(30px, 5vw, 58px);
            line-height: 0.96;
            letter-spacing: 0;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(94px, 1fr));
            gap: 10px;
            min-width: min(420px, 100%);
        }

        .metric {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
            box-shadow: 0 16px 36px var(--shadow);
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            font-size: 24px;
            line-height: 1;
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 320px) minmax(150px, 210px) auto;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-btn,
        .player-search,
        .team-select,
        .reset-btn {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .player-search,
        .team-select {
            width: 100%;
            padding: 0 12px;
            color: var(--text);
            outline: none;
        }

        .player-search {
            cursor: text;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: none;
        }

        .player-search::placeholder {
            color: var(--subtle);
        }

        .filter-btn {
            width: 58px;
        }

        .filter-btn[aria-pressed="true"] {
            border-color: rgba(56, 189, 248, 0.8);
            background: rgba(56, 189, 248, 0.13);
            color: var(--text);
        }

        .reset-btn {
            padding: 0 14px;
            color: var(--text);
        }

        .filter-btn:hover,
        .reset-btn:hover,
        .draft-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .draft-panel {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) auto auto minmax(120px, 160px) auto minmax(240px, 0.9fr);
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .draft-input,
        .draft-select,
        .draft-btn {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--text);
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            outline: none;
        }

        .draft-input,
        .draft-select {
            width: 100%;
            padding: 0 12px;
            letter-spacing: 0;
        }

        .draft-select {
            color: var(--text);
        }

        .draft-input::placeholder {
            color: var(--subtle);
        }

        .draft-btn {
            cursor: pointer;
            letter-spacing: 0.06em;
            padding: 0 14px;
            text-transform: uppercase;
            transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .draft-btn.secondary {
            color: var(--muted);
        }

        .draft-toggle {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .draft-toggle input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .draft-status {
            display: grid;
            gap: 3px;
            min-height: 38px;
            align-content: center;
            color: var(--muted);
            font-size: 12px;
        }

        .draft-status strong {
            color: var(--text);
            font-size: 13px;
        }

        .draft-status.error,
        .draft-status .error {
            color: var(--red);
        }

        .roster-tracker {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .roster-pill {
            display: inline-grid;
            place-items: center;
            min-width: 54px;
            min-height: 26px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #13171b;
            color: var(--text);
            padding: 0 10px;
        }

        .table-shell {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 22px 58px var(--shadow);
        }

        .table-scroll {
            overflow: auto;
            max-height: calc(100vh - 245px);
        }

        table {
            width: 100%;
            min-width: 1180px;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--panel-strong);
        }

        th {
            height: 46px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-align: left;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .sort-btn {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            min-height: 30px;
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            padding: 0;
            text-transform: inherit;
        }

        .sort-btn::after {
            content: "";
            color: var(--subtle);
            font-size: 11px;
        }

        .sort-btn[data-direction="asc"]::after {
            content: "^";
            color: var(--accent);
        }

        .sort-btn[data-direction="desc"]::after {
            content: "v";
            color: var(--accent);
        }

        td {
            height: 52px;
            border-bottom: 1px solid var(--line-soft);
            color: var(--text);
            vertical-align: middle;
        }

        th,
        td {
            padding: 0 9px;
        }

        tbody tr {
            background: rgba(17, 20, 22, 0.54);
            transition: background 120ms ease, opacity 120ms ease;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        tbody tr.dragging {
            opacity: 0.42;
        }

        tbody tr.drop-target {
            background: rgba(250, 204, 21, 0.1);
            outline: 1px solid rgba(250, 204, 21, 0.42);
            outline-offset: -1px;
        }

        tbody tr.drafted {
            opacity: 0.38;
        }

        tbody tr.best-available {
            background: rgba(74, 222, 128, 0.12);
            outline: 1px solid rgba(74, 222, 128, 0.44);
            outline-offset: -1px;
        }

        .drag-cell {
            width: 44px;
            color: var(--subtle);
            text-align: center;
        }

        .handle {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            color: var(--muted);
            cursor: grab;
            line-height: 1;
        }

        .rank {
            width: 56px;
            color: var(--accent-strong);
            font-weight: 900;
        }

        .player {
            min-width: 220px;
        }

        .tier-row td {
            height: 42px;
            border-bottom-color: rgba(0, 0, 0, 0.24);
            background: transparent;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .tier-row:hover {
            background: transparent;
        }

        .tier-label {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 30px;
            border-radius: 8px;
            background: linear-gradient(90deg, #ef4444, #f97316);
            color: #fff7ed;
            font-size: 16px;
            font-weight: 950;
            letter-spacing: 0.06em;
            padding: 0 14px;
            text-transform: uppercase;
        }

        .player-card {
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 0;
        }

        .player-photo,
        .player-initials {
            flex: 0 0 auto;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: #101418;
            object-fit: cover;
        }

        .player-initials {
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .player-text {
            min-width: 0;
        }

        .player-name {
            display: block;
            font-weight: 800;
        }

        .draft-badge,
        .best-badge,
        .tier-chip {
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            height: 20px;
            margin-left: 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .draft-badge {
            background: rgba(248, 113, 113, 0.14);
            color: var(--red);
        }

        .best-badge {
            background: rgba(74, 222, 128, 0.14);
            color: var(--green);
        }

        .tier-chip {
            background: rgba(251, 146, 60, 0.14);
            color: var(--orange);
        }

        .player-meta {
            display: none;
            margin-top: 3px;
            color: var(--subtle);
            font-size: 12px;
        }

        .pill {
            display: inline-grid;
            place-items: center;
            min-width: 42px;
            height: 26px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #13171b;
            font-size: 12px;
            font-weight: 900;
        }

        .pos-rank {
            color: var(--accent);
            font-weight: 900;
        }

        .num {
            font-variant-numeric: tabular-nums;
        }

        .variance {
            font-weight: 900;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--muted);
        }

        .empty {
            padding: 38px;
            color: var(--muted);
            text-align: center;
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            justify-items: end;
            background: rgba(0, 0, 0, 0.46);
        }

        .drawer-backdrop[hidden] {
            display: none;
        }

        .player-drawer {
            width: min(420px, 100%);
            height: 100%;
            overflow: auto;
            border-left: 1px solid var(--line);
            background: #111416;
            box-shadow: -24px 0 60px rgba(0, 0, 0, 0.38);
            padding: 22px;
        }

        .drawer-close {
            float: right;
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #161b20;
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .drawer-head {
            display: flex;
            gap: 14px;
            align-items: center;
            margin: 18px 0 22px;
        }

        .drawer-head .player-photo,
        .drawer-head .player-initials {
            width: 58px;
            height: 58px;
        }

        .drawer-head h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.05;
        }

        .drawer-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .detail-card {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.82);
            padding: 12px;
        }

        .detail-card span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .detail-card strong {
            display: block;
            margin-top: 8px;
            font-size: 22px;
            line-height: 1;
        }

        .drawer-section {
            margin-top: 18px;
        }

        .drawer-section h3 {
            margin: 0 0 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .expert-list {
            display: grid;
            gap: 7px;
        }

        .expert-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 8px;
            align-items: center;
            min-height: 34px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: rgba(23, 27, 31, 0.7);
            padding: 0 10px;
        }

        .expert-row span:first-child {
            min-width: 0;
            overflow: hidden;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .expert-chip {
            display: inline-grid;
            place-items: center;
            min-width: 46px;
            min-height: 22px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.13);
            color: var(--accent);
            font-size: 11px;
            font-weight: 900;
        }

        .expert-chip.tier {
            background: rgba(251, 146, 60, 0.14);
            color: var(--orange);
        }

        @media (max-width: 860px) {
            .app {
                width: min(100% - 20px, 1380px);
                padding-top: 20px;
            }

            .topbar,
            .controls,
            .draft-panel {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: repeat(3, 1fr);
                min-width: 0;
            }

            .reset-btn {
                width: 100%;
            }

            .table-scroll {
                max-height: none;
            }

            .player-meta {
                display: block;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="topbar" aria-label="Draft board overview">
            <div>
                <p class="eyebrow">2026 Best Ball Utility</p>
                <h1>Interactive Fantasy Football Draft Board</h1>
            </div>
            <div class="summary" aria-label="Ranking summary">
                <div class="metric">
                    <span>Players</span>
                    <strong id="playerCount">0</strong>
                </div>
                <div class="metric">
                    <span>Filter</span>
                    <strong id="filterLabel">ALL</strong>
                </div>
                <div class="metric">
                    <span>Saved</span>
                    <strong id="saveState">Local</strong>
                </div>
            </div>
        </section>

        <section class="controls" aria-label="Draft board controls">
            <nav class="filters" aria-label="Position filters">
                <button class="filter-btn" type="button" data-filter="ALL" aria-pressed="true">ALL</button>
                <button class="filter-btn" type="button" data-filter="QB" aria-pressed="false">QB</button>
                <button class="filter-btn" type="button" data-filter="RB" aria-pressed="false">RB</button>
                <button class="filter-btn" type="button" data-filter="WR" aria-pressed="false">WR</button>
                <button class="filter-btn" type="button" data-filter="TE" aria-pressed="false">TE</button>
            </nav>
            <input class="player-search" id="playerSearch" type="search" placeholder="Search player..." aria-label="Search players" autocomplete="off">
            <select class="team-select" id="teamFilter" aria-label="Team filter">
                <option value="ALL">All Teams</option>
            </select>
            <button class="reset-btn" type="button" id="resetButton">Reset to ADP Base</button>
        </section>

        <section class="draft-panel" aria-label="Sleeper draft sync">
            <input class="draft-input" id="draftInput" type="text" placeholder="Sleeper draft URL or ID" aria-label="Sleeper draft URL or ID" autocomplete="off">
            <button class="draft-btn" type="button" id="draftConnectButton">Connect Draft</button>
            <button class="draft-btn secondary" type="button" id="draftStopButton">Stop</button>
            <select class="draft-select" id="mySlotSelect" aria-label="My Sleeper draft slot">
                <option value="">My Slot</option>
            </select>
            <label class="draft-toggle">
                <input id="availableOnlyToggle" type="checkbox">
                Available Only
            </label>
            <div class="draft-status" aria-live="polite">
                <strong id="draftBest">Best available: Off</strong>
                <span id="draftStatus">Paste a Sleeper draft link when you are drafting.</span>
            </div>
            <div class="roster-tracker" id="rosterTracker" aria-live="polite">
                <span>My roster</span>
                <span class="roster-pill">QB 0</span>
                <span class="roster-pill">RB 0</span>
                <span class="roster-pill">WR 0</span>
                <span class="roster-pill">TE 0</span>
            </div>
        </section>

        <section class="table-shell" aria-label="Custom rankings table">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="drag-cell" scope="col">Move</th>
                            <th scope="col">My Rank</th>
                            <th scope="col">Player</th>
                            <th scope="col">Pos</th>
                            <th scope="col">Team</th>
                            <th scope="col">My Pos Rank</th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="udAdp">Underdog ADP</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="udVar">UD Var</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="sleeperAdp">Sleeper ADP</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="sleeperVar">Sleeper Var</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="flockRank">Flock Rank</button></th>
                            <th scope="col"><button class="sort-btn" type="button" data-sort="flockVar">Flock Var</button></th>
                        </tr>
                    </thead>
                    <tbody id="rankingsBody"></tbody>
                </table>
                <div class="empty" id="emptyState" hidden>No players match this filter.</div>
            </div>
        </section>
    </main>

    <div class="drawer-backdrop" id="playerDrawerBackdrop" hidden>
        <aside class="player-drawer" role="dialog" aria-modal="true" aria-labelledby="playerDrawerTitle">
            <button class="drawer-close" type="button" id="playerDrawerClose" aria-label="Close player details">x</button>
            <div id="playerDrawerContent"></div>
        </aside>
    </div>

    <script>
        (() => {
            "use strict";

            const STORAGE_KEY = "myCustomRankings";
            const DRAFT_STORAGE_KEY = "sleeperDraftId";
            const MY_SLOT_STORAGE_KEY = "sleeperMyRosterId";
            const DRAFT_REFRESH_MS = 1000;
            const POSITIONS = ["QB", "RB", "WR", "TE"];
            const SUPABASE_CDN = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            const FLOCK_PROXY_URL = "/api/flock-rankings";
            const FLOCK_DIRECT_URL = "https://api.flockfantasy.com/rankings?format=BEST_BALL&pickType=general";
            const SLEEPER_PLAYERS_PROXY_URL = "/api/sleeper-players";
            const SLEEPER_PLAYERS_DIRECT_URL = "https://api.sleeper.app/v1/players/nfl";
            const SLEEPER_DRAFT_BASE_URL = "https://api.sleeper.app/v1/draft";
            const DEFAULT_SYNC_CONFIG = {
                provider: "local",
                supabaseUrl: "",
                supabaseAnonKey: "",
                boardId: "main",
                tableName: "draft_board_states",
            };
            const syncConfig = { ...DEFAULT_SYNC_CONFIG, ...(window.SYNC_CONFIG || {}) };
            const state = {
                items: [],
                flockRanks: {},
                flockDetails: {},
                playerAssets: {},
                sleeperKeyById: {},
                selectedPositions: new Set(),
                activeTeam: "ALL",
                searchQuery: "",
                availableOnly: false,
                sort: { key: "", direction: "" },
                selectedPlayerId: "",
                draggedItemId: null,
                draft: {
                    id: "",
                    active: false,
                    loading: false,
                    error: "",
                    details: null,
                    myRosterId: localStorage.getItem(MY_SLOT_STORAGE_KEY) || "",
                    picks: [],
                    draftedKeys: new Set(),
                    bestAvailableKey: "",
                    lastSync: null,
                },
            };
            let supabaseClientPromise = null;

            const elements = {
                body: document.getElementById("rankingsBody"),
                empty: document.getElementById("emptyState"),
                filters: Array.from(document.querySelectorAll(".filter-btn")),
                playerSearch: document.getElementById("playerSearch"),
                teamFilter: document.getElementById("teamFilter"),
                reset: document.getElementById("resetButton"),
                playerCount: document.getElementById("playerCount"),
                filterLabel: document.getElementById("filterLabel"),
                saveState: document.getElementById("saveState"),
                draftInput: document.getElementById("draftInput"),
                draftConnect: document.getElementById("draftConnectButton"),
                draftStop: document.getElementById("draftStopButton"),
                mySlot: document.getElementById("mySlotSelect"),
                availableOnly: document.getElementById("availableOnlyToggle"),
                draftBest: document.getElementById("draftBest"),
                draftStatus: document.getElementById("draftStatus"),
                rosterTracker: document.getElementById("rosterTracker"),
                sortButtons: Array.from(document.querySelectorAll(".sort-btn")),
                playerDrawerBackdrop: document.getElementById("playerDrawerBackdrop"),
                playerDrawerClose: document.getElementById("playerDrawerClose"),
                playerDrawerContent: document.getElementById("playerDrawerContent"),
            };
            let draftTimer = null;

            const basePlayers = () => clonePlayers(window.defaultPlayers || defaultPlayers || []);

            const initialsFor = (name) => String(name || "")
                .split(/\s+/)
                .filter(Boolean)
                .slice(0, 2)
                .map((part) => part[0])
                .join("")
                .toUpperCase();

            const clonePlayers = (players) => players.map((player, index) => ({
                id: String(player.id || index + 1),
                name: String(player.name || "Unknown Player"),
                pos: POSITIONS.includes(player.pos) ? player.pos : "WR",
                team: String(player.team || "FA"),
                udAdp: Number.isFinite(Number(player.udAdp)) ? Number(player.udAdp) : 999,
                udPick: String(player.udPick || ""),
                sleeperAdp: Number.isFinite(Number(player.sleeperAdp)) ? Number(player.sleeperAdp) : 999,
                sleeperPick: String(player.sleeperPick || ""),
            }));

            const tierLabel = (index) => `Tier ${index + 1}`;

            const tierLabelFromItem = (item, index) => {
                const match = String(item.id || "").match(/^tier-(\d+)$/);
                if (match) {
                    return tierLabel(Number(match[1]) - 1);
                }
                return tierLabel(index);
            };

            const buildDefaultItems = (players) => {
                const items = [];
                players.forEach((player, index) => {
                    if (index % 6 === 0) {
                        const tierIndex = index / 6;
                        items.push({
                            id: `tier-${tierIndex + 1}`,
                            label: tierLabel(tierIndex),
                            type: "tier",
                        });
                    }
                    items.push({
                        id: `player-${player.id}`,
                        playerId: player.id,
                        type: "player",
                    });
                });
                return items;
            };

            const playerItems = () => state.items.filter((item) => item.type === "player");

            const parseSavedState = (saved) => {
                if (saved && Array.isArray(saved.items) && saved.items.length > 0) {
                    return {
                        items: saved.items,
                        order: null,
                    };
                }
                if (saved && Array.isArray(saved.order) && saved.order.length > 0) {
                    return {
                        items: null,
                        order: saved.order.map(String),
                    };
                }
                if (Array.isArray(saved) && saved.length > 0) {
                    return {
                        items: null,
                        order: saved.map((player) => String(player.id)),
                    };
                }
                return { items: null, order: null };
            };

            const localSavedState = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                    return parseSavedState(saved);
                } catch (error) {
                    console.warn("Saved rankings were ignored because they are not valid JSON.", error);
                    return { items: null, order: null };
                }
            };

            const cloudSyncEnabled = () => syncConfig.provider === "supabase"
                && syncConfig.supabaseUrl
                && syncConfig.supabaseAnonKey
                && syncConfig.boardId;

            const loadScript = (src) => new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[src="${src}"]`);
                if (existing) {
                    existing.addEventListener("load", resolve, { once: true });
                    existing.addEventListener("error", reject, { once: true });
                    if (window.supabase) {
                        resolve();
                    }
                    return;
                }
                const script = document.createElement("script");
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            const supabaseClient = async () => {
                if (!cloudSyncEnabled()) {
                    return null;
                }
                if (!supabaseClientPromise) {
                    supabaseClientPromise = (async () => {
                        await loadScript(SUPABASE_CDN);
                        return window.supabase.createClient(syncConfig.supabaseUrl, syncConfig.supabaseAnonKey);
                    })();
                }
                return supabaseClientPromise;
            };

            const remoteSavedState = async () => {
                const client = await supabaseClient();
                if (!client) {
                    return null;
                }
                const { data, error } = await client
                    .from(syncConfig.tableName)
                    .select("state")
                    .eq("board_id", syncConfig.boardId)
                    .maybeSingle();
                if (error) {
                    throw error;
                }
                return data ? parseSavedState(data.state) : null;
            };

            const currentPayload = () => ({
                version: 4,
                items: state.items,
                updatedAt: new Date().toISOString(),
            });

            const persistRemoteState = async (payload) => {
                const client = await supabaseClient();
                if (!client) {
                    return;
                }
                const { error } = await client
                    .from(syncConfig.tableName)
                    .upsert({
                        board_id: syncConfig.boardId,
                        state: payload,
                        updated_at: new Date().toISOString(),
                    });
                if (error) {
                    throw error;
                }
            };

            const loadSavedState = async () => {
                const localState = localSavedState();
                if (!cloudSyncEnabled()) {
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
                try {
                    const remoteState = await remoteSavedState();
                    if (remoteState && (remoteState.items || remoteState.order)) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify({
                            version: 4,
                            items: remoteState.items,
                            updatedAt: new Date().toISOString(),
                        }));
                        return { ...remoteState, source: "Cloud" };
                    }
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                } catch (error) {
                    console.warn("Cloud rankings could not be loaded; using local rankings.", error);
                    return { ...localState, source: localState.items || localState.order ? "Local" : "Base" };
                }
            };

            const applySavedOrder = (players, order) => {
                if (!order) {
                    return players;
                }
                const byId = new Map(players.map((player) => [player.id, player]));
                const ordered = order.map((id) => byId.get(id)).filter(Boolean);
                const used = new Set(ordered.map((player) => player.id));
                return ordered.concat(players.filter((player) => !used.has(player.id)));
            };

            const hydrateSavedItems = (players, savedItems) => {
                const byId = new Map(players.map((player) => [player.id, player]));
                const hydrated = [];
                const usedPlayers = new Set();

                savedItems.forEach((item, index) => {
                    if (item.type === "tier") {
                        hydrated.push({
                            id: String(item.id || `tier-saved-${index}`),
                            label: tierLabelFromItem(item, index),
                            type: "tier",
                        });
                    }

                    if (item.type === "player" && byId.has(String(item.playerId))) {
                        const playerId = String(item.playerId);
                        hydrated.push({
                            id: `player-${playerId}`,
                            playerId,
                            type: "player",
                        });
                        usedPlayers.add(playerId);
                    }
                });

                players.forEach((player) => {
                    if (!usedPlayers.has(player.id)) {
                        hydrated.push({
                            id: `player-${player.id}`,
                            playerId: player.id,
                            type: "player",
                        });
                    }
                });

                return hydrated.length > 0 ? hydrated : buildDefaultItems(players);
            };

            const savePlayers = () => {
                const payload = currentPayload();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                elements.saveState.textContent = "Local";
                if (cloudSyncEnabled()) {
                    persistRemoteState(payload)
                        .then(() => {
                            elements.saveState.textContent = "Cloud";
                        })
                        .catch((error) => {
                            console.warn("Cloud rankings could not be saved.", error);
                            elements.saveState.textContent = "Local";
                        });
                }
            };

            const resetPlayers = () => {
                const confirmed = window.confirm("Reset your board to ADP base? This will replace your saved custom order and tiers.");
                if (!confirmed) {
                    return;
                }
                localStorage.removeItem(STORAGE_KEY);
                state.items = buildDefaultItems(basePlayers());
                state.sort = { key: "", direction: "" };
                elements.saveState.textContent = "Base";
                populateTeamFilter();
                savePlayers();
                render();
            };

            const nameKey = (name) => String(name || "")
                .toLowerCase()
                .replace(/\b(jr|sr|ii|iii|iv|v)\b\.?/g, "")
                .replace(/[^a-z0-9]+/g, "");

            const TEAM_ALIASES = {
                JAX: "JAC",
                JAC: "JAC",
                WAS: "WSH",
                WSH: "WSH",
            };

            const marketTeam = (team) => {
                const normalized = String(team || "").toUpperCase();
                return TEAM_ALIASES[normalized] || normalized;
            };

            const playerMarketKey = (player) => `${nameKey(player.name)}|${marketTeam(player.team)}|${player.pos}`;

            const formatAdp = (adp, pickLabel) => {
                if (adp === 999) {
                    return "N/A";
                }
                const base = Number.isInteger(adp) ? String(adp) : adp.toFixed(1);
                return pickLabel ? `${base} (${pickLabel})` : base;
            };

            const varianceClass = (variance) => {
                if (variance > 0) {
                    return "positive";
                }
                if (variance < 0) {
                    return "negative";
                }
                return "neutral";
            };

            const formatMarketRank = (rank) => {
                if (!Number.isFinite(rank)) {
                    return "N/A";
                }
                return String(Math.round(rank));
            };

            const formatVariance = (marketAdp, myRank) => {
                if (marketAdp === 999) {
                    return { label: "N/A", className: "neutral" };
                }
                const variance = Math.round(marketAdp - myRank);
                const prefix = variance > 0 ? "+" : "";
                return { label: `${prefix}${variance}`, className: varianceClass(variance) };
            };

            const getPositionRanks = () => {
                const counters = { QB: 0, RB: 0, WR: 0, TE: 0 };
                return orderedPlayers().reduce((ranks, player) => {
                    counters[player.pos] += 1;
                    ranks[player.id] = `${player.pos}${counters[player.pos]}`;
                    return ranks;
                }, {});
            };

            const playersById = () => new Map(basePlayers().map((player) => [player.id, player]));

            const orderedPlayers = () => {
                const byId = playersById();
                return playerItems().map((item) => byId.get(item.playerId)).filter(Boolean);
            };

            const createCell = (className, content) => {
                const cell = document.createElement("td");
                if (className) {
                    cell.className = className;
                }
                if (content instanceof Node) {
                    cell.appendChild(content);
                } else {
                    cell.textContent = content;
                }
                return cell;
            };

            const attachDragEvents = (row, itemId) => {
                row.draggable = !state.sort.key;
                row.dataset.itemId = itemId;

                row.addEventListener("dragstart", (event) => {
                    if (state.sort.key) {
                        event.preventDefault();
                        return;
                    }
                    state.draggedItemId = itemId;
                    row.classList.add("dragging");
                    event.dataTransfer.effectAllowed = "move";
                    event.dataTransfer.setData("text/plain", itemId);
                });

                row.addEventListener("dragend", () => {
                    state.draggedItemId = null;
                    row.classList.remove("dragging");
                    document.querySelectorAll(".drop-target").forEach((item) => item.classList.remove("drop-target"));
                });

                row.addEventListener("dragover", (event) => {
                    event.preventDefault();
                    event.dataTransfer.dropEffect = "move";
                    row.classList.add("drop-target");
                });

                row.addEventListener("dragleave", () => {
                    row.classList.remove("drop-target");
                });

                row.addEventListener("drop", (event) => {
                    event.preventDefault();
                    row.classList.remove("drop-target");
                    handleDrop(itemId);
                });
            };

            const handleDrop = (targetItemId) => {
                if (!state.draggedItemId || state.draggedItemId === targetItemId) {
                    return;
                }

                const fromIndex = state.items.findIndex((item) => item.id === state.draggedItemId);
                const toIndex = state.items.findIndex((item) => item.id === targetItemId);
                if (fromIndex < 0 || toIndex < 0) {
                    return;
                }

                const [movedItem] = state.items.splice(fromIndex, 1);
                state.items.splice(toIndex, 0, movedItem);
                savePlayers();
                render();
            };

            const createTierRow = (item) => {
                const row = document.createElement("tr");
                row.className = "tier-row";
                attachDragEvents(row, item.id);

                const handle = document.createElement("span");
                handle.className = "handle";
                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");

                const label = document.createElement("div");
                label.className = "tier-label";
                label.textContent = item.label;

                const labelCell = createCell("", label);
                labelCell.colSpan = 11;
                row.append(createCell("drag-cell", handle), labelCell);
                return row;
            };

            const createPlayerRow = (item, player, globalIndex, posRanks, tierLabel) => {
                const row = document.createElement("tr");
                row.dataset.id = player.id;
                row.tabIndex = 0;
                attachDragEvents(row, item.id);
                const myRank = globalIndex + 1;
                const underdogVariance = formatVariance(player.udAdp, myRank);
                const sleeperVariance = formatVariance(player.sleeperAdp, myRank);
                const playerKey = playerMarketKey(player);
                const flockRank = state.flockRanks[playerKey];
                const flockVariance = formatVariance(Number.isFinite(flockRank) ? flockRank : 999, myRank);
                const handle = document.createElement("span");
                handle.className = "handle";
                handle.textContent = "::";
                handle.setAttribute("aria-hidden", "true");

                const isDrafted = state.draft.draftedKeys.has(playerKey);
                const isBestAvailable = state.draft.bestAvailableKey === playerKey;
                row.classList.toggle("drafted", isDrafted);
                row.classList.toggle("best-available", isBestAvailable);

                const playerCell = document.createElement("div");
                const playerMedia = playerImage(player);
                const playerText = document.createElement("div");
                const playerName = document.createElement("span");
                const playerMeta = document.createElement("span");
                playerCell.className = "player-card";
                playerText.className = "player-text";
                playerName.className = "player-name";
                playerName.textContent = player.name;
                if (tierLabel) {
                    const tierBadge = document.createElement("span");
                    tierBadge.className = "tier-chip";
                    tierBadge.textContent = tierLabel;
                    playerName.appendChild(tierBadge);
                }
                if (isDrafted) {
                    const draftedBadge = document.createElement("span");
                    draftedBadge.className = "draft-badge";
                    draftedBadge.textContent = "Gone";
                    playerName.appendChild(draftedBadge);
                } else if (isBestAvailable) {
                    const bestBadge = document.createElement("span");
                    bestBadge.className = "best-badge";
                    bestBadge.textContent = "Best";
                    playerName.appendChild(bestBadge);
                }
                playerMeta.className = "player-meta";
                playerMeta.textContent = `${player.pos} / ${player.team}`;
                playerText.append(playerName, playerMeta);
                playerCell.append(playerMedia, playerText);

                row.append(
                    createCell("drag-cell", handle),
                    createCell("rank num", String(myRank)),
                    createCell("player", playerCell),
                    createCell("", makePill(player.pos)),
                    createCell("", player.team),
                    createCell("pos-rank", posRanks[player.id]),
                    createCell("num", formatAdp(player.udAdp, player.udPick)),
                    createCell(`variance num ${underdogVariance.className}`, underdogVariance.label),
                    createCell("num", formatAdp(player.sleeperAdp, player.sleeperPick)),
                    createCell(`variance num ${sleeperVariance.className}`, sleeperVariance.label),
                    createCell("num", formatMarketRank(flockRank)),
                    createCell(`variance num ${flockVariance.className}`, flockVariance.label),
                );

                row.addEventListener("click", (event) => {
                    if (event.target.closest(".handle")) {
                        return;
                    }
                    openPlayerDetails(player.id);
                });
                row.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        openPlayerDetails(player.id);
                    }
                });

                return row;
            };

            const makePill = (text) => {
                const pill = document.createElement("span");
                pill.className = "pill";
                pill.textContent = text;
                return pill;
            };

            const playerInitials = (player) => {
                const fallback = document.createElement("span");
                fallback.className = "player-initials";
                fallback.textContent = initialsFor(player.name);
                fallback.setAttribute("aria-hidden", "true");
                return fallback;
            };

            const playerImage = (player) => {
                const asset = state.playerAssets[playerMarketKey(player)];
                if (asset && asset.imageUrl) {
                    const image = document.createElement("img");
                    image.className = "player-photo";
                    image.src = asset.imageUrl;
                    image.alt = "";
                    image.loading = "lazy";
                    image.decoding = "async";
                    image.onerror = () => image.replaceWith(playerInitials(player));
                    return image;
                }
                return playerInitials(player);
            };

            const normalizeSearch = (value) => String(value).toLowerCase().replace(/[^a-z0-9]/g, "");

            const sortValue = (entry, posRanks) => {
                if (!entry.player) {
                    return { value: "", missing: true };
                }
                const player = entry.player;
                const myRank = entry.globalIndex + 1;
                const flockRank = state.flockRanks[playerMarketKey(player)];
                const values = {
                    myRank,
                    udAdp: player.udAdp,
                    udVar: player.udAdp === 999 ? Number.POSITIVE_INFINITY : player.udAdp - myRank,
                    sleeperAdp: player.sleeperAdp,
                    sleeperVar: player.sleeperAdp === 999 ? Number.POSITIVE_INFINITY : player.sleeperAdp - myRank,
                    flockRank: Number.isFinite(flockRank) ? flockRank : Number.POSITIVE_INFINITY,
                    flockVar: Number.isFinite(flockRank) ? flockRank - myRank : Number.POSITIVE_INFINITY,
                };
                const value = values[state.sort.key];
                const missing = value === Number.POSITIVE_INFINITY || value === undefined || Number.isNaN(value);
                return { value, missing };
            };

            const sortedVisibleItems = (visibleItems, posRanks) => {
                if (!state.sort.key) {
                    return visibleItems;
                }
                const direction = state.sort.direction === "desc" ? -1 : 1;
                return visibleItems
                    .filter(({ player }) => player)
                    .slice()
                    .sort((a, b) => {
                        const left = sortValue(a, posRanks);
                        const right = sortValue(b, posRanks);
                        if (left.missing !== right.missing) {
                            return left.missing ? 1 : -1;
                        }
                        if (typeof left.value === "string" || typeof right.value === "string") {
                            const compared = String(left.value).localeCompare(String(right.value));
                            return compared === 0 ? a.globalIndex - b.globalIndex : compared * direction;
                        }
                        if (left.value === right.value) {
                            return a.globalIndex - b.globalIndex;
                        }
                        return left.value > right.value ? direction : -direction;
                    });
            };

            const updateSortButtons = () => {
                elements.sortButtons.forEach((button) => {
                    const direction = button.dataset.sort === state.sort.key ? state.sort.direction : "";
                    button.dataset.direction = direction;
                    button.setAttribute("aria-sort", direction || "none");
                });
            };

            const cycleSort = (key) => {
                if (state.sort.key !== key) {
                    state.sort = { key, direction: "asc" };
                } else if (state.sort.direction === "asc") {
                    state.sort = { key, direction: "desc" };
                } else {
                    state.sort = { key: "", direction: "" };
                }
                render();
            };

            const playerContext = (playerId) => {
                const byId = playersById();
                let playerIndex = 0;
                let currentTierLabel = "";
                for (const item of state.items) {
                    if (item.type === "tier") {
                        currentTierLabel = item.label;
                        continue;
                    }
                    const player = byId.get(item.playerId);
                    if (!player) {
                        continue;
                    }
                    const globalIndex = playerIndex;
                    playerIndex += 1;
                    if (player.id === String(playerId)) {
                        return { item, player, globalIndex, tierLabel: currentTierLabel };
                    }
                }
                return null;
            };

            const detailCard = (label, value, className = "") => {
                const card = document.createElement("div");
                card.className = "detail-card";
                const labelNode = document.createElement("span");
                const valueNode = document.createElement("strong");
                labelNode.textContent = label;
                valueNode.textContent = value;
                if (className) {
                    valueNode.className = className;
                }
                card.append(labelNode, valueNode);
                return card;
            };

            const formatDecimal = (value) => {
                const number = Number(value);
                if (!Number.isFinite(number)) {
                    return "N/A";
                }
                return Number.isInteger(number) ? String(number) : number.toFixed(1);
            };

            const formatHeight = (height) => {
                const inches = Number(height);
                if (!Number.isFinite(inches) || inches <= 0) {
                    return "N/A";
                }
                return `${Math.floor(inches / 12)}-${inches % 12}`;
            };

            const flockDetailCards = (detail) => {
                const grid = document.createElement("div");
                grid.className = "detail-grid";
                if (!detail) {
                    grid.append(detailCard("Flock Data", "Loading"));
                    return grid;
                }
                const rankDelta = Number(detail.rankDelta);
                const rankDeltaLabel = Number.isFinite(rankDelta) ? `${rankDelta > 0 ? "+" : ""}${rankDelta}` : "N/A";
                const rankDeltaClass = Number.isFinite(rankDelta) ? varianceClass(-rankDelta) : "neutral";
                grid.append(
                    detailCard("Flock Overall", formatMarketRank(detail.listRank)),
                    detailCard("Flock Avg", formatDecimal(detail.overallAverageRank ?? detail.averageRank)),
                    detailCard("Flock Pos Rank", formatDecimal(detail.averagePositionalRank)),
                    detailCard("Flock Tier", formatDecimal(detail.averageTier)),
                    detailCard("2025 PPG", formatDecimal(detail.previousYearPprAverage)),
                    detailCard("7D Move", rankDeltaLabel, rankDeltaClass),
                    detailCard("Age", detail.age ? String(detail.age) : "N/A"),
                    detailCard("College", detail.college || "N/A"),
                    detailCard("Draft Year", detail.draftYear ? String(detail.draftYear) : "N/A"),
                    detailCard("Size", `${formatHeight(detail.height)} / ${detail.weight || "N/A"}`)
                );
                return grid;
            };

            const expertRanksSection = (detail) => {
                const section = document.createElement("section");
                section.className = "drawer-section";
                const heading = document.createElement("h3");
                heading.textContent = "Flock Expert Ranks";
                const list = document.createElement("div");
                list.className = "expert-list";
                const ranks = detail?.overallRanks || {};
                const tiers = detail?.overallTiers || {};
                const names = Object.keys(ranks).sort((a, b) => Number(ranks[a]) - Number(ranks[b]));
                if (names.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "detail-card";
                    empty.textContent = "Flock expert ranks are not available yet.";
                    list.appendChild(empty);
                } else {
                    names.forEach((name) => {
                        const row = document.createElement("div");
                        row.className = "expert-row";
                        const expert = document.createElement("span");
                        const rank = document.createElement("span");
                        const tier = document.createElement("span");
                        expert.textContent = name;
                        rank.className = "expert-chip";
                        rank.textContent = `#${ranks[name]}`;
                        tier.className = "expert-chip tier";
                        tier.textContent = tiers[name] ? `T${tiers[name]}` : "T-";
                        row.append(expert, rank, tier);
                        list.appendChild(row);
                    });
                }
                section.append(heading, list);
                return section;
            };
            const closePlayerDetails = () => {
                state.selectedPlayerId = "";
                elements.playerDrawerBackdrop.hidden = true;
                elements.playerDrawerContent.replaceChildren();
            };

            const openPlayerDetails = (playerId) => {
                const context = playerContext(playerId);
                if (!context) {
                    return;
                }
                state.selectedPlayerId = String(playerId);
                const { player, globalIndex, tierLabel } = context;
                const myRank = globalIndex + 1;
                const posRanks = getPositionRanks();
                const playerKey = playerMarketKey(player);
                const flockRank = state.flockRanks[playerKey];
                const flockDetail = state.flockDetails[playerKey];
                const underdogVariance = formatVariance(player.udAdp, myRank);
                const sleeperVariance = formatVariance(player.sleeperAdp, myRank);
                const flockVariance = formatVariance(Number.isFinite(flockRank) ? flockRank : 999, myRank);
                const isDrafted = state.draft.draftedKeys.has(playerKey);

                const head = document.createElement("div");
                head.className = "drawer-head";
                const titleWrap = document.createElement("div");
                const title = document.createElement("h2");
                title.id = "playerDrawerTitle";
                title.textContent = player.name;
                const subtitle = document.createElement("div");
                subtitle.className = "drawer-subtitle";
                subtitle.textContent = `${tierLabel || "No tier"} / ${player.pos} / ${player.team}${isDrafted ? " / Drafted" : ""}`;
                titleWrap.append(title, subtitle);
                head.append(playerImage(player), titleWrap);

                const myGrid = document.createElement("div");
                myGrid.className = "detail-grid";
                myGrid.append(
                    detailCard("My Rank", String(myRank)),
                    detailCard("My Pos Rank", posRanks[player.id] || "N/A"),
                    detailCard("Underdog ADP", formatAdp(player.udAdp, player.udPick)),
                    detailCard("UD Var", underdogVariance.label, underdogVariance.className),
                    detailCard("Sleeper ADP", formatAdp(player.sleeperAdp, player.sleeperPick)),
                    detailCard("Sleeper Var", sleeperVariance.label, sleeperVariance.className),
                    detailCard("Flock Rank", formatMarketRank(flockRank)),
                    detailCard("Flock Var", flockVariance.label, flockVariance.className)
                );

                const flockSection = document.createElement("section");
                flockSection.className = "drawer-section";
                const flockHeading = document.createElement("h3");
                flockHeading.textContent = "Flock Profile";
                flockSection.append(flockHeading, flockDetailCards(flockDetail));

                elements.playerDrawerContent.replaceChildren(head, myGrid, flockSection, expertRanksSection(flockDetail));
                elements.playerDrawerBackdrop.hidden = false;
            };
            const getVisibleItems = () => {
                const byId = playersById();
                const searchQuery = normalizeSearch(state.searchQuery);
                const showTierRows = state.selectedPositions.size === 0 && state.activeTeam === "ALL" && !searchQuery && !state.availableOnly && !state.sort.key;
                let playerIndex = 0;
                let currentTierLabel = "";

                return state.items.reduce((visible, item) => {
                    if (item.type === "tier") {
                        currentTierLabel = item.label;
                        if (showTierRows) {
                            visible.push({ item });
                        }
                        return visible;
                    }

                    const player = byId.get(item.playerId);
                    if (!player) {
                        return visible;
                    }

                    const globalIndex = playerIndex;
                    playerIndex += 1;
                    const playerKey = playerMarketKey(player);
                    const positionMatch = state.selectedPositions.size === 0 || state.selectedPositions.has(player.pos);
                    const teamMatch = state.activeTeam === "ALL" || player.team === state.activeTeam;
                    const searchMatch = !searchQuery || normalizeSearch(player.name).includes(searchQuery);
                    const availabilityMatch = !state.availableOnly || !state.draft.active || !state.draft.draftedKeys.has(playerKey);
                    if (positionMatch && teamMatch && searchMatch && availabilityMatch) {
                        visible.push({ globalIndex, item, player, tierLabel: showTierRows ? "" : currentTierLabel });
                    }
                    return visible;
                }, []);
            };

            const filterLabel = () => {
                const parts = [state.selectedPositions.size ? Array.from(state.selectedPositions).join(" / ") : "ALL"];
                if (state.activeTeam !== "ALL") {
                    parts.push(state.activeTeam);
                }
                if (state.searchQuery.trim()) {
                    parts.push("Search");
                }
                return parts.join(" / ");
            };

            const populateTeamFilter = () => {
                const currentTeam = state.activeTeam;
                const teams = Array.from(new Set(orderedPlayers().map((player) => player.team))).sort();
                elements.teamFilter.replaceChildren(new Option("All Teams", "ALL"));
                teams.forEach((team) => {
                    elements.teamFilter.appendChild(new Option(team, team));
                });
                state.activeTeam = teams.includes(currentTeam) ? currentTeam : "ALL";
                elements.teamFilter.value = state.activeTeam;
                elements.playerSearch.value = state.searchQuery;
                elements.availableOnly.checked = state.availableOnly;
            };

            const render = () => {
                updateDraftStatus();
                const visibleItems = getVisibleItems();
                const posRanks = getPositionRanks();
                const displayItems = sortedVisibleItems(visibleItems, posRanks);
                const fragment = document.createDocumentFragment();
                const visiblePlayerCount = visibleItems.filter(({ player }) => player).length;

                elements.body.replaceChildren();
                displayItems.forEach(({ item, player, globalIndex, tierLabel }) => {
                    if (item.type === "tier") {
                        fragment.appendChild(createTierRow(item));
                    } else {
                        fragment.appendChild(createPlayerRow(item, player, globalIndex, posRanks, tierLabel));
                    }
                });
                elements.body.appendChild(fragment);

                elements.empty.hidden = visiblePlayerCount > 0;
                elements.playerCount.textContent = String(visiblePlayerCount);
                elements.filterLabel.textContent = filterLabel();
                elements.filters.forEach((button) => {
                    const filter = button.dataset.filter;
                    const pressed = filter === "ALL" ? state.selectedPositions.size === 0 : state.selectedPositions.has(filter);
                    button.setAttribute("aria-pressed", String(pressed));
                });
                elements.teamFilter.value = state.activeTeam;
                updateSortButtons();
            };

            const normalizeFlockRankings = (payload) => {
                const rows = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.data) ? payload.data : []);
                return rows.reduce((result, row, index) => {
                    const name = row.playerName || row.player_name || row.name;
                    const team = row.team || row.teamAbbr || row.team_abbr || "";
                    const pos = row.position || row.pos || "";
                    if (!name || !team || !pos) {
                        return result;
                    }
                    const key = `${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}`;
                    const rank = index + 1;
                    result.ranks[key] = rank;
                    result.details[key] = { ...row, listRank: rank };
                    return result;
                }, { ranks: {}, details: {} });
            };

            const fetchJson = async (url) => {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Request failed: ${response.status}`);
                }
                return response.json();
            };

            const refreshFlockRanks = async () => {
                try {
                    let payload;
                    try {
                        payload = await fetchJson(FLOCK_PROXY_URL);
                    } catch (proxyError) {
                        payload = await fetchJson(FLOCK_DIRECT_URL);
                    }
                    const flockData = normalizeFlockRankings(payload);
                    state.flockRanks = flockData.ranks;
                    state.flockDetails = flockData.details;
                    render();
                    if (state.selectedPlayerId && !elements.playerDrawerBackdrop.hidden) {
                        openPlayerDetails(state.selectedPlayerId);
                    }
                } catch (error) {
                    console.warn("Flock rankings could not be loaded.", error);
                }
            };

            const normalizeSleeperPlayers = (payload) => {
                const rows = Array.isArray(payload)
                    ? payload
                    : Object.values(payload || {}).map((player) => ({
                        id: player.player_id,
                        name: player.full_name || `${player.first_name || ""} ${player.last_name || ""}`.trim(),
                        pos: player.position,
                        team: player.team,
                    }));
                const assets = {};
                const sleeperKeyById = {};
                rows.forEach((row) => {
                    const id = String(row.id || row.player_id || "");
                    const name = row.name || row.full_name;
                    const pos = row.pos || row.position;
                    const team = row.team;
                    if (!id || !name || !pos || !team || !POSITIONS.includes(String(pos).toUpperCase())) {
                        return;
                    }
                    const key = `${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}`;
                    assets[key] = {
                        id,
                        imageUrl: `https://sleepercdn.com/content/nfl/players/thumb/${id}.jpg`,
                    };
                    sleeperKeyById[id] = key;
                });
                state.playerAssets = assets;
                state.sleeperKeyById = sleeperKeyById;
            };

            const refreshSleeperPlayers = async () => {
                try {
                    let payload;
                    try {
                        payload = await fetchJson(SLEEPER_PLAYERS_PROXY_URL);
                    } catch (proxyError) {
                        payload = await fetchJson(SLEEPER_PLAYERS_DIRECT_URL);
                    }
                    normalizeSleeperPlayers(payload);
                    render();
                } catch (error) {
                    console.warn("Sleeper player images could not be loaded.", error);
                }
            };

            const draftIdFromInput = (value) => {
                const input = String(value || "").trim();
                const draftPathMatch = input.match(/draft\/(?:nfl\/)?(\d+)/i);
                if (draftPathMatch) {
                    return draftPathMatch[1];
                }
                const idMatch = input.match(/\d{8,}/);
                return idMatch ? idMatch[0] : "";
            };

            const pickDraftSlot = (pick) => String(pick.draft_slot || pick.metadata?.draft_slot || pick.roster_id || "");

            const pickPosition = (pick) => {
                const pos = String(pick.metadata?.position || "").toUpperCase();
                return POSITIONS.includes(pos) ? pos : "";
            };

            const draftTeamCount = () => {
                const settingsTeams = Number(state.draft.details?.settings?.teams || state.draft.details?.teams || 0);
                if (settingsTeams > 0) {
                    return settingsTeams;
                }
                const pickSlots = state.draft.picks.map((pick) => Number(pickDraftSlot(pick))).filter((slot) => Number.isFinite(slot));
                return pickSlots.length ? Math.max(...pickSlots) : 12;
            };

            const populateMySlotOptions = () => {
                const current = state.draft.myRosterId;
                const teamCount = draftTeamCount();
                elements.mySlot.replaceChildren(new Option("My Slot", ""));
                for (let slot = 1; slot <= teamCount; slot += 1) {
                    elements.mySlot.appendChild(new Option(`Slot ${slot}`, String(slot)));
                }
                if (current && Number(current) >= 1 && Number(current) <= teamCount) {
                    elements.mySlot.value = current;
                } else {
                    state.draft.myRosterId = "";
                    elements.mySlot.value = "";
                }
            };

            const myRosterCounts = () => {
                const counts = Object.fromEntries(POSITIONS.map((pos) => [pos, 0]));
                if (!state.draft.myRosterId) {
                    return { counts, total: 0 };
                }
                let total = 0;
                state.draft.picks.forEach((pick) => {
                    if (pickDraftSlot(pick) !== state.draft.myRosterId) {
                        return;
                    }
                    const pos = pickPosition(pick);
                    if (pos) {
                        counts[pos] += 1;
                        total += 1;
                    }
                });
                return { counts, total };
            };

            const updateRosterTracker = () => {
                const { counts, total } = myRosterCounts();
                const label = state.draft.myRosterId ? `My roster · Slot ${state.draft.myRosterId} · ${total} picks` : "My roster · choose slot";
                elements.rosterTracker.replaceChildren();
                const labelNode = document.createElement("span");
                labelNode.textContent = label;
                elements.rosterTracker.appendChild(labelNode);
                POSITIONS.forEach((pos) => {
                    const pill = document.createElement("span");
                    pill.className = "roster-pill";
                    pill.textContent = `${pos} ${counts[pos]}`;
                    elements.rosterTracker.appendChild(pill);
                });
            };

            const keyFromDraftPick = (pick) => {
                const sleeperId = String(pick.player_id || pick.metadata?.player_id || "");
                if (sleeperId && state.sleeperKeyById[sleeperId]) {
                    return state.sleeperKeyById[sleeperId];
                }
                const metadata = pick.metadata || {};
                const firstName = metadata.first_name || metadata.firstName || "";
                const lastName = metadata.last_name || metadata.lastName || "";
                const name = metadata.player_name || metadata.name || `${firstName} ${lastName}`.trim();
                const team = metadata.team || "";
                const pos = metadata.position || "";
                return name && team && pos ? `${nameKey(name)}|${marketTeam(team)}|${String(pos).toUpperCase()}` : "";
            };

            const findBestAvailable = () => {
                const byId = playersById();
                for (const item of state.items) {
                    if (item.type !== "player") {
                        continue;
                    }
                    const player = byId.get(item.playerId);
                    if (player && !state.draft.draftedKeys.has(playerMarketKey(player))) {
                        return player;
                    }
                }
                return null;
            };

            const updateDraftStatus = () => {
                if (!state.draft.active) {
                    elements.draftBest.textContent = "Best available: Off";
                    elements.draftStatus.textContent = "Paste a Sleeper draft link when you are drafting.";
                    elements.draftStatus.className = "";
                    updateRosterTracker();
                    return;
                }
                const best = findBestAvailable();
                state.draft.bestAvailableKey = best ? playerMarketKey(best) : "";
                elements.draftBest.textContent = best ? `Best available: ${best.name}` : "Best available: None";
                if (state.draft.error) {
                    elements.draftStatus.textContent = state.draft.error;
                    elements.draftStatus.className = "error";
                    return;
                }
                const picked = state.draft.picks.length;
                const synced = state.draft.lastSync ? state.draft.lastSync.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }) : "not synced";
                elements.draftStatus.textContent = `Draft ${state.draft.id} · ${picked} picked · synced ${synced}`;
                elements.draftStatus.className = "";
                updateRosterTracker();
            };

            const refreshDraftDetails = async () => {
                const details = await fetchJson(`${SLEEPER_DRAFT_BASE_URL}/${state.draft.id}`);
                state.draft.details = details;
                populateMySlotOptions();
            };

            const refreshDraftPicks = async () => {
                if (!state.draft.id || state.draft.loading) {
                    return;
                }
                state.draft.loading = true;
                try {
                    const picks = await fetchJson(`${SLEEPER_DRAFT_BASE_URL}/${state.draft.id}/picks`);
                    const draftedKeys = new Set();
                    picks.forEach((pick) => {
                        const key = keyFromDraftPick(pick);
                        if (key) {
                            draftedKeys.add(key);
                        }
                    });
                    state.draft.picks = picks;
                    state.draft.draftedKeys = draftedKeys;
                    populateMySlotOptions();
                    state.draft.error = "";
                    state.draft.lastSync = new Date();
                } catch (error) {
                    console.warn("Sleeper draft could not be synced.", error);
                    state.draft.error = "Could not sync Sleeper draft. Check the draft ID.";
                } finally {
                    state.draft.loading = false;
                    updateDraftStatus();
                    render();
                }
            };

            const stopDraftSync = () => {
                if (draftTimer) {
                    clearInterval(draftTimer);
                    draftTimer = null;
                }
                state.draft.active = false;
                state.draft.error = "";
                state.draft.draftedKeys = new Set();
                state.draft.bestAvailableKey = "";
                state.draft.details = null;
                state.draft.myRosterId = "";
                state.draft.picks = [];
                localStorage.removeItem(DRAFT_STORAGE_KEY);
                localStorage.removeItem(MY_SLOT_STORAGE_KEY);
                populateMySlotOptions();
                render();
            };

            const startDraftSync = async (rawValue) => {
                const draftId = draftIdFromInput(rawValue);
                if (!draftId) {
                    state.draft.active = true;
                    state.draft.error = "Paste a valid Sleeper draft URL or ID.";
                    updateDraftStatus();
                    return;
                }
                if (draftTimer) {
